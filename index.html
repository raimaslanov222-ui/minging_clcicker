<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beas Voice AI - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        .beas-title {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 4px;
        }

        .mic-active {
            animation: pulse-ring 1.2s infinite;
            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%) !important;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 25px rgba(239, 68, 68, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); transform: scale(1); }
        }

        .thinking-bar {
            height: 3px;
            width: 100%;
            background: linear-gradient(90deg, transparent, #8b5cf6, #ec4899, #8b5cf6, transparent);
            background-size: 200% 100%;
            animation: move-bg 1.5s linear infinite;
        }

        @keyframes move-bg {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- Background Decoration -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-900/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-900/20 rounded-full blur-[120px]"></div>
    </div>

    <div class="w-full max-w-md bg-zinc-900/80 backdrop-blur-2xl rounded-[2.5rem] border border-white/10 p-8 shadow-2xl">
        
        <div class="text-center mb-8">
            <h1 class="beas-title text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                BEAS VOICE
            </h1>
            <div id="status-box" class="flex items-center justify-center gap-2 mt-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-blue-500"></div>
                <span id="status-text" class="text-[10px] uppercase font-bold text-zinc-500 tracking-widest">Готов к работе</span>
            </div>
        </div>

        <!-- Microphone Area -->
        <div class="flex justify-center mb-10">
            <button id="main-btn" class="w-32 h-32 rounded-full bg-zinc-800 border border-white/5 flex items-center justify-center transition-all duration-300 hover:border-white/20 active:scale-90 shadow-lg">
                <svg id="mic-svg" xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 10v1a7 7 0 01-14 0v-1m14 0a7 7 0 00-7-7m7 7v4m-7-4V4" />
                </svg>
            </button>
        </div>

        <!-- Thinking Indicator -->
        <div id="thinking-indicator" class="hidden mb-6">
            <div class="thinking-bar rounded-full"></div>
            <p class="text-[10px] text-center mt-2 text-purple-400 font-bold uppercase tracking-tighter">Биас обрабатывает запрос...</p>
        </div>

        <!-- Dialog Area -->
        <div class="bg-black/40 rounded-3xl p-6 min-h-[160px] border border-white/5 flex flex-col justify-start">
            <p id="user-transcript" class="text-zinc-400 text-sm mb-4 italic leading-relaxed">Нажмите и скажите: "Включи Ватсап" или "Кто такой Лололошка?"</p>
            <div id="ai-response-container" class="hidden">
                <div class="w-full h-px bg-white/5 mb-4"></div>
                <p id="ai-text" class="text-blue-100 text-lg font-medium leading-snug"></p>
            </div>
        </div>

        <!-- Command Helper -->
        <div class="mt-6 grid grid-cols-3 gap-2 opacity-30">
            <div class="bg-white/5 py-2 px-1 rounded-lg text-center text-[8px] uppercase font-black">WhatsApp</div>
            <div class="bg-white/5 py-2 px-1 rounded-lg text-center text-[8px] uppercase font-black">YouTube</div>
            <div class="bg-white/5 py-2 px-1 rounded-lg text-center text-[8px] uppercase font-black">Telegram</div>
        </div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const apiKey = ""; // Ключ подставится автоматически
        const model = "gemini-2.5-flash-preview-09-2025";
        
        // --- ЭЛЕМЕНТЫ ---
        const btn = document.getElementById('main-btn');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const userText = document.getElementById('user-transcript');
        const aiText = document.getElementById('ai-text');
        const aiContainer = document.getElementById('ai-response-container');
        const thinking = document.getElementById('thinking-indicator');

        let recognition;
        let isListening = false;
        let audioCtx;

        // --- ЗВУКОВОЙ ОТКЛИК ---
        function beep(freq) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // --- ГОЛОСОВОЙ ДВИЖОК ---
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.interimResults = false;
            recognition.continuous = false;

            recognition.onstart = () => {
                isListening = true;
                btn.classList.add('mic-active');
                statusText.innerText = "Слушаю...";
                statusDot.className = "w-2 h-2 rounded-full bg-red-500 animate-pulse";
                beep(880);
            };

            recognition.onend = () => {
                isListening = false;
                btn.classList.remove('mic-active');
                statusText.innerText = "Готов к работе";
                statusDot.className = "w-2 h-2 rounded-full bg-blue-500";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userText.innerText = `Вы: "${transcript}"`;
                handleLogic(transcript.toLowerCase());
            };

            recognition.onerror = () => {
                userText.innerText = "Ошибка распознавания. Попробуйте еще раз.";
            };
        }

        btn.onclick = () => {
            if (isListening) recognition.stop();
            else recognition.start();
        };

        // --- ЛОГИКА КОМАНД ---
        function handleLogic(cmd) {
            // 1. YouTube
            if (cmd.includes('ютуб') || cmd.includes('youtube')) {
                let query = cmd.replace(/включи|открой|ютуб|youtube|канал/g, "").trim();
                speak(query ? `Ищу канал ${query}` : "Открываю Ютуб");
                const url = query 
                    ? `intent://www.youtube.com/results?search_query=${encodeURIComponent(query)}#Intent;scheme=http;package=com.google.android.youtube;end`
                    : `intent://www.youtube.com/#Intent;scheme=http;package=com.google.android.youtube;end`;
                window.location.href = url;
                return;
            }

            // 2. WhatsApp
            if (cmd.includes('ватсап') || cmd.includes('вацап') || cmd.includes('whatsapp')) {
                speak("Включаю Ватсап");
                window.location.href = "intent://send#Intent;scheme=whatsapp;package=com.whatsapp;end";
                return;
            }

            // 3. Telegram
            if (cmd.includes('телеграм') || cmd.includes('тг') || cmd.includes('telegram')) {
                speak("Включаю Телеграм");
                window.location.href = "intent://#Intent;scheme=tg;package=org.telegram.messenger;end";
                return;
            }

            // 4. VK
            if (cmd.includes('вк') || cmd.includes('вконтакте')) {
                speak("Включаю ВК");
                window.location.href = "intent://#Intent;scheme=vk;package=com.vkontakte.android;end";
                return;
            }

            // 5. Поиск (Google)
            if (cmd.includes('найди в гугле') || cmd.includes('поиск')) {
                let q = cmd.replace(/найди в гугле|поиск/g, "").trim();
                speak(`Ищу ${q}`);
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
                return;
            }

            // Если ничего не подошло — это вопрос к ИИ
            askGemini(cmd);
        }

        // --- РАБОТА С GEMINI ---
        async function askGemini(prompt) {
            thinking.classList.remove('hidden');
            aiContainer.classList.add('hidden');
            
            let retries = 0;
            const delays = [1000, 2000, 4000];

            const call = async () => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "Ты Beas, умный мужской ассистент. Отвечай кратко, не более 2 предложений. Голос мужской, уверенный." }] }
                        })
                    });
                    
                    if (!response.ok) throw new Error('API Error');
                    
                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Извините, я не смог найти ответ.";
                    
                    showAIResponse(text);
                } catch (e) {
                    if (retries < delays.length) {
                        setTimeout(call, delays[retries++]);
                    } else {
                        showAIResponse("Ошибка подключения к серверу Beas. Проверьте интернет.");
                    }
                } finally {
                    thinking.classList.add('hidden');
                }
            };

            call();
        }

        function showAIResponse(text) {
            aiContainer.classList.remove('hidden');
            aiText.innerText = text;
            speak(text);
        }

        // --- ГОЛОС (МУЖСКОЙ) ---
        function speak(text) {
            window.speechSynthesis.cancel(); // Остановить текущую речь
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ru-RU';
            msg.pitch = 0.8; // Низкий мужской тембр
            msg.rate = 1.0;
            
            // Ищем мужской голос
            const voices = window.speechSynthesis.getVoices();
            const male = voices.find(v => v.name.toLowerCase().includes('pavel') || v.name.toLowerCase().includes('dmitry')) || voices[0];
            if (male) msg.voice = male;

            window.speechSynthesis.speak(msg);
        }
        
        // Предотвращение засыпания голоса
        window.speechSynthesis.onvoiceschanged = () => {};
    </script>
</body>
</html>
