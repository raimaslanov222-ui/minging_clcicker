<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InfinityB: Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS: ДИЗАЙН И АНИМАЦИИ --- */
        :root {
            --red: #ff1a1a;
            --dark-red: #800000;
            --bg: #050508;
            --card: #11111b;
            --yellow: #ffcc00;
            --green: #00ff88;
            --blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Эффект шума на фоне */
        body::before {
            content: "";
            position: fixed; inset: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 10;
        }

        /* --- ШАПКА --- */
        .top-header {
            background: linear-gradient(180deg, var(--red) 0%, var(--dark-red) 100%);
            height: 130px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px 10px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 20;
            position: relative;
        }

        .header-left, .header-right { width: 50px; display: flex; justify-content: center; }

        .header-center { text-align: center; flex: 1; }
        .logo { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 1.8rem; 
            font-weight: 900; 
            margin: 0; 
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
        }
        
        #user-tag { 
            font-size: 0.6rem; 
            opacity: 0.8; 
            margin-top: 5px; 
            font-weight: 700; 
            letter-spacing: 1px;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }

        /* --- ОСНОВНОЙ ГЕЙМПЛЕЙ --- */
        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding-bottom: 20px;
        }

        .level-badge {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-bottom: 10px;
            color: var(--blue);
            font-weight: 900;
        }

        #balance {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            margin: 0 0 20px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255,26,26,0.3);
        }

        /* Кнопка кликера */
        .clicker-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
        }

        #main-clicker {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #333, #000);
            border: 8px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.05s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.1);
            position: relative;
            z-index: 5;
        }

        #main-clicker::after {
            content: "";
            position: absolute;
            inset: -15px;
            border-radius: 50%;
            border: 2px solid var(--red);
            opacity: 0.3;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        #main-clicker:active { transform: scale(0.92); }
        #main-clicker img { width: 90px; filter: drop-shadow(0 0 10px white); }

        /* Статы под кликером */
        .live-stats {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            background: var(--glass);
            padding: 10px 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .stat-group { text-align: center; }
        .stat-group label { display: block; font-size: 0.55rem; color: #888; font-weight: 900; margin-bottom: 3px; }
        .stat-group span { font-size: 0.9rem; font-weight: 900; color: var(--green); }

        /* --- МАГАЗИН --- */
        .shop-section {
            padding: 0 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .upgrade-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .upgrade-card.locked { opacity: 0.5; filter: grayscale(1); }
        
        .upgrade-info b { display: block; font-size: 0.9rem; color: #eee; }
        .upgrade-info small { color: #666; font-size: 0.7rem; }

        .price-tag {
            background: rgba(255, 204, 0, 0.1);
            color: var(--yellow);
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 204, 0, 0.3);
        }

        /* --- МОДАЛЬНЫЕ ОКНА --- */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--card);
            width: 90%;
            max-width: 400px;
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--red);
            position: relative;
            box-shadow: 0 0 50px rgba(255,0,0,0.2);
        }

        .modal-content h2 { 
            font-family: 'Orbitron'; 
            font-size: 1.4rem; 
            margin-bottom: 25px; 
            color: var(--red);
        }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            border-radius: 15px;
            color: #fff;
            font-family: inherit;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: none;
            font-weight: 900;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .btn-green { background: var(--green); color: #000; }
        .btn-yellow { background: var(--yellow); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-gray { background: #222; color: #888; }

        /* Таблица лидеров */
        .leader-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .leader-row.me { border: 1px solid var(--yellow); background: rgba(255, 204, 0, 0.05); }

        /* Эффекты клика */
        .floating-text {
            position: fixed;
            pointer-events: none;
            font-weight: 900;
            font-family: 'Orbitron';
            z-index: 2000;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-150px) scale(1.5); }
        }

        .icon-btn { 
            background: none; border: none; font-size: 1.6rem; cursor: pointer; 
            transition: 0.2s;
        }
        .icon-btn:active { transform: scale(0.8); }

    </style>
</head>
<body>

    <header class="top-header">
        <div class="header-left">
            <button class="icon-btn" onclick="UI.open('modal-leaders'); Logic.refreshLeaders();">🏆</button>
        </div>
        <div class="header-center">
            <h1 class="logo">INFINITY</h1>
            <div id="user-tag">СИНХРОНИЗАЦИЯ...</div>
        </div>
        <div class="header-right">
            <button class="icon-btn" onclick="UI.open('modal-settings')">⚙️</button>
        </div>
    </header>

    <main class="game-container">
        <div class="level-badge" id="lvl-display">LEVEL 1</div>
        <h1 id="balance">0</h1>
        
        <div class="clicker-wrapper">
            <div id="main-clicker">
                <img src="https://img.icons8.com/ios-filled/150/ffffff/clic.png" alt="TAP">
            </div>
        </div>

        <div class="live-stats">
            <div class="stat-group">
                <label>POWER</label>
                <span id="stat-p">1.0</span>
            </div>
            <div class="stat-group">
                <label>MULT</label>
                <span id="stat-m">x1.0</span>
            </div>
            <div class="stat-group">
                <label>AUTO</label>
                <span id="stat-a">0</span>
            </div>
        </div>
    </main>

    <section class="shop-section">
        <div class="upgrade-card" onclick="Logic.buy('power')">
            <div class="upgrade-info">
                <b>Neural Power</b>
                <small>Увеличивает силу клика на +1</small>
            </div>
            <div class="price-tag" id="cost-p">10</div>
        </div>

        <div class="upgrade-card" onclick="Logic.buy('mult')">
            <div class="upgrade-info">
                <b>Quantum Mult</b>
                <small>Множитель прибыли x1.2</small>
            </div>
            <div class="price-tag" id="cost-m">150</div>
        </div>

        <div class="upgrade-card" onclick="Logic.buy('auto')">
            <div class="upgrade-info">
                <b>Auto Drone</b>
                <small>Добывает валюту каждую секунду</small>
            </div>
            <div class="price-tag" id="cost-a">500</div>
        </div>
    </section>

    <div class="modal" id="modal-leaders">
        <div class="modal-content">
            <h2>🏆 TOP 10 PILOTS</h2>
            <div id="leader-list" style="margin-bottom: 20px;">
                </div>
            <button class="btn-action btn-gray" onclick="UI.closeAll()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div class="modal" id="modal-settings">
        <div class="modal-content">
            <h2>SYSTEM CONFIG</h2>
            <input type="text" id="inp-name" placeholder="Сменить позывной">
            <button class="btn-action btn-green" onclick="Logic.changeName()">ОБНОВИТЬ ДАННЫЕ</button>
            
            <button id="admin-trigger" class="btn-action btn-yellow" style="display:none" onclick="UI.open('modal-admin')">👑 ADMIN CORE</button>
            
            <button class="btn-action btn-red" style="margin-top: 20px;" onclick="Logic.logout()">ВЫЙТИ ИЗ СЕТИ</button>
            <button class="btn-action btn-gray" onclick="UI.closeAll()">НАЗАД</button>
        </div>
    </div>

    <div class="modal" id="modal-admin">
        <div class="modal-content" style="border-color: var(--yellow);">
            <h2 style="color: var(--yellow);">OVERRIDE TERMINAL</h2>
            <input type="text" id="adm-target" placeholder="ID (с #) или ИМЯ">
            <input type="number" id="adm-amount" placeholder="Количество">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-action btn-green" onclick="Admin.exec('give')">ADD MONEY</button>
                <button class="btn-action btn-red" onclick="Admin.exec('fine')">FINE</button>
                <button class="btn-action btn-red" onclick="Admin.exec('ban')" style="grid-column: span 2;">BAN USER (MINUTES)</button>
                <button class="btn-action btn-yellow" onclick="Admin.exec('reset')" style="grid-column: span 2;">HARD RESET PROGRESS</button>
            </div>
            
            <button class="btn-action btn-gray" style="margin-top: 15px;" onclick="UI.open('modal-settings')">НАЗАД</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, orderBy, limit, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- 1. FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyA6v-Qacyh1dDl7J8-XsQY6NxcGcNzBt9o",
            authDomain: "mindingclicker.firebaseapp.com",
            projectId: "mindingclicker",
            storageBucket: "mindingclicker.firebasestorage.app",
            messagingSenderId: "484824275063",
            appId: "1:484824275063:web:b98565344eea2760a34e72"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 2. ИГРОВЫЕ ПЕРЕМЕННЫЕ ---
        const ADMIN_EMAIL = "raimaslanov222@gmail.com";
        let state = {
            score: 0, power: 1, mult: 1, auto: 0,
            c1: 10, c2: 150, c3: 500,
            name: "Pilot", id: 0, lvl: 1,
            banUntil: 0
        };

        let isLoaded = false;

        // --- 3. ЛОГИКА ИГРЫ (Logic) ---
        window.Logic = {
            init: function(user) {
                if (user.email === ADMIN_EMAIL) document.getElementById('admin-trigger').style.display = 'block';
                
                this.loadData(user.uid);
                this.startHeartbeat();
            },

            loadData: async function(uid) {
                const docRef = doc(db, "leaders", uid);
                const snap = await getDoc(docRef);

                if (snap.exists()) {
                    state = { ...state, ...snap.data() };
                    if (state.banUntil > Date.now()) {
                        alert("ACCESS DENIED: ACCOUNT SUSPENDED.");
                        window.location.reload();
                    }
                } else {
                    state.id = Math.floor(1000 + Math.random() * 8999);
                    state.name = auth.currentUser.email.split('@')[0];
                    await setDoc(docRef, state);
                }

                isLoaded = true;
                UI.update();
            },

            tap: function(e) {
                if (!isLoaded) return;
                const gain = state.power * state.mult;
                state.score += gain;
                
                UI.spawnText(e.clientX, e.clientY, `+${this.format(gain)}`);
                UI.update();
            },

            buy: function(type) {
                if (type === 'power' && state.score >= state.c1) {
                    state.score -= state.c1;
                    state.power += 1;
                    state.c1 = Math.floor(state.c1 * 1.8);
                } else if (type === 'mult' && state.score >= state.c2) {
                    state.score -= state.c2;
                    state.mult += 0.25;
                    state.c2 = Math.floor(state.c2 * 2.8);
                } else if (type === 'auto' && state.score >= state.c3) {
                    state.score -= state.c3;
                    state.auto += 1;
                    state.c3 = Math.floor(state.c3 * 2.2);
                }
                UI.update();
                this.save();
            },

            changeName: async function() {
                const newName = document.getElementById('inp-name').value;
                if (newName.length > 2 && newName.length < 15) {
                    state.name = newName;
                    UI.update();
                    await this.save();
                    alert("ID UPDATED");
                }
            },

            format: function(num) {
                if (num >= 1e9) return (num/1e9).toFixed(2) + "B";
                if (num >= 1e6) return (num/1e6).toFixed(2) + "M";
                if (num >= 1e3) return (num/1e3).toFixed(1) + "K";
                return Math.floor(num);
            },

            save: async function() {
                if (auth.currentUser && isLoaded) {
                    await updateDoc(doc(db, "leaders", auth.currentUser.uid), state);
                }
            },

            startHeartbeat: function() {
                // Авто-сохранение каждые 15 сек
                setInterval(() => this.save(), 15000);
                // Авто-майнинг
                setInterval(() => {
                    if (state.auto > 0) {
                        state.score += (state.auto / 10);
                        UI.update();
                    }
                }, 100);
            },

            logout: () => signOut(auth).then(() => location.reload()),

            refreshLeaders: async function() {
                const q = query(collection(db, "leaders"), orderBy("score", "desc"), limit(10));
                const snap = await getDocs(q);
                const container = document.getElementById('leader-list');
                container.innerHTML = "";
                
                snap.forEach((d, index) => {
                    const data = d.data();
                    const isMe = data.id === state.id;
                    container.innerHTML += `
                        <div class="leader-row ${isMe ? 'me' : ''}">
                            <span>#${index+1} ${data.name}</span>
                            <b>${this.format(data.score)}</b>
                        </div>
                    `;
                });
            }
        };

        // --- 4. ИНТЕРФЕЙС (UI) ---
        window.UI = {
            update: function() {
                document.getElementById('balance').innerText = Logic.format(state.score);
                document.getElementById('user-tag').innerText = `${state.name.toUpperCase()} | #${state.id}`;
                document.getElementById('stat-p').innerText = state.power.toFixed(1);
                document.getElementById('stat-m').innerText = `x${state.mult.toFixed(1)}`;
                document.getElementById('stat-a').innerText = state.auto;
                
                document.getElementById('cost-p').innerText = Logic.format(state.c1);
                document.getElementById('cost-m').innerText = Logic.format(state.c2);
                document.getElementById('cost-a').innerText = Logic.format(state.c3);
                
                // Рассчет уровня (каждые 1000 кликов условно)
