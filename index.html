<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InfinityB - Master Admin Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS: КРУТОЙ ГУИ И АНИМАЦИИ --- */
        :root {
            --red: #ff1a1a;
            --dark-red: #8b0000;
            --bg: #050508;
            --card: #11111b;
            --yellow: #ffcc00;
            --green: #00ff88;
            --blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Динамический фон */
        .glow-bg {
            position: fixed; top: 50%; left: 50%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255, 26, 26, 0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -1; pointer-events: none;
        }

        /* --- ШАПКА КАК НА СКРИНШОТАХ --- */
        .header {
            background: linear-gradient(180deg, var(--red) 0%, var(--dark-red) 100%);
            height: 130px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px 10px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 100;
        }

        .logo-area { text-align: center; flex: 1; }
        .logo-text { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 1.8rem; 
            font-weight: 900; 
            margin: 0; 
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
        }
        
        #user-info { 
            font-size: 0.65rem; 
            opacity: 0.9; 
            margin-top: 5px; 
            font-weight: 700; 
            background: rgba(0,0,0,0.3);
            padding: 3px 12px;
            border-radius: 12px;
            display: inline-block;
        }

        /* --- ИГРОВОЕ ПОЛЕ --- */
        .game-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .lvl-tag {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-bottom: 10px;
            color: var(--blue);
            font-weight: 900;
        }

        #score-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            margin: 0 0 20px;
            font-weight: 900;
            text-shadow: 0 0 25px rgba(255,26,26,0.3);
        }

        .clicker-circle {
            width: 220px; height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #333, #000);
            border: 8px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.05s;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .clicker-circle:active { transform: scale(0.92); }
        .clicker-circle img { width: 90px; filter: drop-shadow(0 0 10px white); }

        /* Статистика */
        .stats-bar {
            display: flex; gap: 20px; margin-top: 30px;
            background: var(--glass); padding: 12px 25px;
            border-radius: 20px; border: 1px solid var(--border);
        }
        .stat-unit { text-align: center; }
        .stat-unit small { display: block; font-size: 0.55rem; color: #888; font-weight: 900; }
        .stat-unit span { font-size: 1rem; font-weight: 900; color: var(--green); }

        /* --- МАГАЗИН --- */
        .shop-list { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 10px; }
        .card {
            background: var(--card); border: 1px solid var(--border);
            padding: 15px 20px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .card b { display: block; font-size: 0.9rem; }
        .card span { color: #666; font-size: 0.7rem; }
        .price {
            background: rgba(255, 204, 0, 0.1); color: var(--yellow);
            padding: 8px 15px; border-radius: 12px; font-weight: 900;
            border: 1px solid rgba(255, 204, 0, 0.3);
        }

        /* --- МОДАЛКИ --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-box {
            background: var(--card); width: 88%; max-width: 400px;
            border-radius: 30px; padding: 30px; border: 1px solid var(--red);
        }
        .modal-box h2 { font-family: 'Orbitron'; color: var(--red); margin-bottom: 20px; }
        
        input {
            width: 100%; padding: 15px; background: #000; border: 1px solid #333;
            border-radius: 15px; color: #fff; margin-bottom: 12px;
        }

        .btn {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 8px;
        }
        .btn-green { background: var(--green); color: #000; }
        .btn-yellow { background: var(--yellow); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-gray { background: #333; color: #fff; }

        /* Всплывающий текст */
        .pop {
            position: fixed; pointer-events: none; font-weight: 900;
            font-family: 'Orbitron'; z-index: 2000; animation: popUp 0.8s forwards;
        }
        @keyframes popUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
        }

        .icon-btn { background: none; border: none; font-size: 1.6rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <header class="header">
        <button class="icon-btn" onclick="Core.open('modal-top'); Core.loadTop();">🏆</button>
        <div class="logo-area">
            <h1 class="logo-text">INFINITY</h1>
            <div id="user-info">СИНХРОНИЗАЦИЯ...</div>
        </div>
        <button class="icon-btn" onclick="Core.open('modal-cfg')">⚙️</button>
    </header>

    <main class="game-main">
        <div class="lvl-tag" id="lvl-ui">LEVEL 1</div>
        <h1 id="score-display">0</h1>
        
        <div class="clicker-circle" id="tap-btn">
            <img src="https://img.icons8.com/ios-filled/150/ffffff/mouse-cursor.png">
        </div>

        <div class="stats-bar">
            <div class="stat-unit"><small>СИЛА</small><span id="stat-p">1</span></div>
            <div class="stat-unit"><small>МНОЖИТЕЛЬ</small><span id="stat-m">x1</span></div>
            <div class="stat-unit"><small>АВТО</small><span id="stat-a">0</span></div>
        </div>
    </main>

    <footer class="shop-list">
        <div class="card" onclick="Game.buy('p')">
            <div><b>Neural Click</b><span>+1 к силе клика</span></div>
            <div class="price" id="c1">10</div>
        </div>
        <div class="card" onclick="Game.buy('m')">
            <div><b>Core Multiplier</b><span>Доход x1.25</span></div>
            <div class="price" id="c2">150</div>
        </div>
        <div class="card" onclick="Game.buy('a')">
            <div><b>Mining Bot</b><span>Добыча в сек.</span></div>
            <div class="price" id="c3">500</div>
        </div>
    </footer>

    <div class="modal" id="modal-top">
        <div class="modal-box">
            <h2>🏆 ТОП ПИЛОТОВ</h2>
            <div id="top-list" style="margin-bottom: 20px; text-align: left;"></div>
            <button class="btn btn-gray" onclick="Core.close()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div class="modal" id="modal-cfg">
        <div class="modal-box">
            <h2>НАСТРОЙКИ</h2>
            <input type="text" id="name-input" placeholder="Новый никнейм">
            <button class="btn btn-green" onclick="Game.setName()">ОБНОВИТЬ</button>
            <button id="admin-btn" class="btn btn-yellow" style="display:none" onclick="Core.open('modal-adm')">👑 АДМИН-ПАНЕЛЬ</button>
            <button class="btn btn-red" onclick="Game.exit()">ВЫЙТИ</button>
            <button class="btn btn-gray" onclick="Core.close()">НАЗАД</button>
        </div>
    </div>

    <div class="modal" id="modal-adm">
        <div class="modal-box" style="border-color: var(--yellow);">
            <h2 style="color: var(--yellow);">ADMIN PANEL</h2>
            <p style="font-size: 0.7rem; color: #888;">Введите Имя (Pilot) или ID (#1234)</p>
            <input type="text" id="adm-target" placeholder="Цель (Ник или ID)">
            <input type="number" id="adm-val" placeholder="Количество / Время">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn btn-green" onclick="Admin.run('give')">ВЫДАТЬ</button>
                <button class="btn btn-red" onclick="Admin.run('fine')">ШТРАФ</button>
                <button class="btn btn-red" onclick="Admin.run('ban')" style="grid-column: span 2;">БАН (МИНУТЫ)</button>
                <button class="btn btn-yellow" onclick="Admin.run('reset')" style="grid-column: span 2;">СБРОСИТЬ АККАУНТ</button>
            </div>
            <button class="btn btn-gray" onclick="Core.open('modal-cfg')">НАЗАД</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, orderBy, limit, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6v-Qacyh1dDl7J8-XsQY6NxcGcNzBt9o",
            authDomain: "mindingclicker.firebaseapp.com",
            projectId: "mindingclicker",
            storageBucket: "mindingclicker.firebasestorage.app",
            messagingSenderId: "484824275063",
            appId: "1:484824275063:web:b98565344eea2760a34e72"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "raimaslanov222@gmail.com";
        let state = { score: 0, power: 1, mult: 1, auto: 0, c1: 10, c2: 150, c3: 500, name: "Pilot", id: 0, banUntil: 0 };
        let ready = false;

        // --- CORE SYSTEM ---
        window.Core = {
            init: async (user) => {
                if(user.email === ADMIN_EMAIL) document.getElementById('admin-btn').style.display = 'block';
                const snap = await getDoc(doc(db, "leaders", user.uid));
                if(snap.exists()) {
                    state = { ...state, ...snap.data() };
                    if(state.banUntil > Date.now()) {
                        alert("ВЫ ЗАБАНЕНЫ ДО: " + new Date(state.banUntil).toLocaleString());
                        location.reload(); return;
                    }
                } else {
                    state.id = Math.floor(1000 + Math.random() * 8999);
                    state.name = user.email.split('@')[0];
                    await setDoc(doc(db, "leaders", user.uid), state);
                }
                ready = true;
                Core.update();
                setInterval(Core.save, 15000); // Авто-сейв
                setInterval(() => { if(state.auto > 0) { state.score += state.auto/10; Core.update(); } }, 100);
            },
            update: () => {
                if(!ready) return;
                document.getElementById('score-display').innerText = Core.fmt(state.score);
                document.getElementById('user-info').innerText = `${state.name.toUpperCase()} | #${state.id}`;
                document.getElementById('stat-p').innerText = state.power;
                document.getElementById('stat-m').innerText = `x${state.mult.toFixed(1)}`;
                document.getElementById('stat-a').innerText = state.auto;
                document.getElementById('c1').innerText = Core.fmt(state.c1);
                document.getElementById('c2').innerText = Core.fmt(state.c2);
                document.getElementById('c3').innerText = Core.fmt(state.c3);
                document.getElementById('lvl-ui').innerText = `LEVEL ${Math.floor(Math.sqrt(state.score/100))+1}`;
            },
            fmt: (n) => {
                if(n >= 1e9) return (n/1e9).toFixed(2) + "B";
                if(n >= 1e6) return (n/1e6).toFixed(2) + "M";
                if(n >= 1e3) return (n/1e3).toFixed(1) + "K";
                return Math.floor(n).toLocaleString();
            },
            save: () => auth.currentUser && updateDoc(doc(db, "leaders", auth.currentUser.uid), state),
            open: (id) => { Core.close(); document.getElementById(id).style.display = 'flex'; },
            close: () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'),
            loadTop: async () => {
                const q = query(collection(db, "leaders"), orderBy("score", "desc"), limit(10));
                const snap = await getDocs(q);
                const list = document.getElementById('top-list');
                list.innerHTML = "";
                snap.forEach((d, i) => {
                    const data = d.data();
                    list.innerHTML += `<div style="padding:10px; margin-bottom:5px; background:rgba(255,255,255,0.03); border-radius:10px; display:flex; justify-content:space-between;">
                        <span>#${i+1} ${data.name}</span><b>${Core.fmt(data.score)}</b>
                    </div>`;
                });
            }
        };

        // --- GAME LOGIC ---
        window.Game = {
            tap: (e) => {
                if(!ready) return;
                const gain = state.power * state.mult;
                state.score += gain;
                const p = document.createElement('div');
                p.className = 'pop'; p.innerText = `+${Core.fmt(gain)}`;
                p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
                p.style.color = `hsl(${Math.random()*360}, 80%, 70%)`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
                Core.update();
            },
            buy: (type) => {
                if(type === 'p' && state.score >= state.c1) { state.score -= state.c1; state.power++; state.c1 *= 1.8; }
                if(type === 'm' && state.score >= state.c2) { state.score -= state.c2; state.mult += 0.2; state.c2 *= 2.5; }
                if(type === 'a' && state.score >= state.c3) { state.score -= state.c3; state.auto++; state.c3 *= 2.1; }
                Core.update(); Core.save();
            },
            setName: async () => {
                const n = document.getElementById('name-input').value;
                if(n.length > 2) { state.name = n; Core.update(); await Core.save(); alert("НИК ИЗМЕНЕН"); }
            },
            exit: () => signOut(auth).then(() => location.reload())
        };

        // --- ADMIN SYSTEM (THE ONE YOU ASKED FOR) ---
        window.Admin = {
            run: async (cmd) => {
                const target = document.getElementById('adm-target').value;
                const val = parseFloat(document.getElementById('adm-val').value) || 0;
                
                // Умный поиск: по ID (если есть #) или по Имени
                let q = target.startsWith('#') ? 
                    query(collection(db, "leaders"), where("id", "==", parseInt(target.replace('#','')))) :
                    query(collection(db, "leaders"), where("name", "==", target));

                const snap = await getDocs(q);
                if(snap.empty) return alert("ПИЛОТ НЕ НАЙДЕН!");

                const userDoc = snap.docs[0];
                const d = userDoc.data();

                if(cmd === 'give') await updateDoc(userDoc.ref, { score: d.score + val });
                if(cmd === 'fine') await updateDoc(userDoc.ref, { score: Math.max(0, d.score - val) });
                if(cmd === 'ban') await updateDoc(userDoc.ref, { banUntil: Date.now() + (val * 60000) });
                if(cmd === 'reset') await updateDoc(userDoc.ref, { score: 0, power: 1, mult: 1, auto: 0, c1: 10, c2: 150, c3: 500 });
                
                alert("КОМАНДА ВЫПОЛНЕНА!");
            }
        };

        onAuthStateChanged(auth, (u) => { if(u) Core.init(u); });
        document.getElementById('tap-btn').onclick = (e) => Game.tap(e);
    </script>
</body>
</html>
