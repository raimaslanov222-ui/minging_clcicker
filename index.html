<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Clicker: Super Save</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --neon-red: #ff0000;
            --dark-red: #4d0000;
            --gold: #ffd700;
            --glass: rgba(15, 15, 20, 0.95);
            --accent-blue: #00d4ff;
            --neon-green: #39ff14;
        }

        body {
            background: var(--bg); color: #fff;
            font-family: 'Montserrat', sans-serif; margin: 0;
            padding-bottom: 80px; user-select: none; overflow-x: hidden;
        }

        /* ТОСТ-УВЕДОМЛЕНИЕ */
        #toast {
            position: fixed; top: 115px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: var(--glass); border: 1px solid var(--accent-blue);
            padding: 10px 20px; border-radius: 15px; z-index: 10000;
            font-family: 'Orbitron'; font-size: 0.7rem; color: #fff;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2);
            opacity: 0; transition: 0.3s; pointer-events: none; text-align: center;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ШАПКА */
        header {
            background: linear-gradient(180deg, var(--dark-red), #000);
            height: 100px; display: flex; align-items: center;
            justify-content: space-between; padding: 0 15px;
            border-bottom: 3px solid var(--neon-red); position: sticky; top: 0; z-index: 1000;
        }
        .header-stat { text-align: center; flex: 1; }
        .header-stat small { font-family: 'Orbitron'; font-size: 0.55rem; color: var(--gold); }
        .header-stat div { font-family: 'Orbitron'; font-weight: 900; font-size: 1.1rem; }

        .circle-btn {
            width: 38px; height: 38px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--neon-red); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.3s ease;
        }

        /* ИГРОВОЙ ЭКРАН */
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #balance { font-family: 'Orbitron'; font-size: 2.8rem; text-shadow: 0 0 20px var(--neon-red); text-align: center; margin: 10px 0; word-break: break-all; }
        .dps-counter { text-align: center; color: var(--gold); font-family: 'Orbitron'; font-size: 0.8rem; margin-bottom: 15px; }

        .click-section { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .click-btn {
            width: 200px; height: 200px;
            background: radial-gradient(circle, var(--neon-red), #200);
            border-radius: 50%; border: 6px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 50px rgba(255,0,0,0.4); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.05s;
        }
        .click-btn:active { transform: scale(0.92); }
        .click-btn span { font-family: 'Orbitron'; font-weight: 900; font-size: 2rem; pointer-events: none; }

        .click-stats-panel {
            background: rgba(255, 255, 255, 0.03); border: 1px solid #222;
            border-radius: 20px; padding: 15px; width: 260px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .stat-line { display: flex; justify-content: space-between; font-size: 0.75rem; font-family: 'Orbitron'; }
        .total-line { border-top: 1px solid #333; margin-top: 5px; padding-top: 5px; color: var(--neon-green) !important; font-size: 0.9rem !important; }

        /* МАГАЗИН */
        .card-item {
            background: rgba(255,255,255,0.03); border: 1px solid #222;
            padding: 15px; border-radius: 15px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .buy-btn { background: var(--gold); border: none; padding: 10px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 0.7rem; min-width: 85px; }
        .buy-btn:disabled { background: #333; color: #666; }

        /* НАВИГАЦИЯ */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #08080a; display: flex; border-top: 1px solid #222; z-index: 2000;
        }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 0.65rem; text-decoration: none; }
        .nav-link.active { color: var(--neon-red); border-top: 2px solid var(--neon-red); }

        /* МОДАЛКИ */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; }
        .modal-box { background: var(--glass); border: 2px solid var(--neon-red); border-radius: 30px; padding: 25px; max-width: 400px; margin: 40px auto; position: relative; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; background: #000; color: #fff; border: 1px solid #333; text-align: center; box-sizing: border-box; font-family: 'Orbitron'; }
        .ui-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }

        .particle { position: absolute; pointer-events: none; font-family: 'Orbitron'; animation: float 0.6s forwards; font-weight: 900; z-index: 3000; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }

        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--glass); border: 2px solid var(--neon-red); padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="font-family:'Orbitron'; color:var(--gold)">ACCESS</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button class="ui-btn" style="background:var(--gold)" onclick="handleAuth('login')">ВХОД</button>
        <button class="ui-btn" style="background:#222; color:#fff; margin-top: 10px" onclick="handleAuth('reg')">РЕГИСТРАЦИЯ</button>
    </div>
</div>

<header>
    <div class="header-stat">
        <small>БАЛАНС</small>
        <div id="h-bal">0</div>
    </div>
    <div class="header-stat">
        <small>РЕКОРД</small>
        <div id="h-rec">0</div>
    </div>
    <div class="header-btns" style="display:flex; gap:10px">
        <div id="settings-btn" class="circle-btn" onclick="openMod('set-mod')">⚙️</div>
        <div class="circle-btn" onclick="openMod('adm-mod'); loadAdmUsers();" style="border-color:var(--accent-blue)">🛡️</div>
    </div>
</header>

<div id="game-pg" class="page active">
    <div id="balance">0</div>
    <div class="dps-counter">ДОХОД: +<span id="dps-val">0</span>/СЕК</div>
    
    <div class="click-section">
        <div class="click-btn" id="tap"><span>TAP</span></div>
        <div class="click-stats-panel">
            <div class="stat-line"><span>БАЗА:</span> <span id="p-power">+1</span></div>
            <div class="stat-line"><span>МНОЖИТЕЛЬ:</span> <span id="p-mult">x1</span></div>
            <div class="stat-line total-line"><span>ЗА КЛИК:</span> <span id="p-total">1</span></div>
        </div>
    </div>
    <div style="text-align:center; margin-top:20px; font-size:0.6rem; color:#444">
        ID: <span id="my-id">...</span> | НИК: <span id="my-nick">...</span>
    </div>
</div>

<div id="shop-pg" class="page">
    <h2 style="text-align:center; font-family:'Orbitron'; color:var(--gold)">MARKET</h2>
    <div id="shop-list"></div>
</div>

<div id="top-pg" class="page">
    <h2 style="text-align:center; font-family:'Orbitron'; color:var(--gold)">LEADERS</h2>
    <table style="width:100%; border-collapse:collapse; font-size: 0.8rem;" id="top-list"></table>
</div>

<div class="bottom-nav">
    <div class="nav-link active" onclick="showPg('game-pg')">🎮<br>Игра</div>
    <div class="nav-link" onclick="showPg('shop-pg')">🛒<br>Рынок</div>
    <div class="nav-link" onclick="showPg('top-pg')">🏆<br>Топ</div>
</div>

<div id="set-mod" class="modal-overlay">
    <div class="modal-box">
        <h2 style="font-family:'Orbitron'">PROFILE</h2>
        <input type="text" id="nick-in" placeholder="Новый ник">
        <button class="ui-btn" style="background:var(--gold)" onclick="saveNick()">СОХРАНИТЬ</button>
        <button class="ui-btn" style="background:#111; color:#fff; margin-top:10px" onclick="closeMod('set-mod')">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="adm-mod" class="modal-overlay">
    <div class="modal-box" style="border-color:var(--accent-blue)">
        <h2 style="color:var(--accent-blue); font-family:'Orbitron'">ADMIN PANEL</h2>
        <div style="max-height:120px; overflow-y:auto; background:#000; padding:10px; font-size:0.7rem; margin-bottom:10px; border-radius:10px" id="adm-users"></div>
        <input type="text" id="adm-target" placeholder="НИК или ID">
        <input type="number" id="adm-sum" placeholder="СУММА">
        <button class="ui-btn" style="background:var(--accent-blue); color:#000" onclick="admGive()">ВЫДАТЬ СРЕДСТВА</button>
        <button class="ui-btn" style="background:#000; color:#fff; margin-top:10px; border:1px solid #333" onclick="closeMod('adm-mod')">ВЫХОД</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, orderBy, limit, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDRv2Q060oBb1_1NXuqU4ixLVGy6EEr3To",
        authDomain: "infinity-clicker-7e01c.firebaseapp.com",
        projectId: "infinity-clicker-7e01c",
        storageBucket: "infinity-clicker-7e01c.firebasestorage.app",
        messagingSenderId: "888672687755",
        appId: "1:888672687755:web:6dda24bd7e4809c4d5668e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let state = { score: 0, maxScore: 0, nickname: "Игрок", shortId: 0, dps: 0, clickPower: 1, multiplier: 1, upgrades: {} };
    let isSaving = false;

    // СИСТЕМА СОКРАЩЕНИЯ ЧИСЕЛ
    function nF(num) {
        if (num === undefined || num === null) return "0";
        if (num < 1000) return Math.floor(num);
        const suffixes = ["", "K", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "Ud", "Dd", "Td"];
        const suffixNum = Math.floor(("" + Math.floor(num)).length / 3);
        let shortValue = parseFloat((suffixNum != 0 ? (num / Math.pow(1000, suffixNum)) : num).toPrecision(3));
        if (shortValue % 1 != 0) shortValue = shortValue.toFixed(1);
        return shortValue + suffixes[suffixNum];
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // УСИЛЕННОЕ СОХРАНЕНИЕ
    async function save() {
        if (!auth.currentUser || isSaving) return;
        isSaving = true;
        const sBtn = document.getElementById('settings-btn');
        if(sBtn) sBtn.style.borderColor = 'var(--neon-green)';

        try {
            await updateDoc(doc(db, "users", auth.currentUser.uid), state);
        } catch (e) {
            console.error("Save error:", e);
        } finally {
            isSaving = false;
            setTimeout(() => { if(sBtn) sBtn.style.borderColor = 'var(--neon-red)'; }, 500);
        }
    }

    function updateUI() {
        document.getElementById('balance').innerText = nF(state.score);
        document.getElementById('h-bal').innerText = nF(state.score);
        document.getElementById('h-rec').innerText = nF(state.maxScore);
        document.getElementById('dps-val').innerText = nF(state.dps * state.multiplier);
        document.getElementById('my-nick').innerText = state.nickname;
        document.getElementById('my-id').innerText = state.shortId;

        document.getElementById('p-power').innerText = '+' + nF(state.clickPower);
        document.getElementById('p-mult').innerText = 'x' + state.multiplier;
        document.getElementById('p-total').innerText = nF(state.clickPower * state.multiplier);
        renderShop();
    }

    const shopItems = [
        { id: 'm1', type: 'mult', name: 'МНОЖИТЕЛЬ X2', price: 5000, desc: 'Удвоение всего дохода!' },
        { id: 'c1', type: 'click', name: 'СИЛА КЛИКА +1', price: 75, desc: 'Усиление базового тапа' },
        { id: 's1', type: 'dps', name: 'Раб', price: 100, val: 1, desc: '+1 монета/сек' },
        { id: 's2', type: 'dps', name: 'Авто-кликер', price: 1000, val: 12, desc: '+12 монет/сек' }
    ];

    function renderShop() {
        const list = document.getElementById('shop-list');
        list.innerHTML = '';
        shopItems.forEach(item => {
            const count = state.upgrades[item.id] || 0;
            const growth = item.type === 'mult' ? 5 : (item.type === 'click' ? 1.7 : 1.4);
            const cost = Math.floor(item.price * Math.pow(growth, count));
            list.innerHTML += `
                <div class="card-item">
                    <div style="flex:1">
                        <h4 style="margin:0; font-family:'Orbitron'; color:var(--neon-red); font-size:0.8rem">${item.name}</h4>
                        <p style="margin:4px 0; font-size:0.6rem; color:#888">${item.desc} [${count}]</p>
                    </div>
                    <button class="buy-btn" ${state.score < cost ? 'disabled' : ''} onclick="buy('${item.id}', ${cost}, '${item.type}', ${item.val || 0})">💰 ${nF(cost)}</button>
                </div>
            `;
        });
    }

    window.buy = (id, cost, type, val) => {
        if(state.score >= cost) {
            state.score -= cost;
            state.upgrades[id] = (state.upgrades[id] || 0) + 1;
            if(type === 'mult') state.multiplier *= 2;
            if(type === 'click') state.clickPower += 1;
            if(type === 'dps') state.dps += val;
            updateUI(); 
            save(); // Сохранение при покупке
        }
    };

    document.getElementById('tap').onclick = (e) => {
        const gain = state.clickPower * state.multiplier;
        state.score += gain;
        if (state.score > state.maxScore) state.maxScore = state.score;
        
        const p = document.createElement('div');
        p.className = 'particle'; p.style.left = e.pageX + 'px'; p.style.top = e.pageY + 'px';
        p.innerText = '+' + nF(gain); 
        p.style.color = state.multiplier > 1 ? 'var(--neon-green)' : '#fff';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 600);
        updateUI();
    };

    setInterval(() => {
        if(state.dps > 0) {
            state.score += (state.dps * state.multiplier);
            if (state.score > state.maxScore) state.maxScore = state.score;
            updateUI();
        }
    }, 1000);

    // Автосохранение каждые 5 секунд
    setInterval(save, 5000);
    window.addEventListener('beforeunload', save);

    // ВХОД / РЕГИСТРАЦИЯ
    window.handleAuth = async (m) => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        try {
            if(m === 'login') await signInWithEmailAndPassword(auth, e, p);
            else {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                state.shortId = Math.floor(Math.random() * 90000) + 10000;
                await setDoc(doc(db, "users", res.user.uid), state);
            }
        } catch(err) { alert(err.message); }
    };

    onAuthStateChanged(auth, async (u) => {
        if(u) {
            document.getElementById('auth-screen').style.display = 'none';
            const s = await getDoc(doc(db, "users", u.uid));
            if(s.exists()) {
                const data = s.data();
                state = { ...state, ...data, score: Number(data.score) || 0, maxScore: Number(data.maxScore) || 0 };
            }
            updateUI(); loadTop();
        } else { document.getElementById('auth-screen').style.display = 'flex'; }
    });

    window.showPg = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    };

    async function loadTop() {
        const q = query(collection(db, "users"), orderBy("maxScore", "desc"), limit(10));
        const sn = await getDocs(q);
        const l = document.getElementById('top-list'); l.innerHTML = '';
        let r = 1;
        sn.forEach(d => {
            const u = d.data();
            l.innerHTML += `<tr style="border-bottom:1px solid #111"><td style="padding:10px; color:red">#${r}</td><td>${u.nickname}</td><td style="text-align:right">${nF(u.maxScore)}</td></tr>`;
            r++;
        });
    }

    // АДМИНКА
    window.loadAdmUsers = async () => {
        const sn = await getDocs(collection(db, "users"));
        const box = document.getElementById('adm-users'); box.innerHTML = '';
        sn.forEach(d => { const u = d.data(); box.innerHTML += `<div><b>${u.nickname}</b> (ID:${u.shortId}) - ${nF(u.score)}</div>`; });
    }

    window.admGive = async () => {
        const target = document.getElementById('adm-target').value;
        const amount = Number(document.getElementById('adm-sum').value);
        if(!target || isNaN(amount)) return;

        const q1 = query(collection(db, "users"), where("nickname", "==", target));
        const q2 = query(collection(db, "users"), where("shortId", "==", parseInt(target) || 0));
        const r1 = await getDocs(q1); const r2 = await getDocs(q2);
        
        let uDoc = r1.empty ? (r2.empty ? null : r2.docs[0]) : r1.docs[0];
        
        if(uDoc) { 
            const uRef = doc(db, "users", uDoc.id);
            const cur = uDoc.data();
            const newS = (Number(cur.score) || 0) + amount;
            await updateDoc(uRef, { score: newS, maxScore: Math.max(Number(cur.maxScore) || 0, newS) });
            
            showToast(`ВЫДАНО: ${target} +${nF(amount)}💰`);
            loadAdmUsers();
            if(uDoc.id === auth.currentUser.uid) { state.score = newS; updateUI(); }
        } else { showToast("НЕ НАЙДЕН"); }
    };

    window.openMod = (id) => document.getElementById(id).style.display = 'block';
    window.closeMod = (id) => document.getElementById(id).style.display = 'none';
    window.saveNick = async () => {
        const n = document.getElementById('nick-in').value;
        if(n) { state.nickname = n; updateUI(); await save(); closeMod('set-mod'); }
    };
</script>
</body>
</html>
