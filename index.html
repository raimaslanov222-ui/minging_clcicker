<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minding Clicker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --glass: rgba(17, 17, 27, 0.8);
            --neon-red: #ff1a1a;
            --dark-red: #8b0000;
            --text: #ffffff;
            --accent: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- HEADER --- */
        header {
            background: linear-gradient(180deg, var(--neon-red) 0%, var(--dark-red) 100%);
            height: 120px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(255, 26, 26, 0.3);
            position: relative;
            z-index: 10;
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; letter-spacing: 2px; }
        #user-info { font-size: 0.8rem; opacity: 0.8; margin-top: 5px; }

        /* --- MAIN LAYOUT --- */
        .container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        .balance-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-top: -30px;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.2);
        }

        #score-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--accent);
            text-shadow: 0 0 15px var(--neon-red);
        }

        #level-display { font-size: 1rem; color: #aaa; }

        /* --- TAP AREA --- */
        .click-area {
            margin: 40px 0;
            position: relative;
        }

        #tap-target {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--neon-red) 0%, var(--dark-red) 100%);
            border-radius: 50%;
            margin: 0 auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(255, 26, 26, 0.4);
            transition: transform 0.1s ease;
            user-select: none;
            animation: pulse 2s infinite;
        }

        #tap-target:active { transform: scale(0.92); }

        @keyframes pulse {
            0% { box-shadow: 0 0 30px rgba(255, 26, 26, 0.4); }
            50% { box-shadow: 0 0 60px rgba(255, 26, 26, 0.7); }
            100% { box-shadow: 0 0 30px rgba(255, 26, 26, 0.4); }
        }

        /* --- SHOP & STATS --- */
        .shop {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }

        .upgrade-card {
            background: var(--glass);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .upgrade-card:hover { border-color: var(--accent); }

        .upgrade-info { text-align: left; }
        .upgrade-name { font-weight: bold; display: block; }
        .upgrade-cost { font-size: 0.85rem; color: #ffbcbc; }

        button.buy-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
        }

        button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* --- FLOATING TEXT --- */
        .particle {
            position: absolute;
            pointer-events: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            z-index: 100;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* --- ADMIN PANEL --- */
        #admin-btn {
            position: fixed;
            bottom: 10px;
            right: 10px;
            display: none;
            background: #333;
            color: yellow;
            border: 1px solid yellow;
            padding: 5px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #111;
            padding: 20px;
            border-radius: 15px;
            max-width: 400px;
            margin: 50px auto;
            border: 1px solid var(--accent);
        }

        input {
            width: 100%; padding: 10px; margin: 10px 0;
            background: #222; border: 1px solid #444; color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>MINDING CLICKER</h1>
        <div id="user-info">Подключение...</div>
    </header>

    <div class="container">
        <div class="balance-card">
            <div id="score-display">0</div>
            <div id="level-display">Level: 1</div>
            <div id="dps-display" style="font-size: 0.8rem; color: #00ff00;">DPS: 0</div>
        </div>

        <div class="click-area">
            <div id="tap-target">
                <span style="font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem;">TAP</span>
            </div>
        </div>

        <div class="shop">
            <div class="upgrade-card">
                <div class="upgrade-info">
                    <span class="upgrade-name">Click Power</span>
                    <span class="upgrade-cost" id="cost-0">Cost: 15</span>
                </div>
                <button class="buy-btn" id="buy-0">BUY</button>
            </div>
            <div class="upgrade-card">
                <div class="upgrade-info">
                    <span class="upgrade-name">Auto-Bot (DPS)</span>
                    <span class="upgrade-cost" id="cost-1">Cost: 100</span>
                </div>
                <button class="buy-btn" id="buy-1">BUY</button>
            </div>
            <div class="upgrade-card">
                <div class="upgrade-info">
                    <span class="upgrade-name">Super Multiplier</span>
                    <span class="upgrade-cost" id="cost-2">Cost: 1.0K</span>
                </div>
                <button class="buy-btn" id="buy-2">BUY</button>
            </div>
        </div>
    </div>

    <button id="admin-btn">ADMIN PANEL</button>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <h3>Admin System</h3>
            <input type="text" id="target-id" placeholder="User Nickname or ID">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button class="buy-btn" id="admin-give">Give Credits</button>
                <button class="buy-btn" id="admin-fine" style="background: orange;">Fine</button>
                <button class="buy-btn" id="admin-ban" style="background: red;">Ban 24h</button>
                <button class="buy-btn" id="admin-wipe" style="background: darkred;">WIPE</button>
            </div>
            <button onclick="window.Game.closeAdmin()" style="margin-top: 10px; background: none; color: white; border: none; cursor: pointer;">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6v-Qacyh1dDl7J8-XsQY6NxcGcNzBt9o",
            authDomain: "mindingclicker.firebaseapp.com",
            projectId: "mindingclicker",
            storageBucket: "mindingclicker.appspot.com",
            messagingSenderId: "9563821010",
            appId: "1:9563821010:web:8e360f08e70a1e0f6b4d2d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- GAME STATE ---
        let state = {
            score: 0,
            clickPower: 1,
            multiplier: 1,
            dps: 0,
            upgrades: [0, 0, 0], // counts
            lastSave: Date.now(),
            isBanned: false,
            banUntil: 0
        };

        const OWNER_EMAIL = "raimaslanov222@gmail.com";
        const UPGRADE_DATA = [
            { baseCost: 15, scale: 1.8, type: 'click' },
            { baseCost: 100, scale: 2.1, type: 'dps' },
            { baseCost: 1000, scale: 2.5, type: 'multi' }
        ];

        // --- UTILS ---
        const formatNumber = (num) => {
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return Math.floor(num).toString();
        };

        const getCost = (index) => {
            const upg = UPGRADE_DATA[index];
            return Math.floor(upg.baseCost * Math.pow(upg.scale, state.upgrades[index]));
        };

        // --- UI CORE ---
        const updateUI = () => {
            document.getElementById('score-display').innerText = formatNumber(state.score);
            const level = Math.sqrt(state.score / 100) + 1;
            document.getElementById('level-display').innerText = `Level: ${Math.floor(level)}`;
            document.getElementById('dps-display').innerText = `DPS: ${formatNumber(state.dps * state.multiplier)}`;

            UPGRADE_DATA.forEach((_, i) => {
                const cost = getCost(i);
                document.getElementById(`cost-${i}`).innerText = `Cost: ${formatNumber(cost)}`;
                document.getElementById(`buy-${i}`).disabled = state.score < cost;
            });
        };

        const createParticle = (x, y) => {
            const p = document.createElement('div');
            p.className = 'particle';
            const val = state.clickPower * state.multiplier;
            p.innerText = `+${formatNumber(val)}`;
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.style.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        };

        // --- DATABASE ---
        async function saveToDB() {
            if (!auth.currentUser) return;
            const ref = doc(db, "users", auth.currentUser.uid);
            await setDoc(ref, {
                ...state,
                uid: auth.currentUser.uid,
                email: auth.currentUser.email || "anon",
                updatedAt: Date.now()
            }, { merge: true });
            console.log("Progress Saved");
        }

        async function loadData(user) {
            const ref = doc(db, "users", user.uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                const data = snap.data();
                if (data.banUntil && data.banUntil > Date.now()) {
                    alert("YOUR ACCOUNT IS BANNED until " + new Date(data.banUntil).toLocaleString());
                    state.isBanned = true;
                    document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:100px;'>BANNED</h1>";
                    return;
                }
                state = { ...state, ...data };
            }
            if (user.email === OWNER_EMAIL) {
                document.getElementById('admin-btn').style.display = 'block';
            }
            document.getElementById('user-info').innerText = user.email || `Guest#${user.uid.slice(0,4)}`;
            updateUI();
        }

        // --- GAME ACTIONS ---
        window.Game = {
            click: (e) => {
                if (state.isBanned) return;
                const gain = state.clickPower * state.multiplier;
                state.score += gain;
                createParticle(e.pageX, e.pageY);
                updateUI();
            },
            buy: (index) => {
                const cost = getCost(index);
                if (state.score >= cost) {
                    state.score -= cost;
                    state.upgrades[index]++;
                    
                    // Apply upgrade
                    if (index === 0) state.clickPower += 2;
                    if (index === 1) state.dps += 5;
                    if (index === 2) state.multiplier += 0.5;
                    
                    updateUI();
                    saveToDB();
                }
            },
            openAdmin: () => {
                document.getElementById('admin-modal').style.display = 'block';
            },
            closeAdmin: () => {
                document.getElementById('admin-modal').style.display = 'none';
            },
            adminCommand: async (cmd) => {
                const target = document.getElementById('target-id').value;
                if (!target) return alert("Enter target ID/Email");
                
                // Search for user
                const q = query(collection(db, "users"), where("email", "==", target));
                const snap = await getDocs(q);
                
                if (snap.empty) return alert("User not found");
                const userDoc = snap.docs[0];
                const userRef = doc(db, "users", userDoc.id);

                switch(cmd) {
                    case 'give': await updateDoc(userRef, { score: userDoc.data().score + 1000000 }); break;
                    case 'fine': await updateDoc(userRef, { score: 0 }); break;
                    case 'ban': await updateDoc(userRef, { banUntil: Date.now() + 86400000 }); break;
                    case 'wipe': await updateDoc(userRef, { score: 0, upgrades: [0,0,0], clickPower: 1, dps: 0, multiplier: 1 }); break;
                }
                alert("Command executed!");
            }
        };

        // --- INITIALIZATION ---
        document.getElementById('tap-target').onclick = (e) => window.Game.click(e);
        document.getElementById('buy-0').onclick = () => window.Game.buy(0);
        document.getElementById('buy-1').onclick = () => window.Game.buy(1);
        document.getElementById('buy-2').onclick = () => window.Game.buy(2);
        document.getElementById('admin-btn').onclick = () => window.Game.openAdmin();
        
        document.getElementById('admin-give').onclick = () => window.Game.adminCommand('give');
        document.getElementById('admin-fine').onclick = () => window.Game.adminCommand('fine');
        document.getElementById('admin-ban').onclick = () => window.Game.adminCommand('ban');
        document.getElementById('admin-wipe').onclick = () => window.Game.adminCommand('wipe');

        onAuthStateChanged(auth, (user) => {
            if (user) loadData(user);
            else signInAnonymously(auth);
        });

        // Loop: DPS & Auto-save
        setInterval(() => {
            if (state.dps > 0 && !state.isBanned) {
                state.score += (state.dps * state.multiplier) / 10;
                updateUI();
            }
        }, 100);

        setInterval(() => saveToDB(), 15000);
    </script>
</body>
</html>
