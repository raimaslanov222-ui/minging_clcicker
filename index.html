<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glass OS Ultra - Liquid Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root {
            /* Конфигурация Liquid Glass */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 60%);
            --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            --blur-val: 25px;
            --saturate-val: 190%;
            --accent: #00bcd4;
            --text-main: #ffffff;
        }

        body, html { 
            height: 100%; margin: 0; overflow: hidden; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #000;
        }

        #wallpaper {
            position: fixed; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1635776062127-d379bfcba9f8?q=80&w=2000') center/cover;
            z-index: -1; 
            transition: 0.8s;
            filter: contrast(115%) brightness(85%);
        }

        /* Desktop */
        #desktop {
            height: calc(100% - 90px); padding: 25px;
            display: flex; flex-direction: column; gap: 25px;
            align-items: flex-start;
        }

        .icon {
            width: 80px; text-align: center; color: white; font-size: 11px;
            touch-action: none; user-select: none;
            transition: transform 0.1s;
        }
        .icon:active { transform: scale(0.9); }

        .icon-img {
            width: 65px; height: 65px; 
            background: rgba(255, 255, 255, 0.06);
            background-image: var(--glass-shine);
            backdrop-filter: blur(15px) saturate(150%);
            -webkit-backdrop-filter: blur(15px) saturate(150%);
            border-radius: 18px;
            border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 6px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Glass Windows */
        .window {
            position: absolute; top: 15%; left: 5%; width: 90%; height: 70%;
            background: var(--glass-bg);
            background-image: var(--glass-shine);
            backdrop-filter: blur(var(--blur-val)) saturate(var(--saturate-val));
            -webkit-backdrop-filter: blur(var(--blur-val)) saturate(var(--saturate-val));
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: var(--glass-shadow);
            display: none; flex-direction: column; z-index: 10;
            overflow: hidden;
            animation: openWin 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            touch-action: none;
        }

        @keyframes openWin {
            from { transform: scale(0.8) translateY(30px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .win-header {
            padding: 18px 22px; display: flex; justify-content: space-between; align-items: center;
            cursor: move; background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid var(--glass-border);
            color: var(--text-main); font-weight: 600;
        }

        .btn-close { 
            background: #ff5f57; border: none; width: 14px; height: 14px; 
            border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 12px rgba(255, 95, 87, 0.6);
        }

        .win-body { flex: 1; padding: 20px; overflow-y: auto; color: var(--text-main); }

        /* UI Elements */
        video { width: 100%; border-radius: 15px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        #gallery-grid img { width: 100%; border-radius: 12px; border: 1px solid var(--glass-border); }

        button, input[type="text"] {
            background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
            color: white; padding: 12px; border-radius: 12px; width: 100%;
            backdrop-filter: blur(5px); margin-bottom: 10px; font-size: 14px;
        }

        /* Dock Bar */
        #dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; height: 70px;
            background: rgba(255, 255, 255, 0.05);
            background-image: var(--glass-shine);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 24px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            z-index: 1000;
        }

        .dock-item { font-size: 30px; transition: 0.2s; cursor: pointer; }
        .dock-item:active { transform: translateY(-10px) scale(1.2); }
    </style>
</head>
<body>

<div id="wallpaper"></div>

<div id="desktop">
    <div class="icon" onclick="openApp('camera')">
        <div class="icon-img">📸</div><span>Камера</span>
    </div>
    <div class="icon" onclick="openApp('gallery')">
        <div class="icon-img">🖼️</div><span>Галерея</span>
    </div>
    <div class="icon" onclick="openApp('settings')">
        <div class="icon-img">⚙️</div><span>Настройки</span>
    </div>
</div>

<div id="win-camera" class="window">
    <div class="win-header"><span>HD Camera</span><button class="btn-close" onclick="closeApp('camera')"></button></div>
    <div class="win-body">
        <video id="cam-video" autoplay playsinline></video>
        <button onclick="startCam()" style="margin-top:15px; background: var(--accent);">Включить объектив</button>
    </div>
</div>

<div id="win-gallery" class="window">
    <div class="win-header"><span>Галерея</span><button class="btn-close" onclick="closeApp('gallery')"></button></div>
    <div class="win-body">
        <input type="file" id="file-input" multiple hidden onchange="loadImages(this.files)">
        <button onclick="document.getElementById('file-input').click()">Загрузить из памяти</button>
        <div id="gallery-grid"></div>
    </div>
</div>

<div id="win-settings" class="window">
    <div class="win-header"><span>Параметры</span><button class="btn-close" onclick="closeApp('settings')"></button></div>
    <div class="win-body">
        <p>Размытие стекла:</p>
        <input type="range" min="0" max="50" value="25" oninput="document.documentElement.style.setProperty('--blur-val', this.value + 'px')" style="width:100%; margin:15px 0;">
        
        <p>Ссылка на обои:</p>
        <input type="text" id="bg-url" placeholder="https://image-link.jpg">
        <button onclick="setBg()">Применить фон</button>
    </div>
</div>

<div id="dock">
    <div class="dock-item" onclick="openApp('camera')">📷</div>
    <div class="dock-item" onclick="openApp('gallery')">🖼️</div>
    <div class="dock-item" onclick="openApp('settings')">⚙️</div>
</div>

<script>
    let camStream = null;

    // Инициализация Drag-and-Drop для иконок и окон
    interact('.icon').draggable({
        listeners: { move(event) {
            const target = event.target;
            const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
            const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
            target.style.transform = `translate(${x}px, ${y}px)`;
            target.setAttribute('data-x', x);
            target.setAttribute('data-y', y);
        }}
    });

    interact('.window').draggable({
        allowFrom: '.win-header',
        listeners: { move(event) {
            const target = event.target;
            const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
            const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
            target.style.left = '0'; target.style.top = '0';
            target.style.transform = `translate(${x}px, ${y}px)`;
            target.setAttribute('data-x', x);
            target.setAttribute('data-y', y);
        }}
    }).on('down', function(event) {
        // Вывод окна на передний план при нажатии
        document.querySelectorAll('.window').forEach(w => w.style.zindex = 10);
        event.currentTarget.style.zindex = 100;
    });

    function openApp(id) { 
        const win = document.getElementById('win-' + id);
        win.style.display = 'flex'; 
    }

    function closeApp(id) { 
        document.getElementById('win-' + id).style.display = 'none'; 
        if(id === 'camera') stopCam();
    }

    // Камера
    async function startCam() {
        try {
            camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('cam-video').srcObject = camStream;
        } catch (e) {
            alert("Для доступа к камере нужен HTTPS (GitHub Pages) или localhost.");
        }
    }

    function stopCam() {
        if(camStream) camStream.getTracks().forEach(track => track.stop());
    }

    // Галерея
    function loadImages(files) {
        const grid = document.getElementById('gallery-grid');
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result;
                grid.appendChild(img);
            };
            reader.readAsDataURL(file);
        });
    }

    // Обои
    function setBg() {
        const url = document.getElementById('bg-url').value;
        if(url) document.getElementById('wallpaper').style.backgroundImage = `url('${url}')`;
    }
</script>

</body>
</html>
