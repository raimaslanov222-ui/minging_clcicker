<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Clicker: Eternal v45</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main: #00f2ff;
            --bg: #050508;
            --card: #111116;
            --panel: #16161d;
            --green: #39ff14;
            --red: #ff003c;
            --gold: #ffcc00;
            --shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        /* Reset & Base */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; }
        body { 
            background: var(--bg); color: #fff; margin: 0; 
            font-family: 'Montserrat', sans-serif; height: 100vh; 
            overflow: hidden; display: flex; flex-direction: column; 
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--main); border-radius: 10px; }

        /* Header UI */
        header { 
            height: 80px; background: #000; border-bottom: 2px solid var(--main); 
            display: flex; flex-direction: column; justify-content: center;
            padding: 0 20px; z-index: 1000; 
        }
        .h-info { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 11px; margin-bottom: 8px; }
        .h-info b { color: var(--main); }
        .xp-container { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        #xp-fill { width: 0%; height: 100%; background: var(--main); box-shadow: 0 0 10px var(--main); transition: 0.4s; }

        /* Screens Management */
        .screen { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: none; flex-direction: column; align-items: center; 
            padding-bottom: 100px; width: 100%;
        }
        .screen.active { display: flex; animation: fade 0.3s ease-in; }
        @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Game Screen */
        #big-bal { font-family: 'Orbitron'; font-size: 2.2rem; font-weight: 900; margin: 20px 0; text-shadow: var(--shadow); }
        .tap-area { position: relative; width: 200px; height: 200px; margin: 10px 0; cursor: pointer; }
        .tap-zone { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: radial-gradient(circle, var(--main) 0%, #000 90%);
            background-image: url('1000216837.png'); background-size: cover; background-position: center;
            border: 4px solid var(--main); box-shadow: var(--shadow);
            transition: transform 0.05s;
        }
        .tap-zone:active { transform: scale(0.92); }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 400px; margin-top: 25px; }
        .stat-box { background: var(--panel); border: 1px solid #222; border-radius: 10px; padding: 10px; text-align: center; font-family: 'Orbitron'; }
        .stat-box small { display: block; font-size: 8px; color: #777; margin-bottom: 4px; }
        .stat-box b { font-size: 11px; color: var(--main); }

        /* Shop Cards */
        .shop-item { 
            width: 100%; max-width: 450px; background: var(--card); 
            border: 1px solid #222; border-radius: 15px; padding: 15px; 
            margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;
        }
        .shop-text h4 { margin: 0; font-family: 'Orbitron'; font-size: 13px; color: var(--main); }
        .shop-text p { margin: 4px 0 0; font-size: 10px; color: #666; }
        .buy-btn { 
            background: var(--main); color: #000; border: none; border-radius: 8px; 
            padding: 12px 18px; font-family: 'Orbitron'; font-weight: 900; font-size: 11px; cursor: pointer;
        }
        .buy-btn:disabled { background: #222; color: #555; cursor: default; }

        /* Top List */
        .top-row { 
            width: 100%; max-width: 400px; background: #0a0a0f; border-radius: 8px; 
            padding: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; 
            font-family: 'Orbitron'; font-size: 12px; border-left: 3px solid #222;
        }
        .top-row.me { border-left-color: var(--main); background: rgba(0, 242, 255, 0.05); }

        /* Settings & Ach */
        .ach-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; margin-top: 15px; }
        .ach-icon { 
            aspect-ratio: 1; background: #111; border: 1px solid #222; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            font-size: 22px; filter: grayscale(1); opacity: 0.2; transition: 0.3s;
        }
        .ach-icon.active { filter: grayscale(0); opacity: 1; border-color: var(--gold); background: rgba(255,204,0,0.05); }

        .input-group { width: 100%; max-width: 400px; margin-bottom: 15px; }
        input { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #333; 
            color: #fff; border-radius: 10px; font-family: 'Orbitron'; margin-bottom: 10px; 
        }

        /* Navigation */
        nav { 
            height: 75px; background: #000; border-top: 1px solid #222; 
            display: flex; justify-content: space-around; align-items: center; 
            position: fixed; bottom: 0; width: 100%; z-index: 1000; 
        }
        .nav-link { color: #444; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-link.active { color: var(--main); transform: translateY(-3px); }
        .nav-link i { font-size: 20px; margin-bottom: 4px; font-style: normal; }

        /* Admin Overlay */
        #adm-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            z-index: 10000; padding: 30px; flex-direction: column; overflow-y: auto;
        }
        .adm-card { background: #111; border: 1px solid var(--main); padding: 15px; border-radius: 12px; margin-bottom: 15px; }

        /* FX */
        .click-fx { 
            position: absolute; pointer-events: none; font-family: 'Orbitron'; font-weight: 900; 
            color: #fff; animation: clickAnim 0.7s ease-out forwards; z-index: 100; text-shadow: 0 0 5px #000;
        }
        @keyframes clickAnim { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-100px) scale(1.4); opacity: 0; } }
    </style>
</head>
<body>

<header>
    <div class="h-info">
        <span>CREDITS: <b id="h-bal">0</b></span>
        <span>LEVEL: <b id="h-lvl">1</b></span>
    </div>
    <div class="xp-container"><div id="xp-fill"></div></div>
</header>

<main id="sc-game" class="screen active">
    <div id="big-bal">0.00</div>
    <div class="tap-area" id="click-btn"><div class="tap-zone"></div></div>
    <div class="stat-grid">
        <div class="stat-box"><small>POWER</small><b id="st-pwr">1</b></div>
        <div class="stat-box"><small>IDLE</small><b id="st-idle">0/s</b></div>
        <div class="stat-box"><small>MULT</small><b id="st-mult">1.0x</b></div>
    </div>
</main>

<main id="sc-shop" class="screen">
    <h2 style="font-family:'Orbitron'; align-self:flex-start; margin-bottom:20px;">MARKET</h2>
    <div id="shop-list" style="width:100%;"></div>
</main>

<main id="sc-top" class="screen">
    <h2 style="font-family:'Orbitron'; align-self:flex-start; margin-bottom:20px;">TOP MINERS</h2>
    <div id="top-list" style="width:100%;"></div>
</main>

<main id="sc-set" class="screen">
    <h2 style="font-family:'Orbitron'; align-self:flex-start;">PROFILE</h2>
    <div class="input-group">
        <input type="text" id="nick-in" placeholder="Nickname">
        <button class="buy-btn" style="width:100%" onclick="saveNick()">UPDATE IDENTITY</button>
    </div>
    <div class="input-group">
        <input type="text" id="promo-in" placeholder="PROMO CODE">
        <button class="buy-btn" style="width:100%; background:var(--green); color:#000;" onclick="usePromo()">REDEEM CODE</button>
    </div>
    <div class="shop-item" style="justify-content: space-between;">
        <span style="font-size:11px;">ID: <b id="p-id" style="color:var(--main)">---</b></span>
        <span style="font-size:11px;">CLICKS: <b id="p-clicks" style="color:var(--main)">0</b></span>
    </div>
    <h4 style="font-family:'Orbitron'; align-self:flex-start; margin: 15px 0 5px;">ACHIEVEMENTS</h4>
    <div class="ach-grid" id="ach-list"></div>
    
    <button id="adm-btn" style="display:none; margin-top:40px; background:none; border:1px dashed var(--red); color:var(--red); padding:15px; font-family:'Orbitron'; border-radius:10px; width:100%;" onclick="toggleAdm(true)">🛡️ OPEN OWNER TERMINAL</button>
</main>

<nav>
    <div class="nav-link active" onclick="go('game')"><i>⚡</i>MINE</div>
    <div class="nav-link" onclick="go('shop')"><i>🛒</i>SHOP</div>
    <div class="nav-link" onclick="go('top')"><i>🏆</i>TOP</div>
    <div class="nav-link" onclick="go('set')"><i>⚙️</i>SET</div>
</nav>

<div id="adm-overlay">
    <h1 style="font-family:'Orbitron'; color:var(--main); margin:0;">OWNER_SHELL</h1>
    <p style="font-size:10px; color:#444; margin-bottom:25px;">ROOT ACCESS: ID_74981</p>
    
    <div class="adm-card">
        <small style="color:var(--main)">CREDIT INJECTION</small>
        <input type="number" id="adm-money" placeholder="Amount">
        <button class="buy-btn" style="width:100%" onclick="admAddMoney()">GENERATE</button>
    </div>

    <div class="adm-card">
        <small style="color:var(--main)">CREATE PROMOCODE</small>
        <input type="text" id="adm-p-name" placeholder="CODE NAME">
        <input type="number" id="adm-p-val" placeholder="Reward">
        <button class="buy-btn" style="width:100%; background:var(--gold)" onclick="admCreatePromo()">SAVE TO DATABASE</button>
    </div>

    <button class="buy-btn" style="margin-top:auto; background:#222; color:#fff;" onclick="toggleAdm(false)">EXIT TERMINAL</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, setDoc, getDoc, collection, query, orderBy, limit, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = { apiKey: "AIzaSyDRv2Q060oBb1_1NXuqU4ixLVGy6EEr3To", authDomain: "infinity-clicker-7e01c.firebaseapp.com", projectId: "infinity-clicker-7e01c", storageBucket: "infinity-clicker-7e01c.firebasestorage.app", messagingSenderId: "888672687755", appId: "1:888672687755:web:6dda24bd7e4809c4d5668e" };
    const app = initializeApp(cfg); const auth = getAuth(app); const db = getFirestore(app);

    const OWNER_ID = 74981;
    let s = { credits: 0, maxCredits: 0, totalClicks: 0, clickPwr: 1, idle: 0, multiplier: 1, shortId: 0, nickname: 'User', lvl: 1, xp: 0, upg: {}, ach: [] };

    // Format Numbers
    const fmt = n => {
        if (n < 1000) return n.toFixed(2);
        const p = ["K","M","B","T","Qa","Qi","Sx","Sp","Oc"];
        const i = Math.floor(Math.log10(n)/3);
        return (n/Math.pow(1000, i)).toFixed(2) + p[i-1];
    };

    // UI Updates
    const sync = () => {
        document.getElementById('h-bal').innerText = fmt(s.credits);
        document.getElementById('big-bal').innerText = fmt(s.credits);
        document.getElementById('h-lvl').innerText = s.lvl;
        document.getElementById('st-pwr').innerText = fmt(s.clickPwr);
        document.getElementById('st-idle').innerText = fmt(s.idle)+"/s";
        document.getElementById('st-mult').innerText = s.multiplier.toFixed(1)+"x";
        document.getElementById('p-id').innerText = s.shortId;
        document.getElementById('p-clicks').innerText = s.totalClicks;
        
        const xpReq = s.lvl * 3000;
        document.getElementById('xp-fill').style.width = Math.min((s.xp/xpReq)*100, 100) + "%";
        
        if(s.shortId === OWNER_ID) document.getElementById('adm-btn').style.display = 'block';

        renderShop();
        renderAch();
    };

    const renderShop = () => {
        const cont = document.getElementById('shop-list'); cont.innerHTML = '';
        const items = [
            {id:'u1', n:'Micro Processor', d:'+1 Click Power', b:100, t:'pwr', v:1},
            {id:'u2', n:'Overclock Link', d:'+10 Click Power', b:1200, t:'pwr', v:10},
            {id:'a1', n:'Auto Script', d:'+5 Credits/sec', b:250, t:'idle', v:5},
            {id:'a2', n:'Mining Drone', d:'+60 Credits/sec', b:3500, t:'idle', v:60},
            {id:'a3', n:'Server Rack', d:'+500 Credits/sec', b:22000, t:'idle', v:500},
            {id:'m1', n:'Quantum Core', d:'x2 Multiplier', b:100000, t:'mult', v:2}
        ];
        items.forEach(it => {
            const count = s.upg[it.id] || 0;
            const price = Math.floor(it.b * Math.pow(1.65, count));
            cont.innerHTML += `<div class="shop-item"><div class="shop-text"><h4>${it.n} [${count}]</h4><p>${it.d}</p></div>
            <button class="buy-btn" ${s.credits>=price?'':'disabled'} onclick="buy('${it.id}',${price},'${it.t}',${it.v})">${fmt(price)}</button></div>`;
        });
    };

    const renderAch = () => {
        const achs = [
            {id:'ac1', i:'🎯', r:()=>s.totalClicks>=100},
            {id:'ac2', i:'⚡', r:()=>s.lvl>=10},
            {id:'ac3', i:'💎', r:()=>s.maxCredits>=100000},
            {id:'ac4', i:'🔥', r:()=>s.clickPwr>=50}
        ];
        const cont = document.getElementById('ach-list'); cont.innerHTML = '';
        achs.forEach(a => {
            const unlocked = s.ach.includes(a.id) || a.r();
            if(unlocked && !s.ach.includes(a.id)) { s.ach.push(a.id); save(); }
            cont.innerHTML += `<div class="ach-icon ${unlocked?'active':''}">${a.i}</div>`;
        });
    };

    window.buy = (id, p, t, v) => {
        if(s.credits < p) return;
        s.credits -= p; s.upg[id] = (s.upg[id] || 0) + 1;
        if(t==='pwr') s.clickPwr += v; else if(t==='idle') s.idle += v; else s.multiplier *= v;
        sync(); save();
    };

    document.getElementById('click-btn').onclick = (e) => {
        const gain = s.clickPwr * s.multiplier;
        s.credits += gain; s.totalClicks++; s.xp += gain/10;
        if(s.credits > s.maxCredits) s.maxCredits = s.credits;
        
        if(s.xp >= s.lvl * 3000) { s.xp = 0; s.lvl++; }

        const fx = document.createElement('div');
        fx.className = 'click-fx'; fx.innerText = `+${fmt(gain)}`;
        fx.style.left = e.clientX + 'px'; fx.style.top = e.clientY + 'px';
        document.body.appendChild(fx); setTimeout(()=>fx.remove(), 700);
        sync();
    };

    onAuthStateChanged(auth, async u => {
        if(u) {
            const ref = doc(db, "users", u.uid);
            const snap = await getDoc(ref);
            if(snap.exists()) s = {...s, ...snap.data()};
            else { s.shortId = Math.floor(10000+Math.random()*89999); await setDoc(ref, s); }
            sync();
            onSnapshot(ref, d => { if(d.exists()) { s = {...s, ...d.data()}; sync(); }});
        }
    });

    async function save() { if(auth.currentUser) await updateDoc(doc(db,"users",auth.currentUser.uid), s); }

    window.go = id => {
        document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('sc-'+id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'top') loadTop();
    };

    window.loadTop = async () => {
        const q = query(collection(db, "users"), orderBy("maxCredits", "desc"), limit(50));
        const snap = await getDocs(q);
        const cont = document.getElementById('top-list'); cont.innerHTML = '';
        snap.forEach((d, i) => {
            const u = d.data();
            cont.innerHTML += `<div class="top-row ${u.shortId===s.shortId?'me':''}"><span>#${i+1} ${u.nickname}</span><b>${fmt(u.maxCredits)}</b></div>`;
        });
    };

    window.saveNick = () => { s.nickname = document.getElementById('nick-in').value; save(); };
    
    window.usePromo = async () => {
        const code = document.getElementById('promo-in').value.toUpperCase();
        const ref = doc(db, "promos", code);
        const snap = await getDoc(ref);
        if(snap.exists() && !snap.data().usedBy.includes(auth.currentUser.uid)) {
            s.credits += snap.data().val;
            await updateDoc(ref, { usedBy: arrayUnion(auth.currentUser.uid) });
            save(); alert("PROMO APPLIED!");
        } else alert("ALREADY USED OR INVALID");
    };

    // Owner Functions
    window.toggleAdm = s => document.getElementById('adm-overlay').style.display = s ? 'flex' : 'none';
    window.admAddMoney = () => { s.credits += Number(document.getElementById('adm-money').value); save(); toggleAdm(false); };
    window.admCreatePromo = async () => {
        const name = document.getElementById('adm-p-name').value.toUpperCase();
        const val = Number(document.getElementById('adm-p-val').value);
        await setDoc(doc(db, "promos", name), { val: val, usedBy: [] });
        alert("PROMO SAVED");
    };

    setInterval(() => { if(s.idle > 0) { s.credits += s.idle/10; sync(); } }, 100);
    setInterval(save, 10000);
</script>
</body>
</html>
