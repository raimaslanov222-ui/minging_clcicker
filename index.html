<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Clicker Mobile</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; background: #0f0f1a; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Окна */
        #auth-screen, #modal-overlay { position: fixed; inset: 0; background: #0f0f1a; z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #modal-overlay { background: rgba(0,0,0,0.9); z-index: 2000; display: none; }
        .box { width: 100%; max-width: 310px; background: #1a1a2e; padding: 20px; border-radius: 20px; border: 2px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #444; background: #05050a; color: white; text-align: center; font-weight: bold; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .btn-green { background: #4ecca3; color: white; margin-top: 10px; }
        .btn-yellow { background: #ffcc00; color: black; font-weight: 900; }

        /* Шапка как на фото */
        #game-ui { display: none; flex-direction: column; height: 100%; }
        .header { 
            background: linear-gradient(180deg, #ff1a1a 0%, #b30000 100%); 
            padding: 35px 15px 20px 15px; text-align: center; 
            border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; 
            position: relative; min-height: 150px; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        #money { font-size: 3.2rem; font-weight: 900; margin: 0; line-height: 1; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #user-info { color: #4ecca3; font-size: 0.8rem; margin-top: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* Кнопки в шапке */
        .icon-btn { 
            position: absolute; top: 15px; background: rgba(255,255,255,0.25); border: none; 
            border-radius: 12px; width: 42px; height: 42px; color: white; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
        }
        #open-top-btn { left: 15px; }
        #open-settings-btn { right: 15px; }

        /* Игровая зона */
        .main-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #main-button { 
            width: 170px; height: 170px; border-radius: 50%; 
            background: url('button.png') center/cover; border: 6px solid white; 
            box-shadow: 0 0 40px rgba(255, 25, 25, 0.5); transition: 0.05s;
        }
        #main-button:active { transform: scale(0.92); }
        
        .stats-panel { margin-top: 15px; text-align: center; font-size: 0.85rem; color: #ccc; font-family: sans-serif; line-height: 1.6; }
        .stats-panel b { color: white; }

        /* Магазин (Исправленный под скриншоты) */
        .shop-panel { padding: 12px; background: #161625; border-radius: 25px 25px 0 0; }
        .shop-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #20203a; padding: 10px 15px; border-radius: 15px; margin-bottom: 8px;
            border: 1px solid #2d2d4d;
        }
        .shop-item-info { text-align: left; }
        .shop-item-info b { display: block; font-size: 0.9rem; margin-bottom: 2px; }
        .shop-item-info small { color: #aaa; font-size: 0.75rem; }
        .shop-item button { 
            background: #ffcc00; color: black; border: none; padding: 10px 18px; 
            border-radius: 10px; font-weight: 900; font-size: 0.8rem;
        }
        
        /* Список лидеров */
        .leader-row { display: flex; justify-content: space-between; padding: 10px; background: #0b0b15; margin-bottom: 5px; border-radius: 10px; font-size: 0.8rem; border-left: 3px solid gold; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box">
            <h2 style="margin:0 0 15px 0">INFINITY CLICKER</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn btn-green" id="login-btn">ВОЙТИ</button>
            <button class="btn" style="background:transparent; color:#4ecca3; font-size: 0.8rem" id="reg-btn">РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="header">
            <button id="open-top-btn" class="icon-btn">🏆</button>
            <button id="open-settings-btn" class="icon-btn">⚙️</button>
            <div id="money">0</div>
            <div id="user-info">ЗАГРУЗКА...</div>
        </div>
        
        <div class="main-area">
            <div id="main-button"></div>
            <div class="stats-panel">
                Клик: <b id="st-p">+1</b> | Множитель: <b id="st-m">x1</b><br>
                <span style="color:#4ecca3">Авто-бот: <b id="st-b">0</b> /сек</span>
            </div>
        </div>

        <div class="shop-panel">
            <div class="shop-item">
                <div class="shop-item-info"><b>Сила клика</b><small>Цена: <span id="c1">10</span></small></div>
                <button id="buy1">КУПИТЬ</button>
            </div>
            <div class="shop-item">
                <div class="shop-item-info"><b>Множитель</b><small>Цена: <span id="c2">100</span></small></div>
                <button id="buy2">КУПИТЬ</button>
            </div>
            <div class="shop-item">
                <div class="shop-item-info"><b>Авто-бот</b><small>Цена: <span id="c3">500</span></small></div>
                <button id="buy3">КУПИТЬ</button>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="settings-box" class="box" style="display:none">
            <h3 style="margin:0 0 15px 0">НАСТРОЙКИ</h3>
            <input type="text" id="new-name-input" maxlength="12" placeholder="Новый ник">
            <button class="btn btn-green" id="save-name-btn">СОХРАНИТЬ</button>
            <button class="btn btn-yellow" id="admin-panel-btn" style="display:none; margin-top:10px">👑 АДМИН-ПАНЕЛЬ</button>
            <button class="btn" style="background:#444; color:white; margin-top:10px" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>

        <div id="admin-box" class="box" style="display:none; border: 2px solid gold">
            <h3 style="color:gold; margin:0">👑 АДМИНКА</h3>
            <p style="font-size:0.7rem; color:#aaa">Можно вводить ID или НИК игрока</p>
            <input type="text" id="admin-target" placeholder="ID или Ник игрока">
            <input type="number" id="admin-amount" placeholder="Сумма монет">
            <button class="btn btn-green" id="give-money-btn">ВЫДАТЬ МОНЕТЫ</button>
            <button class="btn" style="background:red; color:white; margin-top:8px" id="reset-player-btn">ОБНУЛИТЬ ИГРОКА</button>
            <button class="btn" style="margin-top:15px; background:#444; color:white" onclick="openSettings()">НАЗАД</button>
        </div>

        <div id="top-box" class="box" style="display:none; border-color: gold">
            <h3 style="color:gold; margin:0 0 15px 0">🏆 ТОП-10 ЛИДЕРОВ</h3>
            <div id="leader-list" style="max-height: 250px; overflow-y: auto;"></div>
            <button class="btn" style="background:#444; color:white; margin-top:15px" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, orderBy, limit, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6v-Qacyh1dDl7J8-XsQY6NxcGcNzBt9o",
            authDomain: "mindingclicker.firebaseapp.com",
            projectId: "mindingclicker",
            storageBucket: "mindingclicker.firebasestorage.app",
            messagingSenderId: "484824275063",
            appId: "1:484824275063:web:b98565344eea2760a34e72"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "raimaslanov222@gmail.com";

        let user = null, money = 0, power = 1, mult = 1, bot = 0, myId = 0, myName = "";
        let cost1 = 10, cost2 = 100, cost3 = 500;

        function nForm(n) {
            if (n >= 1e12) return (n / 1e12).toFixed(2) + "T";
            if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
            if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
            if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
            return Math.floor(n);
        }

        document.getElementById('login-btn').onclick = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert("Ошибка входа!"));
        document.getElementById('reg-btn').onclick = async () => {
            try {
                const res = await createUserWithEmailAndPassword(auth, email.value, pass.value);
                await runTransaction(db, async (t) => {
                    const c = await t.get(doc(db, "system", "users_count"));
                    let nid = c.exists() ? c.data().val + 1 : 1;
                    t.set(doc(db, "system", "users_count"), { val: nid });
                    t.set(doc(db, "leaders", res.user.uid), { name: email.value.split('@')[0], score: 0, power: 1, mult: 1, bot: 0, cost1: 10, cost2: 100, cost3: 500, gameId: nid });
                });
            } catch(e) { alert("Ошибка регистрации!"); }
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                if(user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) document.getElementById('admin-panel-btn').style.display = 'block';
                const s = await getDoc(doc(db, "leaders", user.uid));
                if (s.exists()) {
                    const d = s.data();
                    money = d.score; power = d.power; mult = d.mult; bot = d.bot;
                    cost1 = d.cost1; cost2 = d.cost2; cost3 = d.cost3;
                    myId = d.gameId; myName = d.name;
                }
                updateUI();
            }
        });

        document.getElementById('main-button').onclick = () => { money += (power * mult); updateUI(); };
        setInterval(() => { if(bot > 0) { money += (bot / 10); updateUI(); } }, 100);

        function updateUI() {
            document.getElementById('money').innerText = nForm(money);
            document.getElementById('user-info').innerText = `${myName} | ID: #${myId}`;
            document.getElementById('st-p').innerText = `+${nForm(power)}`;
            document.getElementById('st-m').innerText = `x${mult}`;
            document.getElementById('st-b').innerText = nForm(bot);
            document.getElementById('c1').innerText = nForm(cost1); 
            document.getElementById('c2').innerText = nForm(cost2); 
            document.getElementById('c3').innerText = nForm(cost3);
        }

        async function save() { if(user) await setDoc(doc(db,"leaders",user.uid),{name:myName,score:money,power:power,mult:mult,bot:bot,cost1:cost1,cost2:cost2,cost3:cost3,gameId:myId},{merge:true}); }
        setInterval(save, 10000);

        const buy = (n) => {
            if(n==1 && money>=cost1){ money-=cost1; power++; cost1*=4; }
            if(n==2 && money>=cost2){ money-=cost2; mult*=2; cost2*=10; }
            if(n==3 && money>=cost3){ money-=cost3; bot+=(5*mult); cost3*=5; }
            updateUI(); save();
        };
        document.getElementById('buy1').onclick = () => buy(1);
        document.getElementById('buy2').onclick = () => buy(2);
        document.getElementById('buy3').onclick = () => buy(3);

        window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';
        window.openSettings = () => {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('settings-box').style.display = 'block';
            document.getElementById('admin-box').style.display = 'none';
            document.getElementById('top-box').style.display = 'none';
        };
        document.getElementById('open-settings-btn').onclick = openSettings;
        document.getElementById('open-top-btn').onclick = () => {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('top-box').style.display = 'block';
            document.getElementById('settings-box').style.display = 'none';
            document.getElementById('admin-box').style.display = 'none';
        };

        document.getElementById('save-name-btn').onclick = async () => {
            const val = document.getElementById('new-name-input').value.trim();
            if(val.length < 2) return alert("Минимум 2 символа!");
            myName = val; updateUI(); await save(); alert("Ник изменен!");
        };

        document.getElementById('admin-panel-btn').onclick = () => {
            document.getElementById('settings-box').style.display = 'none';
            document.getElementById('admin-box').style.display = 'block';
        };

        // ФУНКЦИЯ АДМИНКИ: ВЫДАЧА ПО ID ИЛИ НИКУ
        const adminAction = async (type) => {
            const target = document.getElementById('admin-target').value.trim();
            const amount = parseInt(document.getElementById('admin-amount').value) || 0;
            if(!target) return alert("Введите ID или Ник!");

            let q;
            if (!isNaN(target)) {
                // Если введено число - ищем по gameId
                q = query(collection(db, "leaders"), where("gameId", "==", parseInt(target)));
            } else {
                // Иначе - ищем по Нику
                q = query(collection(db, "leaders"), where("name", "==", target));
            }

            const snap = await getDocs(q);
            if(snap.empty) return alert("Игрок не найден!");

            const playerDoc = snap.docs[0];
            if(type === 'give') {
                await setDoc(playerDoc.ref, { score: (playerDoc.data().score + amount) }, { merge: true });
                alert(`Успешно! Выдано ${amount} монет.`);
            } else {
                await setDoc(playerDoc.ref, { score: 0 }, { merge: true });
                alert("Аккаунт игрока обнулен.");
            }
        };

        document.getElementById('give-money-btn').onclick = () => adminAction('give');
        document.getElementById('reset-player-btn').onclick = () => adminAction('reset');

        onSnapshot(query(collection(db, "leaders"), orderBy("score", "desc"), limit(10)), (snap) => {
            const list = document.getElementById('leader-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `<div class="leader-row"><span>#${data.gameId} <b>${data.name}</b></span><b>${nForm(data.score)}</b></div>`;
            });
        });
    </script>
</body>
</html>
