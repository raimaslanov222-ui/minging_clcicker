<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Clicker: God Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        /* СТИЛИ И ПЕРЕМЕННЫЕ */
        :root {
            --bg: #030305;
            --glass: rgba(10, 10, 15, 0.98);
            --neon-red: #ff0000;
            --dark-red: #660000;
            --accent: #ff3333;
            --gold: #ffcc00;
            --blue: #00d4ff;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding-bottom: 100px; /* Место под таб-бар */
            overflow-x: hidden;
            user-select: none;
        }

        /* ШАПКА */
        header {
            background: linear-gradient(135deg, var(--dark-red), #000);
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid var(--neon-red);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-stat { text-align: center; flex: 1; }
        .header-stat small { font-size: 0.6rem; color: var(--accent); letter-spacing: 1px; }
        .header-stat div { font-family: 'Orbitron'; font-weight: 900; font-size: 1.1rem; }

        /* ОСНОВНОЙ ЭКРАН */
        .game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 80vh;
        }

        #main-balance {
            font-family: 'Orbitron';
            font-size: 3.5rem;
            margin: 10px 0;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-red);
        }

        .dps-counter {
            color: var(--gold);
            font-family: 'Orbitron';
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* КНОПКА КЛИКЕРА */
        .clicker-container {
            position: relative;
            margin: 30px 0;
        }

        .main-btn {
            width: 240px;
            height: 240px;
            background: url('button.png') center/cover no-repeat, radial-gradient(circle, var(--neon-red), #300);
            border-radius: 50%;
            border: 6px solid #fff;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5), inset 0 0 20px #000;
            cursor: pointer;
            transition: transform 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .main-btn:active { transform: scale(0.9); }
        .main-btn span { font-family: 'Orbitron'; font-weight: 900; font-size: 2rem; pointer-events: none; text-shadow: 2px 2px #000; }

        /* ТАБ-БАР (МЕНЮ) */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #0a0a0a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
            z-index: 1500;
        }

        .nav-item {
            text-align: center;
            color: #666;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
            flex: 1;
            padding: 10px;
        }

        .nav-item.active { color: var(--neon-red); }

        /* СЕКЦИИ (МАГАЗИН, ЛИДЕРЫ) */
        .section { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* КАРТОЧКИ МАГАЗИНА */
        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #222;
        }

        .shop-info { text-align: left; }
        .shop-info h4 { margin: 0; font-family: 'Orbitron'; color: var(--accent); }
        .shop-info p { margin: 5px 0 0; font-size: 0.75rem; color: #888; }

        .buy-btn {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 0.8rem;
        }

        .buy-btn:disabled { background: #333; color: #666; }

        /* МОДАЛКИ */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; box-sizing: border-box;
        }

        .modal-content {
            background: var(--glass); padding: 30px; border-radius: 25px;
            border: 1px solid var(--neon-red); max-width: 400px; margin: 40px auto; text-align: center;
        }

        /* ТАБЛИЦА ЛИДЕРОВ */
        .leader-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .leader-table td { padding: 15px 10px; border-bottom: 1px solid #111; font-size: 0.9rem; }
        .rank-1 { color: var(--gold); background: rgba(255,215,0,0.05); }

        .particle {
            position: absolute; pointer-events: none; font-family: 'Orbitron';
            font-weight: 900; animation: floatUp 0.8s forwards; color: #fff;
            text-shadow: 0 0 10px var(--neon-red); z-index: 100;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px) scale(1.5); } }

        /* АДМИНКА */
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #000; color: #fff; border: 1px solid #333; box-sizing: border-box; }
        .btn-full { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="header-stat">
        <small>БАЛАНС</small>
        <div id="h-balance">0</div>
    </div>
    <div class="header-stat" id="admin-trigger" style="cursor:pointer">
        <small>РЕКОРД</small>
        <div id="h-record" style="color: var(--gold);">0</div>
    </div>
    <div class="header-stat">
        <small>УРОВЕНЬ</small>
        <div id="h-level">1</div>
    </div>
</header>

<div id="game-sec" class="section active">
    <div class="game-screen">
        <div id="main-balance">0</div>
        <div class="dps-counter">Доход: +<span id="dps-val">0</span>/сек</div>
        
        <div class="clicker-container">
            <div class="main-btn" id="tap-zone">
                <span>TAP</span>
            </div>
        </div>
        
        <div id="user-nick" style="color: #666; font-size: 0.8rem; font-weight: bold;">Загрузка...</div>
    </div>
</div>

<div id="shop-sec" class="section">
    <h2 style="font-family: 'Orbitron'; text-align: center; color: var(--gold);">МАГАЗИН UPGRADE</h2>
    <div id="shop-list">
        </div>
</div>

<div id="top-sec" class="section">
    <h2 style="font-family: 'Orbitron'; text-align: center; color: var(--gold);">МИРОВОЙ ТОП</h2>
    <table class="leader-table" id="leader-body">
        <tr><td style="text-align:center">Загрузка...</td></tr>
    </table>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showSec('game')">🎮 Игра</div>
    <div class="nav-item" onclick="showSec('shop')">🛒 Магазин</div>
    <div class="nav-item" onclick="showSec('top')">🏆 Лидеры</div>
    <div class="nav-item" onclick="openSettings()">⚙️ Профиль</div>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-content">
        <h2 style="font-family: 'Orbitron'; color: var(--gold);">ADMIN MODE</h2>
        <input type="number" id="adm-amt" placeholder="Сумма монет">
        <button class="btn-full" style="background: var(--gold);" onclick="admAdd()">ВЫДАТЬ</button>
        <button class="btn-full" style="background: #222; color: #fff; margin-top: 10px;" onclick="closeModal('admin-modal')">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3 style="font-family: 'Orbitron';">ПРОФИЛЬ</h3>
        <input type="text" id="nick-in" placeholder="Новый ник" maxlength="12">
        <button class="btn-full" style="background: var(--gold);" onclick="saveNick()">СОХРАНИТЬ</button>
        <button class="btn-full" style="background: #222; color: #fff; margin-top: 10px;" onclick="closeModal('settings-modal')">ОТМЕНА</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ТВОЙ КОНФИГ FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDRv2Q060oBb1_1NXuqU4ixLVGy6EEr3To",
        authDomain: "infinity-clicker-7e01c.firebaseapp.com",
        projectId: "infinity-clicker-7e01c",
        storageBucket: "infinity-clicker-7e01c.firebasestorage.app",
        messagingSenderId: "888672687755",
        appId: "1:888672687755:web:6dda24bd7e4809c4d5668e",
        measurementId: "G-FZM14KHQH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ДАННЫЕ ИГРЫ
    let state = {
        score: 0,
        maxScore: 0,
        nickname: "Новичок",
        lastLogin: Date.now(),
        dps: 0,
        clickPower: 1,
        upgrades: {
            auto_1: 0, // Раб (1 dps)
            auto_2: 0, // Завод (10 dps)
            auto_3: 0, // Сервер (50 dps)
            click_1: 0 // Сила клика (+1)
        }
    };

    const shopData = [
        { id: 'click_1', name: 'Сила клика', basePrice: 50, power: 1, desc: '+1 к каждому клику', type: 'click' },
        { id: 'auto_1', name: 'Младший раб', basePrice: 150, power: 1, desc: '+1 монета в сек.', type: 'auto' },
        { id: 'auto_2', name: 'Фабрика кликов', basePrice: 1000, power: 10, desc: '+10 монет в сек.', type: 'auto' },
        { id: 'auto_3', name: 'Супер-сервер', basePrice: 5000, power: 50, desc: '+50 монет в сек.', type: 'auto' }
    ];

    let admClicks = 0;

    // ФУНКЦИИ ИНТЕРФЕЙСА
    const fmt = (n) => Math.floor(n).toLocaleString();

    function updateUI() {
        document.getElementById('main-balance').innerText = fmt(state.score);
        document.getElementById('h-balance').innerText = fmt(state.score);
        document.getElementById('h-record').innerText = fmt(state.maxScore);
        document.getElementById('dps-val').innerText = fmt(state.dps);
        document.getElementById('user-nick').innerText = state.nickname;
        document.getElementById('h-level').innerText = Math.floor(state.maxScore / 5000) + 1;
        renderShop();
    }

    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'top') loadTop();
    };

    // МАГАЗИН
    function renderShop() {
        const list = document.getElementById('shop-list');
        list.innerHTML = '';
        shopData.forEach(item => {
            const count = state.upgrades[item.id] || 0;
            const price = Math.floor(item.basePrice * Math.pow(1.5, count));
            const canBuy = state.score >= price;
            
            list.innerHTML += `
                <div class="shop-item">
                    <div class="shop-info">
                        <h4>${item.name} (${count})</h4>
                        <p>${item.desc}</p>
                        <p style="color:var(--gold)">Цена: ${fmt(price)} 💰</p>
                    </div>
                    <button class="buy-btn" ${canBuy ? '' : 'disabled'} onclick="buyUpgrade('${item.id}', ${price})">КУПИТЬ</button>
                </div>
            `;
        });
    }

    window.buyUpgrade = async (id, price) => {
        if(state.score >= price) {
            state.score -= price;
            state.upgrades[id] = (state.upgrades[id] || 0) + 1;
            recalcStats();
            updateUI();
            saveData();
        }
    };

    function recalcStats() {
        let d = 0;
        let c = 1;
        shopData.forEach(item => {
            const count = state.upgrades[item.id] || 0;
            if(item.type === 'auto') d += count * item.power;
            if(item.type === 'click') c += count * item.power;
        });
        state.dps = d;
        state.clickPower = c;
    }

    // КЛИК
    document.getElementById('tap-zone').onclick = (e) => {
        state.score += state.clickPower;
        if(state.score > state.maxScore) state.maxScore = state.score;
        
        // Анимация +1
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = e.pageX + 'px';
        p.style.top = e.pageY + 'px';
        p.innerText = '+' + state.clickPower;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        
        updateUI();
    };

    // АВТО-КЛИК (раз в секунду)
    setInterval(() => {
        if(state.dps > 0) {
            state.score += state.dps;
            if(state.score > state.maxScore) state.maxScore = state.score;
            updateUI();
        }
    }, 1000);

    // FIREBASE ЛОГИКА
    onAuthStateChanged(auth, async (user) => {
        if(user) {
            const ref = doc(db, "users", user.uid);
            const snap = await getDoc(ref);
            if(snap.exists()) {
                state = { ...state, ...snap.data() };
                recalcStats();
            } else {
                await setDoc(ref, state);
            }
            updateUI();
            loadTop();
        } else {
            signInAnonymously(auth);
        }
    });

    async function saveData() {
        if(auth.currentUser) {
            await updateDoc(doc(db, "users", auth.currentUser.uid), state);
        }
    }

    setInterval(saveData, 15000); // Автосохранение раз в 15 сек

    async function loadTop() {
        const q = query(collection(db, "users"), orderBy("maxScore", "desc"), limit(10));
        const snap = await getDocs(q);
        const body = document.getElementById('leader-body');
        body.innerHTML = '';
        let r = 1;
        snap.forEach(d => {
            const u = d.data();
            body.innerHTML += `<tr class="${r===1?'rank-1':''}"><td>${r}. ${u.nickname}</td><td style="text-align:right">🏆 ${fmt(u.maxScore)}</td></tr>`;
            r++;
        });
    }

    // АДМИНКА
    document.getElementById('admin-trigger').onclick = () => {
        admClicks++;
        if(admClicks >= 5) { document.getElementById('admin-modal').style.display = 'block'; admClicks = 0; }
    };
    window.admAdd = () => {
        const a = parseInt(document.getElementById('adm-amt').value);
        if(a) { state.score += a; if(state.score > state.maxScore) state.maxScore = state.score; updateUI(); saveData(); closeModal('admin-modal'); }
    };

    // НАСТРОЙКИ
    window.openSettings = () => document.getElementById('settings-modal').style.display = 'block';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.saveNick = async () => {
        const n = document.getElementById('nick-in').value;
        if(n) { state.nickname = n; updateUI(); await saveData(); closeModal('settings-modal'); }
    };

</script>
</body>
</html>
