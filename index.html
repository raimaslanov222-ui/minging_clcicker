<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity B/T | Omega Edition</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="notification-hub"></div>

    <section id="auth-screen">
        <div class="auth-container">
            <h1 class="logo">INFINITY <span class="accent">CORE</span></h1>
            <div class="auth-form">
                <div class="input-field">
                    <label>NEURAL IDENTIFIER</label>
                    <input type="email" id="auth-email" placeholder="email@domain.com">
                </div>
                <div class="input-field">
                    <label>SECURITY ACCESS KEY</label>
                    <input type="password" id="auth-pass" placeholder="••••••••">
                </div>
                <button id="btn-login" class="primary-btn">INITIALIZE CONNECTION</button>
                <button id="btn-register" class="secondary-btn">CREATE NEW UNIT</button>
            </div>
            <p class="version">v2.0.0 Global Stable</p>
        </div>
    </section>

    <main id="game-screen" style="display: none;">
        <header class="game-header">
            <div class="player-info">
                <span id="display-name">Pilot</span>
                <span id="display-id">#0000</span>
            </div>
            <div class="currency-container">
                <h1 id="balance">0</h1>
            </div>
            <div class="progress-zone">
                <div class="xp-bar"><div id="xp-fill"></div></div>
                <small id="lvl-text">LEVEL 1</small>
            </div>
        </header>

        <section class="action-zone">
            <div id="click-target">
                <div class="inner-core"></div>
            </div>
            
            <div class="live-stats">
                <div class="stat-box">
                    <label>POWER</label>
                    <span id="stat-power">1</span>
                </div>
                <div class="stat-box">
                    <label>MULT</label>
                    <span id="stat-mult">x1</span>
                </div>
                <div class="stat-box">
                    <label>AUTO</label>
                    <span id="stat-auto">0</span>
                </div>
            </div>
        </section>

        <nav class="bottom-nav">
            <button class="nav-item active" data-target="shop-tab">UPGRADES</button>
            <button class="nav-item" data-target="leader-tab">RANKING</button>
            <button class="nav-item" id="admin-nav" style="display: none;" data-target="admin-tab">ADMIN</button>
            <button class="nav-item" id="btn-logout">EXIT</button>
        </nav>

        <div class="tab-content">
            <div id="shop-tab" class="tab-pane active">
                </div>
            <div id="leader-tab" class="tab-pane">
                <div id="leaderboard-list"></div>
            </div>
            <div id="admin-tab" class="tab-pane">
                </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
    </body>
</html>
