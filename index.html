<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InfinityB - Omega</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="click-particles"></div>

    <div id="game-ui">
        <header class="top-header">
            <button class="icon-btn" id="open-leaders">🏆</button>
            <div class="header-center">
                <h1 class="logo">InfinityB</h1>
                <p id="user-tag">ЗАГРУЗКА... | ID: #0</p>
            </div>
            <button class="icon-btn" id="open-settings">⚙️</button>
        </header>

        <main class="main-area">
            <h1 id="balance">0</h1>
            <div id="main-clicker">
                <img src="https://img.icons8.com/ios-filled/100/ffffff/cursor.png" alt="click">
            </div>
            <div class="stats-text">
                Клик: <span id="click-val">+0</span> | Множ: <span id="mult-val">x1</span><br>
                <span class="auto-text">Авто-бот: <span id="auto-val">0</span> /сек</span>
            </div>
        </main>

        <footer class="shop-area">
            <button class="shop-card" id="buy-power">
                <b>Сила клика</b>
                <span id="cost-p">10</span>
            </button>
            <button class="shop-card" id="buy-mult">
                <b>Множитель</b>
                <span id="cost-m">100</span>
            </button>
            <button class="shop-card" id="buy-auto">
                <b>Авто-бот</b>
                <span id="cost-a">500</span>
            </button>
        </footer>
    </div>

    <div class="modal" id="modal-settings">
        <div class="modal-content">
            <h2>НАСТРОЙКИ</h2>
            <input type="text" id="new-name" placeholder="Новый ник">
            <button class="action-btn save" id="save-name">СОХРАНИТЬ</button>
            <button class="action-btn admin" id="open-admin" style="display:none">👑 АДМИН-ПАНЕЛЬ</button>
            <button class="action-btn close-modal">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div class="modal" id="modal-admin">
        <div class="modal-content admin-theme">
            <h2>АДМИН-ПАНЕЛЬ</h2>
            <input type="text" id="adm-target" placeholder="ID или Имя игрока">
            <input type="number" id="adm-val" placeholder="Сумма/Минуты">
            <div class="admin-grid">
                <button class="action-btn save" id="adm-give">ВЫДАТЬ</button>
                <button class="action-btn reset" id="adm-fine">ШТРАФ</button>
                <button class="action-btn reset" id="adm-reset">ОБНУЛИТЬ</button>
                <button class="action-btn ban" id="adm-ban">БАН (МИН)</button>
            </div>
            <button class="action-btn close-modal">НАЗАД</button>
        </div>
    </div>

    <div class="modal" id="modal-leaders">
        <div class="modal-content">
            <h2>🏆 ТОП ЛИДЕРОВ</h2>
            <div id="leader-list"></div>
            <button class="action-btn close-modal">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
