<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Clicker Engine</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* [CSS SECTION: 1-120 LINES] */
        :root {
            --p: #ff1a1a; --s: #4ecca3; --a: #ffcc00;
            --bg: #0a0a12; --card: #161625; --border: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Roboto', sans-serif; background: var(--bg); color: #fff;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* UI Экраны */
        #auth-layer { position: fixed; inset: 0; z-index: 9999; background: #05050a; display: flex; align-items: center; justify-content: center; }
        #game-layer { display: none; flex-direction: column; height: 100%; }

        /* Шапка */
        .header {
            background: linear-gradient(180deg, var(--p), #800);
            padding: 50px 20px 30px; text-align: center;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative;
        }

        #balance { font-family: 'Montserrat'; font-size: 3.2rem; margin-bottom: 5px; }
        
        .xp-box { width: 200px; height: 10px; background: rgba(0,0,0,0.4); margin: 10px auto; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        #xp-bar { height: 100%; width: 0%; background: var(--s); transition: 0.4s ease; }

        /* Игровая зона */
        .play-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        #click-target {
            width: 240px; height: 240px; border-radius: 50%;
            background: radial-gradient(circle, var(--p), #600);
            border: 10px solid #fff; box-shadow: 0 0 50px rgba(255,26,26,0.4);
            cursor: pointer; transition: transform 0.05s;
        }
        #click-target:active { transform: scale(0.92); }

        .stats-grid { display: flex; gap: 15px; width: 90%; margin-top: 30px; }
        .stat-item { flex: 1; background: var(--card); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--border); }
        .stat-item span { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .stat-item b { display: block; font-size: 1.2rem; margin-top: 5px; color: var(--s); }

        /* Магазин */
        .shop-panel {
            background: var(--card); padding: 25px 25px 45px;
            border-top-left-radius: 45px; border-top-right-radius: 45px;
            border-top: 1px solid var(--border);
        }

        .item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); padding: 15px 20px;
            border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--border);
        }

        .buy-btn {
            background: var(--a); color: #000; border: none; padding: 12px 20px;
            border-radius: 15px; font-weight: 900; cursor: pointer;
        }

        /* Модалки */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 10000; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .modal-box { width: 90%; max-width: 400px; background: var(--card); padding: 35px; border-radius: 35px; border: 1px solid #333; text-align: center; }

        /* Входы */
        .input-f { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 15px; background: #000; color: #fff; border: 1px solid #444; font-size: 1rem; }

        /* Анимация цифр */
        .floating-text {
            position: fixed; pointer-events: none; color: var(--s);
            font-weight: 900; font-size: 1.8rem; font-family: 'Montserrat';
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-130px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="sys-toast" style="position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--card); padding:15px 25px; border-radius:20px; display:none; z-index:10001; border:2px solid var(--s); text-align:center;">
        <b id="toast-title"></b><br><small id="toast-msg"></small>
    </div>

    <section id="auth-layer">
        <div class="modal-box">
            <h1 style="font-family:Montserrat; color:var(--p); margin-bottom:25px; font-size:2.5rem">INFINITY</h1>
            <input type="email" id="auth-email" class="input-f" placeholder="Ваша почта">
            <input type="password" id="auth-pass" class="input-f" placeholder="Пароль">
            <button id="do-login" class="buy-btn" style="width:100%; padding:18px; font-size:1.1rem">ВОЙТИ</button>
            <p id="do-reg" style="margin-top:20px; color:var(--s); cursor:pointer; font-weight:bold; font-size:0.85rem">НЕТ АККАУНТА? РЕГИСТРАЦИЯ</p>
        </div>
    </section>

    <main id="game-layer">
        <header class="header">
            <button id="open-top" style="position:absolute; left:25px; top:35px; background:none; border:none; font-size:1.5rem">🏆</button>
            <button id="open-settings" style="position:absolute; right:25px; top:35px; background:none; border:none; font-size:1.5rem">⚙️</button>
            <div style="font-size:0.7rem; opacity:0.6; letter-spacing:2px">МОНЕТЫ</div>
            <h2 id="balance">0</h2>
            <div class="xp-box"><div id="xp-bar"></div></div>
            <div id="p-tag" style="font-size:0.8rem; font-weight:bold; color:var(--s)">ЗАГРУЗКА ДАННЫХ...</div>
        </header>

        <section class="play-area">
            <div id="click-target"></div>
            <div class="stats-grid">
                <div class="stat-item"><span>КЛИК</span><b id="val-p">+1</b></div>
                <div class="stat-item"><span>БОТЫ</span><b id="val-b">0</b></div>
            </div>
        </section>

        <footer class="shop-panel">
            <div class="item">
                <div><b>Сила Руки</b><br><small id="cost1">Цена: 10</small></div>
                <button class="buy-btn" id="buy-1">КУПИТЬ</button>
            </div>
            <div class="item">
                <div><b>Авто-Ферма</b><br><small id="cost2">Цена: 100</small></div>
                <button class="buy-btn" id="buy-2">КУПИТЬ</button>
            </div>
        </footer>
    </main>

    <div id="main-modal" class="modal">
        <div id="modal-content" class="modal-box"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, orderBy, limit, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. КОНФИГУРАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyA6v-Qacyh1dDl7J8-XsQY6NxcGcNzBt9o",
            authDomain: "mindingclicker.firebaseapp.com",
            projectId: "mindingclicker",
            storageBucket: "mindingclicker.firebasestorage.app",
            messagingSenderId: "484824275063",
            appId: "1:484824275063:web:b98565344eea2760a34e72"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "raimaslanov222@gmail.com";

        // 2. СОСТОЯНИЕ ИГРОКА
        let player = {
            money: 0, power: 1, bots: 0,
            c1: 10, c2: 100,
            xp: 0, lvl: 1, name: "Gamer", id: 0,
            lastSave: Date.now()
        };

        // 3. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        const format = (n) => {
            if (n >= 1e9) return (n/1e9).toFixed(2) + "B";
            if (n >= 1e6) return (n/1e6).toFixed(2) + "M";
            if (n >= 1e3) return (n/1e3).toFixed(1) + "K";
            return Math.floor(n);
        };

        const toast = (t, m, err = false) => {
            const el = document.getElementById('sys-toast');
            document.getElementById('toast-title').innerText = t;
            document.getElementById('toast-msg').innerText = m;
            el.style.borderColor = err ? "#ff1a1a" : "#4ecca3";
            el.style.display = "block";
            setTimeout(() => el.style.display = "none", 3500);
        };

        // 4. СИСТЕМА АВТОРИЗАЦИИ (ИСПРАВЛЕНА)
        const loginLogic = async () => {
            const e = document.getElementById('auth-email').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            if(!e || !p) return toast("ОШИБКА", "Заполните все поля!", true);
            
            try {
                await signInWithEmailAndPassword(auth, e, p);
                toast("СИСТЕМА", "Вход выполнен успешно");
            } catch(err) {
                toast("ОТКАЗ", "Неверный логин или пароль", true);
            }
        };

        const regLogic = async () => {
            const e = document.getElementById('auth-email').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            if(p.length < 6) return toast("ОШИБКА", "Пароль слишком короткий", true);

            try {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await runTransaction(db, async (t) => {
                    const cRef = doc(db, "system", "users_count");
                    const cSnap = await t.get(cRef);
                    let nid = cSnap.exists() ? cSnap.data().val + 1 : 1;
                    t.set(cRef, { val: nid });
                    t.set(doc(db, "leaders", res.user.uid), {
                        name: e.split('@')[0], score: 0, power: 1, bots: 0, 
                        c1: 10, c2: 100, xp: 0, lvl: 1, gameId: nid
                    });
                });
                toast("УСПЕХ", "Аккаунт создан!");
            } catch(err) { toast("ОШИБКА", "Эта почта уже занята", true); }
        };

        document.getElementById('do-login').addEventListener('click', loginLogic);
        document.getElementById('do-reg').addEventListener('click', regLogic);

        // 5. ГЛАВНЫЙ ЦИКЛ ОБНОВЛЕНИЯ
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                document.getElementById('auth-layer').style.display = 'none';
                document.getElementById('game-layer').style.display = 'flex';
                const docSnap = await getDoc(doc(db, "leaders", u.uid));
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    player = { 
                        money: d.score, power: d.power, bots: d.bots, 
                        c1: d.c1, c2: d.c2, xp: d.xp, lvl: d.lvl, 
                        name: d.name, id: d.gameId 
                    };
                }
                syncUI();
            }
        });

        function syncUI() {
            document.getElementById('balance').innerText = format(player.money);
            document.getElementById('p-tag').innerText = `ID: #${player.id} | LVL: ${player.lvl} | ${player.name.toUpperCase()}`;
            document.getElementById('val-p').innerText = `+${format(player.power)}`;
            document.getElementById('val-b').innerText = format(player.bots);
            document.getElementById('cost1').innerText = `Цена: ${format(player.c1)}`;
            document.getElementById('cost2').innerText = `Цена: ${format(player.c2)}`;
            
            let targetXP = player.lvl * 120;
            document.getElementById('xp-bar').style.width = `${(player.xp / targetXP) * 100}%`;
            
            if(player.xp >= targetXP) {
                player.lvl++; player.xp = 0;
                toast("УРОВЕНЬ ПОВЫШЕН!", `Теперь вы ${player.lvl} уровня!`);
            }
        }

        // 6. ОБРАБОТКА КЛИКА
        const clickTarget = document.getElementById('click-target');
        clickTarget.addEventListener('pointerdown', (e) => {
            player.money += player.power;
            player.xp += 1;
            syncUI();

            // Эффект цифр
            const fx = document.createElement('div');
            fx.className = 'floating-text';
            fx.innerText = `+${format(player.power)}`;
            fx.style.left = `${e.clientX}px`;
            fx.style.top = `${e.clientY - 40}px`;
            document.body.appendChild(fx);
            setTimeout(() => fx.remove(), 800);
        });

        // 7. МАГАЗИН
        document.getElementById('buy-1').onclick = () => {
            if(player.money >= player.c1) {
                player.money -= player.c1;
                player.power += 1;
                player.c1 = Math.floor(player.c1 * 2.5);
                syncUI();
            } else { toast("МАГАЗИН", "Недостаточно монет", true); }
        };

        document.getElementById('buy-2').onclick = () => {
            if(player.money >= player.c2) {
                player.money -= player.c2;
                player.bots += 5;
                player.c2 = Math.floor(player.c2 * 3.8);
                syncUI();
            } else { toast("МАГАЗИН", "Недостаточно монет", true); }
        };

        // Авто-клик (Bots)
        setInterval(() => {
            if(player.bots > 0) {
                player.money += (player.bots / 10);
                syncUI();
            }
        }, 100);

        // 8. СИСТЕМА СОХРАНЕНИЯ
        const cloudSave = async () => {
            if(!auth.currentUser) return;
            try {
                await setDoc(doc(db, "leaders", auth.currentUser.uid), {
                    score: player.money, power: player.power, bots: player.bots,
                    c1: player.c1, c2: player.c2, xp: player.xp, lvl: player.lvl,
                    name: player.name, gameId: player.id
                }, { merge: true });
                console.log("Cloud: Data Synced");
            } catch(e) { console.error("Save Error", e); }
        };
        setInterval(cloudSave, 15000);

        // 9. МОДАЛЬНЫЕ ОКНА (ЛИДЕРЫ И НАСТРОЙКИ)
        const modal = document.getElementById('main-modal');
        const mBody = document.getElementById('modal-content');
        const closeM = () => modal.style.display = 'none';

        document.getElementById('open-top').onclick = () => {
            modal.style.display = 'flex';
            mBody.innerHTML = `<h3>🏆 ТОП ЛИДЕРОВ</h3><div id="top-list" style="margin:20px 0">Загрузка...</div><button id="m-close" class="buy-btn" style="width:100%">ЗАКРЫТЬ</button>`;
            document.getElementById('m-close').onclick = closeM;

            onSnapshot(query(collection(db, "leaders"), orderBy("score", "desc"), limit(8)), (snap) => {
                const list = document.getElementById('top-list');
                if(!list) return; list.innerHTML = "";
                snap.forEach(d => {
                    const i = d.data();
                    list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px; background:rgba(0,0,0,0.2); margin-bottom:5px; border-radius:12px">
                        <span>#${i.gameId} <b>${i.name}</b></span> <b>${format(i.score)}</b>
                    </div>`;
                });
            });
        };

        document.getElementById('open-settings').onclick = () => {
            modal.style.display = 'flex';
            let admBtn = auth.currentUser.email === ADMIN_EMAIL ? `<button id="m-adm" class="buy-btn" style="width:100%; margin-top:10px; background:var(--p)">АДМИН-ПАНЕЛЬ</button>` : '';
            
            mBody.innerHTML = `
                <h3>⚙️ НАСТРОЙКИ</h3>
                <input type="text" id="new-nick" class="input-f" style="margin-top:20px" placeholder="Новый ник" value="${player.name}">
                <button id="m-save" class="buy-btn" style="width:100%; background:var(--s)">СОХРАНИТЬ</button>
                ${admBtn}
                <button id="m-close" class="buy-btn" style="width:100%; margin-top:10px; background:#444">НАЗАД</button>
            `;

            document.getElementById('m-close').onclick = closeM;
            document.getElementById('m-save').onclick = () => {
                const v = document.getElementById('new-nick').value.trim();
                if(v) { player.name = v; syncUI(); cloudSave(); closeM(); }
            };
            
            if(document.getElementById('m-adm')) {
                document.getElementById('m-adm').onclick = () => openAdmin();
            }
        };

        function openAdmin() {
            mBody.innerHTML = `
                <h3 style="color:var(--a)">ADMIN CONSOLE</h3>
                <input type="text" id="adm-target" class="input-f" style="margin-top:15px" placeholder="ID игрока">
                <input type="number" id="adm-val" class="input-f" placeholder="Сумма монет">
                <button id="adm-give" class="buy-btn" style="width:100%; background:var(--s)">ВЫДАТЬ</button>
                <button id="adm-reset" class="buy-btn" style="width:100%; background:var(--p); margin-top:10px">ОБНУЛИТЬ</button>
                <button id="m-back" class="buy-btn" style="width:100%; margin-top:20px; background:#222">НАЗАД</button>
            `;
            document.getElementById('m-back').onclick = () => document.getElementById('open-settings').click();
            
            document.getElementById('adm-give').onclick = async () => {
                const id = parseInt(document.getElementById('adm-target').value);
                const val = parseFloat(document.getElementById('adm-val').value);
                const q = query(collection(db, "leaders"), where("gameId", "==", id));
                const snap = await getDocs(q);
                if(snap.empty) return toast("ADMIN", "Игрок не найден", true);
                await setDoc(snap.docs[0].ref, { score: (snap.docs[0].data().score || 0) + val }, { merge: true });
                toast("ADMIN", "Монеты выданы!");
            };
        }
    </script>
</body>
</html>
