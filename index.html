<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beas Voice AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            overflow: hidden;
        }

        .beas-glow {
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.3);
        }

        .pulse-active {
            animation: pulse-ring 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .thinking-gradient {
            background: linear-gradient(90deg, #6366f1, #ec4899, #6366f1);
            background-size: 200% auto;
            animation: move-bg 2s linear infinite;
        }

        @keyframes move-bg {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

    <!-- Фоновое свечение -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md bg-slate-900/50 backdrop-blur-3xl rounded-[3rem] border border-white/10 p-8 shadow-2xl relative z-10">
        
        <!-- Заголовок -->
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-pink-500">
                    BEAS VOICE
                </h1>
                <div class="flex items-center gap-2 mt-1">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500"></div>
                    <span id="status-text" class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Система готова</span>
                </div>
            </div>
            <div id="ai-indicator" class="hidden">
                <div class="w-6 h-6 rounded-full thinking-gradient"></div>
            </div>
        </div>

        <!-- Кнопка микрофона -->
        <div class="relative mb-12 flex justify-center">
            <button id="mic-btn" class="w-32 h-32 rounded-full bg-gradient-to-tr from-indigo-600 to-purple-500 flex items-center justify-center transition-all duration-500 shadow-xl hover:scale-105 active:scale-90">
                <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </button>
        </div>

        <!-- Окно транскрипции -->
        <div class="bg-black/40 rounded-3xl p-6 min-h-[150px] border border-white/5 flex flex-col justify-center mb-6">
            <p id="transcript" class="text-xl font-medium text-slate-200 leading-snug">Нажмите на микрофон и скажите команду...</p>
            <p id="ai-reply" class="text-sm text-indigo-300 mt-4 border-t border-white/5 pt-4 hidden italic"></p>
        </div>

        <!-- Подсказки -->
        <div class="grid grid-cols-2 gap-3 opacity-50">
            <div class="bg-white/5 p-3 rounded-2xl text-[10px] border border-white/5">
                <p class="text-indigo-400 font-bold mb-1 uppercase">YouTube</p>
                <p>"Включи канал Лололошка"</p>
            </div>
            <div class="bg-white/5 p-3 rounded-2xl text-[10px] border border-white/5">
                <p class="text-pink-400 font-bold mb-1 uppercase">WhatsApp</p>
                <p>"Открой Ватсап"</p>
            </div>
        </div>
    </div>

    <script>
        const micBtn = document.getElementById('mic-btn');
        const transcriptText = document.getElementById('transcript');
        const aiReply = document.getElementById('ai-reply');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const aiIndicator = document.getElementById('ai-indicator');

        let isListening = false;
        let recognition;
        let audioCtx;
        const apiKey = ""; // Ключ API Gemini

        // Инициализация звука
        function playSound(startFreq, endFreq) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(startFreq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // Настройка речи
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.interimResults = true;
            recognition.continuous = false;

            recognition.onstart = () => {
                isListening = true;
                statusText.innerText = "Слушаю...";
                statusDot.className = "w-2 h-2 rounded-full bg-red-500 animate-pulse";
                micBtn.classList.add('pulse-active');
                micBtn.classList.replace('from-indigo-600', 'from-red-600');
                playSound(660, 880);
            };

            recognition.onend = () => {
                isListening = false;
                statusText.innerText = "Система готова";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                micBtn.classList.remove('pulse-active');
                micBtn.classList.replace('from-red-600', 'from-indigo-600');
            };

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                transcriptText.innerText = text;
                if (event.results[0].isFinal) {
                    handleCommand(text.toLowerCase());
                }
            };
        }

        micBtn.onclick = () => {
            if (isListening) recognition.stop();
            else recognition.start();
        };

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ru-RU';
            utter.pitch = 0.85; // Мужской тон
            utter.rate = 1.0;
            
            const voices = window.speechSynthesis.getVoices();
            const maleVoice = voices.find(v => v.name.includes('Pavel') || v.name.includes('Google русский')) || voices[0];
            if (maleVoice) utter.voice = maleVoice;

            window.speechSynthesis.speak(utter);
        }

        async function askAI(prompt) {
            aiIndicator.classList.remove('hidden');
            aiReply.classList.remove('hidden');
            aiReply.innerText = "Beas думает...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "Ты Beas, мужской голос, ассистент. Отвечай кратко и по делу." }] }
                    })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                aiReply.innerText = text;
                speak(text);
            } catch (e) {
                aiReply.innerText = "Ошибка связи с ИИ.";
            } finally {
                aiIndicator.classList.add('hidden');
            }
        }

        function handleCommand(cmd) {
            // YouTube Логика
            if (cmd.includes('ютуб') || cmd.includes('youtube')) {
                let query = cmd.replace(/включи|открой|ютуб|youtube|канал/g, "").trim();
                if (query) {
                    speak("Ищу канал " + query + " на Ютубе");
                    window.location.href = `intent://www.youtube.com/results?search_query=${encodeURIComponent(query)}#Intent;scheme=http;package=com.google.android.youtube;end`;
                } else {
                    speak("Открываю Ютуб");
                    window.location.href = "intent://www.youtube.com/#Intent;scheme=http;package=com.google.android.youtube;end";
                }
                return;
            }

            // WhatsApp Логика
            if (cmd.includes('ватсап') || cmd.includes('вацап') || cmd.includes('whatsapp')) {
                speak("Открываю Ватсап");
                window.location.href = "intent://send#Intent;scheme=whatsapp;package=com.whatsapp;end";
                return;
            }

            // Просто общение
            askAI(cmd);
        }
    </script>
</body>
</html>
