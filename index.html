<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Clicker v67: Grand Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00f2ff; --bg: #050508; --card: #111116; --red: #ff003c; --green: #39ff14; --gold: #ffcc00; --purp: #bc13fe; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* УВЕДОМЛЕНИЯ */
        #notif-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 100000; pointer-events: none; }
        .toast { background: rgba(10, 10, 15, 0.95); border-left: 4px solid var(--main); padding: 15px; margin-bottom: 10px; border-radius: 10px; font-family: 'Orbitron'; font-size: 12px; animation: toastIn 0.4s forwards; }
        .toast.success { border-left-color: var(--green); color: var(--green); }
        .toast.error { border-left-color: var(--red); color: var(--red); }
        .toast.admin { border-left-color: var(--gold); color: var(--gold); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }

        header { height: 95px; background: #000; border-bottom: 2px solid var(--main); display: flex; flex-direction: column; justify-content: center; padding: 0 20px; }
        .h-row { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 11px; margin-bottom: 8px; }
        .lvl-tag { background: var(--main); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
        .xp-bg { width: 100%; height: 8px; background: #1a1a1a; border-radius: 4px; overflow: hidden; }
        #xp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--main), var(--purp)); transition: 0.3s; }

        .screen { flex: 1; overflow-y: auto; padding: 20px; display: none; flex-direction: column; align-items: center; width: 100%; padding-bottom: 120px; }
        .screen.active { display: flex; }
        
        #display-bal { font-family: 'Orbitron'; font-size: 3rem; font-weight: 900; margin: 20px 0; text-shadow: 0 0 20px var(--main); }
        .main-btn { width: 180px; height: 180px; border-radius: 50%; border: 6px solid var(--main); display: flex; align-items: center; justify-content: center; cursor: pointer; background: radial-gradient(circle, #00f2ff22 0%, #000 85%); transition: 0.1s; }
        .main-btn:active { transform: scale(0.92); }
        .main-btn span { font-size: 60px; }

        /* МАГАЗИН */
        .item-card { width: 100%; max-width: 450px; background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex: 1; padding-right: 10px; }
        .item-info b { font-family: 'Orbitron'; color: #fff; font-size: 13px; display: block; }
        .item-info p { margin: 4px 0 0; font-size: 10px; color: #888; line-height: 1.2; }
        .btn-buy { background: var(--main); color: #000; border: none; border-radius: 8px; padding: 12px 15px; font-family: 'Orbitron'; font-weight: 900; font-size: 11px; cursor: pointer; min-width: 90px; }
        .btn-buy:disabled { background: #222; color: #444; cursor: not-allowed; }

        nav { height: 80px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; }
        .nav-item { color: #444; font-family: 'Orbitron'; font-size: 10px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--main); }

        .float-text { position: fixed; pointer-events: none; font-family: 'Orbitron'; font-weight: 900; font-size: 24px; color: #fff; text-shadow: 0 0 10px var(--main); animation: floatUp 0.8s forwards; z-index: 10000; }
        @keyframes floatUp { from { transform: translate(-50%, -50%); opacity: 1; } to { transform: translate(-50%, -150px); opacity: 0; } }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 25px; }
        #admin-panel { display: none; position: fixed; inset: 0; background: #000; z-index: 110000; padding: 30px; flex-direction: column; overflow-y: auto; }
        .input-box { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; font-family: 'Orbitron'; margin-bottom: 12px; }
    </style>
</head>
<body>

<div id="notif-container"></div>

<div id="auth-screen">
    <div style="width:100%; max-width:350px; background:var(--card); padding:30px; border-radius:20px; border:2px solid var(--main);">
        <h2 style="font-family:Orbitron; text-align:center; color:var(--main);">LOGIN SYSTEM</h2>
        <input type="email" id="auth-email" class="input-box" placeholder="Email">
        <input type="password" id="auth-pass" class="input-box" placeholder="Password">
        <button class="btn-buy" style="width:100%;" onclick="window.handleAuth('login')">ENTRANCE</button>
        <button class="btn-buy" style="width:100%; background:none; border:1px solid var(--main); color:var(--main); margin-top:10px;" onclick="window.handleAuth('reg')">NEW NODE (REG)</button>
    </div>
</div>

<header>
    <div class="h-row">
        <span>CREDITS: <b id="h-bal" style="color:var(--main)">0</b></span>
        <span>LVL: <b id="h-lvl" class="lvl-tag">1</b></span>
    </div>
    <div class="xp-bg"><div id="xp-bar"></div></div>
</header>

<main id="sc-mine" class="screen active">
    <div id="display-bal">0</div>
    <div class="main-btn" id="tap-trigger"><span>💎</span></div>
    <div style="margin-top:20px; font-family:Orbitron; font-size:10px; color:#555; text-align:center;">
        TAP POWER: <span id="stat-pwr" style="color:var(--main)">+1</span><br>
        AUTO MINING: <span id="stat-idle" style="color:var(--main)">0/s</span><br>
        MY_ID: <span id="stat-id" style="color:#888">#00000</span>
    </div>
</main>

<main id="sc-shop" class="screen">
    <h3 style="font-family:Orbitron; color:var(--main); width:100%; max-width:450px;">UPGRADES</h3>
    <div id="shelf-pwr" style="width:100%; max-width:450px;"></div>
    <h3 style="font-family:Orbitron; color:var(--purp); width:100%; max-width:450px; margin-top:20px;">AUTOMATION</h3>
    <div id="shelf-idle" style="width:100%; max-width:450px;"></div>
</main>

<main id="sc-top" class="screen">
    <h3 style="font-family:Orbitron; color:var(--gold); width:100%; max-width:450px;">GALAXY LEADERS</h3>
    <div id="top-list" style="width:100%; max-width:450px;"></div>
</main>

<main id="sc-set" class="screen">
    <div style="width:100%; max-width:400px;">
        <p style="font-family:Orbitron; font-size:10px; color:var(--green);">PROMO REDEEM</p>
        <input type="text" id="promo-input" class="input-box" placeholder="ENTER CODE">
        <button class="btn-buy" style="width:100%; background:var(--green); color:#000;" onclick="window.claimPromo()">ACTIVATE</button>
        <hr style="border:0; border-top:1px solid #222; margin:25px 0;">
        <input type="text" id="nick-input" class="input-box" placeholder="Nickname">
        <button class="btn-buy" style="width:100%;" onclick="window.updateNick()">SAVE NICK</button>
        <button id="btn-admin" style="display:none; margin-top:40px; border:1px dashed red; color:red; background:none; padding:15px; width:100%; font-family:Orbitron;" onclick="window.toggleAdmin(true)">🛡️ ROOT PANEL</button>
        <button class="btn-buy" style="margin-top:20px; background:var(--red);" onclick="auth.signOut(); location.reload();">LOGOUT</button>
    </div>
</main>

<nav>
    <div class="nav-item active" onclick="window.nav('mine', this)">MINE</div>
    <div class="nav-item" onclick="window.nav('shop', this)">SHOP</div>
    <div class="nav-item" onclick="window.nav('top', this)">TOP</div>
    <div class="nav-item" onclick="window.nav('set', this)">SET</div>
</nav>

<div id="admin-panel">
    <h2 style="font-family:Orbitron; color:var(--main);">SYSTEM CONTROL</h2>
    
    <div style="background:#0d0d12; padding:15px; border-radius:10px; border:1px solid #222; margin-bottom:15px;">
        <p style="font-size:10px; color:var(--main);">MANAGE CREDITS (BY NICK/ID)</p>
        <input type="text" id="adm-target" class="input-box" placeholder="Target Nick or ID">
        <input type="number" id="adm-amt" class="input-box" placeholder="Amount">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn-buy" style="background:var(--green); color:#000;" onclick="window.adminModify(true)">GIVE (+)</button>
            <button class="btn-buy" style="background:var(--red); color:#fff;" onclick="window.adminModify(false)">TAKE (-)</button>
        </div>
    </div>

    <div style="background:#0d0d12; padding:15px; border-radius:10px; border:1px solid #222;">
        <p style="font-size:10px; color:var(--gold);">PROMO GENERATOR</p>
        <input type="text" id="adm-p-code" class="input-box" placeholder="CODE NAME">
        <input type="number" id="adm-p-val" class="input-box" placeholder="CREDIT VALUE">
        <button class="btn-buy" style="width:100%; background:var(--gold); color:#000;" onclick="window.adminCreatePromo()">GENERATE</button>
    </div>

    <button class="btn-buy" style="margin-top:auto; background:#222;" onclick="window.toggleAdmin(false)">CLOSE</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, setDoc, getDoc, collection, query, orderBy, limit, getDocs, where, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { apiKey: "AIzaSyDRv2Q060oBb1_1NXuqU4ixLVGy6EEr3To", authDomain: "infinity-clicker-7e01c.firebaseapp.com", projectId: "infinity-clicker-7e01c", storageBucket: "infinity-clicker-7e01c.firebasestorage.app", messagingSenderId: "888672687755", appId: "1:888672687755:web:6dda24bd7e4809c4d5668e" };
    const app = initializeApp(config); const auth = getAuth(app); const db = getFirestore(app);

    const OWNER_ID = 74981;
    let u = { credits: 0, maxCredits: 0, pwr: 1, idle: 0, mult: 1, shortId: 0, nickname: 'Miner', lvl: 1, xp: 0, upg: {} };

    const SHOP_DATA = {
        pwr: [
            {id:'p1', n:'Лазерная указка', d:'Усиливает твой клик на +1.', b:50, v:1},
            {id:'p2', n:'Кибер-перчатка', d:'Мощный импульс! Дает +15.', b:1000, v:15},
            {id:'p3', n:'Плазменный резак', d:'Режет материю. Дает +100.', b:15000, v:100}
        ],
        idle: [
            {id:'i1', n:'Дрон-сборщик', d:'Добывает 5/сек автоматически.', b:300, v:5},
            {id:'i2', n:'Майнинг-ферма', d:'Промышленная добыча. Дает 50/сек.', b:5000, v:50},
            {id:'i3', n:'Спутник-шахтер', d:'Орбитальный сборщик. Дает 400/сек.', b:60000, v:400}
        ]
    };

    window.notify = (t, type='') => {
        const c = document.getElementById('notif-container');
        const e = document.createElement('div'); e.className = `toast ${type}`;
        e.innerHTML = `<span>${t}</span>`; c.appendChild(e);
        setTimeout(() => { e.style.opacity='0'; setTimeout(()=>e.remove(), 500); }, 3000);
    };

    window.format = n => n < 1000 ? Math.floor(n) : (n/1000).toFixed(1)+'K';

    window.syncUI = () => {
        document.getElementById('h-bal').innerText = window.format(u.credits);
        document.getElementById('display-bal').innerText = window.format(u.credits);
        document.getElementById('h-lvl').innerText = u.lvl;
        document.getElementById('stat-pwr').innerText = "+" + window.format(u.pwr);
        document.getElementById('stat-idle').innerText = window.format(u.idle) + "/s";
        document.getElementById('stat-id').innerText = "#" + u.shortId;
        document.getElementById('xp-bar').style.width = Math.min((u.xp / (u.lvl * 5000)) * 100, 100) + "%";
        if(u.shortId === OWNER_ID) document.getElementById('btn-admin').style.display = 'block';
        renderShop();
    };

    const renderShop = () => {
        const draw = (contId, items, cat) => {
            const el = document.getElementById(contId); el.innerHTML = '';
            items.forEach(it => {
                const count = u.upg[it.id] || 0;
                const cost = Math.floor(it.b * Math.pow(1.6, count));
                el.innerHTML += `<div class="item-card"><div class="item-info"><b>${it.n} [${count}]</b><p>${it.d}</p></div>
                <button class="btn-buy" ${u.credits >= cost ? '' : 'disabled'} onclick="window.buyItem('${it.id}',${cost},'${cat}',${it.v})">${window.format(cost)}</button></div>`;
            });
        };
        draw('shelf-pwr', SHOP_DATA.pwr, 'pwr'); draw('shelf-idle', SHOP_DATA.idle, 'idle');
    };

    window.buyItem = (id, cost, type, val) => {
        if(u.credits >= cost) {
            u.credits -= cost; u.upg[id] = (u.upg[id] || 0) + 1;
            if(type === 'pwr') u.pwr += val; else u.idle += val;
            window.notify("КУПЛЕНО!", "success"); window.syncUI(); window.save();
        }
    };

    document.getElementById('tap-trigger').onclick = (e) => {
        const gain = u.pwr * u.mult;
        u.credits += gain; u.xp += gain;
        if(u.xp >= u.lvl * 5000) { u.xp = 0; u.lvl++; window.notify("УРОВЕНЬ ПОВЫШЕН!", "success"); }
        if(u.credits > u.maxCredits) u.maxCredits = u.credits;
        const ft = document.createElement('div'); ft.className = 'float-text'; ft.innerText = '+' + window.format(gain);
        ft.style.left = e.clientX + 'px'; ft.style.top = e.clientY + 'px';
        document.body.appendChild(ft); setTimeout(() => ft.remove(), 800);
        window.syncUI();
    };

    window.nav = (id, el) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('sc-'+id).classList.add('active'); el.classList.add('active');
        if(id === 'top') window.refreshTop();
    };

    window.refreshTop = async () => {
        const q = query(collection(db, "users"), orderBy("maxCredits", "desc"), limit(10));
        const snap = await getDocs(q);
        const list = document.getElementById('top-list'); list.innerHTML = '';
        snap.forEach((d, i) => {
            list.innerHTML += `<div class="item-card"><span>#${i+1} ${d.data().nickname}</span><b>${window.format(d.data().maxCredits)}</b></div>`;
        });
    };

    window.handleAuth = async (m) => {
        const e = document.getElementById('auth-email').value;
        const p = document.getElementById('auth-pass').value;
        try {
            if(m==='login') await signInWithEmailAndPassword(auth,e,p);
            else {
                const r = await createUserWithEmailAndPassword(auth,e,p);
                const newId = Math.floor(10000 + Math.random() * 80000);
                await setDoc(doc(db,"users",r.user.uid), {...u, shortId:newId, nickname:e.split('@')[0]});
            }
        } catch(err) { window.notify("AUTH ERROR: " + err.code, "error"); }
    };

    onAuthStateChanged(auth, async user => {
        if(user) {
            document.getElementById('auth-screen').style.display='none';
            const ref = doc(db,"users",user.uid);
            const s = await getDoc(ref);
            if(s.exists()){ 
                u={...u,...s.data()}; window.syncUI(); 
                onSnapshot(ref,d=> {if(d.exists()){u=d.data(); window.syncUI();}});
            }
        }
    });

    window.adminModify = async (isAdd) => {
        const target = document.getElementById('adm-target').value.trim();
        const amt = Math.abs(Number(document.getElementById('adm-amt').value));
        if(!target || !amt) return;
        let q = isNaN(target) ? query(collection(db, "users"), where("nickname", "==", target)) : query(collection(db, "users"), where("shortId", "==", Number(target)));
        const snap = await getDocs(q);
        if(!snap.empty) {
            const d = snap.docs[0];
            const newBal = isAdd ? (d.data().credits + amt) : Math.max(0, d.data().credits - amt);
            await updateDoc(doc(db, "users", d.id), { credits: newBal, maxCredits: isAdd ? d.data().maxCredits + amt : d.data().maxCredits });
            window.notify("DONE!", "admin");
        } else window.notify("USER NOT FOUND", "error");
    };

    window.claimPromo = async () => {
        const c = document.getElementById('promo-input').value.toUpperCase().trim();
        const ref = doc(db, "promos", c);
        const s = await getDoc(ref);
        if(s.exists() && (!s.data().usedBy || !s.data().usedBy.includes(auth.currentUser.uid))) {
            u.credits += s.data().val;
            await updateDoc(ref, { usedBy: arrayUnion(auth.currentUser.uid) });
            window.notify("PROMO OK!", "success"); window.syncUI(); window.save();
        } else window.notify("INVALID CODE", "error");
    };

    window.adminCreatePromo = async () => {
        const c = document.getElementById('adm-p-code').value.toUpperCase();
        const v = Number(document.getElementById('adm-p-val').value);
        await setDoc(doc(db,"promos",c), {val:v, usedBy:[]});
        window.notify("CODE CREATED", "admin");
    };

    window.save = async () => { if(auth.currentUser) await updateDoc(doc(db,"users",auth.currentUser.uid), u); };
    window.toggleAdmin = s => document.getElementById('admin-panel').style.display = s?'flex':'none';
    window.updateNick = () => { u.nickname = document.getElementById('nick-input').value; window.save(); window.notify("SAVED"); };
    
    setInterval(() => { if(u.idle > 0) { u.credits += (u.idle * u.mult)/10; window.syncUI(); } }, 100);
</script>
</body>
</html>
