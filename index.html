<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Clicker: FX Edition v34</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ff003c; --blue: #00f2ff; --green: #39ff14; --gold: #ffcc00; --bg: #050508; --card: #111116; }
        body.theme-blue { --main: #00f2ff; } 
        body.theme-green { --main: #39ff14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; }
        body { background: var(--bg); color: #fff; margin: 0; overflow: hidden; font-family: 'Montserrat', sans-serif; height: 100vh; transition: 0.3s; }

        /* Notifications */
        #notify-container { position: fixed; top: 10px; right: 10px; z-index: 50000; display: flex; flex-direction: column; gap: 5px; }
        .toast { background: rgba(0,0,0,0.9); border-left: 4px solid var(--main); padding: 10px; border-radius: 5px; font-family: 'Orbitron'; font-size: 10px; border: 1px solid #222; animation: sIn 0.3s forwards; }
        @keyframes sIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        header { height: 65px; background: #000; border-bottom: 2px solid var(--main); display: flex; align-items: center; justify-content: space-around; font-family: 'Orbitron'; z-index: 10; position: relative; }
        header b { color: var(--main); }

        .screen { height: calc(100vh - 135px); overflow-y: auto; padding: 15px; display: none; flex-direction: column; align-items: center; padding-bottom: 80px; }
        .screen.active { display: flex; }
        
        #big-bal { font-family: 'Orbitron'; font-size: 2.2rem; margin: 5px 0; text-shadow: 0 0 10px var(--main); font-weight: 900; }
        
        /* CLICK ZONE & ANIMATION */
        .tap-area { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; margin-top: 20px; }
        .tap-zone { 
            width: 150px; height: 150px; border-radius: 50%; 
            background: radial-gradient(circle, var(--main), #000); 
            border: 4px solid rgba(255,255,255,0.1); 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 20px var(--main); transition: transform 0.05s ease;
            z-index: 5;
        }
        .tap-zone:active { transform: scale(0.92); }

        /* Floating Text */
        .float-text {
            position: absolute; color: #fff; font-family: 'Orbitron'; font-weight: 900;
            font-size: 1.2rem; pointer-events: none; z-index: 100;
            animation: floatUp 0.8s ease-out forwards; text-shadow: 0 0 5px #000;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
        }

        .live-stats { width: 100%; max-width: 350px; margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .stat-box { background: #0a0a0f; border: 1px solid #222; padding: 5px; border-radius: 5px; text-align: center; font-family: 'Orbitron'; font-size: 8px; }
        .stat-box b { color: var(--main); display: block; font-size: 10px; }

        .card { width: 100%; max-width: 400px; background: var(--card); border-radius: 10px; padding: 12px; margin-bottom: 8px; border: 1px solid #222; }
        .card.boost { border: 1px solid var(--gold); background: linear-gradient(45deg, #111, #1a1a00); }
        .common { border-left: 4px solid #888; } .rare { border-left: 4px solid var(--blue); } 
        .epic { border-left: 4px solid #a335ee; } .mythic { border-left: 4px solid #ff8000; } 
        .legendary { border-left: 4px solid var(--gold); }

        input { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; border-radius: 5px; color: #fff; font-family: 'Orbitron'; font-size: 11px; }
        .btn-p { width: 100%; padding: 10px; background: var(--main); border: none; border-radius: 5px; color: #fff; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; }

        nav { height: 70px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; z-index: 1000; }
        .nav-btn { color: #444; font-size: 9px; font-family: 'Orbitron'; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--main); }

        #adm-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 40000; padding: 15px; flex-direction: column; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 8px; font-family: 'Orbitron'; margin-top: 10px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #111; }
        .sync-icon { font-size: 8px; color: var(--green); display: none; }
    </style>
</head>
<body id="body">

<div id="notify-container"></div>

<div id="auth-scr" style="position:fixed; inset:0; background:#000; z-index:60000; display:flex; align-items:center; justify-content:center;">
    <div style="width:80%; max-width:300px; text-align:center;">
        <h2 style="font-family:'Orbitron'; color:var(--main)">NEURAL CONNECT</h2>
        <input type="email" id="in-e" placeholder="EMAIL">
        <input type="password" id="in-p" placeholder="PASSWORD">
        <button class="btn-p" onclick="doAuth('login')">LOGIN</button>
        <button onclick="doAuth('reg')" style="background:none; border:none; color:#444; margin-top:10px; font-size:10px;">REGISTER IDENTITY</button>
    </div>
</div>

<header>
    <div><small>CREDITS</small><b id="h-c">0</b></div>
    <div><small>LEVEL</small><b id="h-l">1</b></div>
    <button onclick="openAdm()" style="background:none; border:1px solid #333; color:var(--blue); border-radius:5px; padding:5px;">🛡️</button>
</header>

<main id="sc-game" class="screen active">
    <div id="big-bal">0</div>
    <div class="tap-area">
        <div class="tap-zone" id="tap-btn"><b style="font-family:'Orbitron';">CORE</b></div>
    </div>
    <div class="live-stats">
        <div class="stat-box"><small>PWR</small><b id="s-pwr">+1</b></div>
        <div class="stat-box"><small>AUTO</small><b id="s-idle">0/s</b></div>
        <div class="stat-box"><small>MULT</small><b id="s-mult">x1.0</b></div>
    </div>
</main>

<main id="sc-shop" class="screen">
    <h3 style="font-family:'Orbitron'; color:var(--gold)">MARKET</h3>
    <div id="shop-list" style="width:100%;"></div>
</main>

<main id="sc-top" class="screen">
    <h3 style="font-family:'Orbitron'; color:var(--blue)">TOP MINERS</h3>
    <div id="top-list" style="width:100%;"></div>
</main>

<main id="sc-set" class="screen">
    <h3 style="font-family:'Orbitron'; color:var(--main)">SETTINGS <span id="sync-ui" class="sync-icon">● SYNC</span></h3>
    <div class="card">
        <input type="text" id="new-nick" placeholder="New Nickname">
        <button class="btn-p" onclick="changeNick()">SAVE NAME</button>
    </div>
    <div class="card">
        <div style="display:flex; gap:5px;">
            <button onclick="setTheme('red')" style="flex:1; background:#ff003c; border:none; height:25px;"></button>
            <button onclick="setTheme('blue')" style="flex:1; background:#00f2ff; border:none; height:25px;"></button>
            <button onclick="setTheme('green')" style="flex:1; background:#39ff14; border:none; height:25px;"></button>
        </div>
    </div>
    <div class="card">
        <small>ID: <b id="p-id">0</b></small><br>
        <small>TOTAL CLICKS: <b id="p-clicks">0</b></small>
    </div>
    <div class="card">
        <input type="text" id="promo-in" placeholder="PROMO CODE">
        <button class="btn-p" style="background:var(--green); color:#000;" onclick="usePromo()">APPLY</button>
    </div>
</main>

<nav>
    <div class="nav-btn active" id="n-game">MINE</div>
    <div class="nav-btn" id="n-shop">SHOP</div>
    <div class="nav-btn" id="n-top">TOP</div>
    <div class="nav-btn" id="n-set">SET</div>
</nav>

<div id="adm-modal">
    <h2 style="font-family:'Orbitron'; color:var(--blue)">ADMIN</h2>
    <div class="card">
        <input type="text" id="adm-target" placeholder="Target Short ID">
        <input type="number" id="adm-amt" placeholder="Credits Amount">
        <button class="btn-p" onclick="admAction()">GIVE CREDITS</button>
    </div>
    <div class="card">
        <input type="text" id="adm-pn" placeholder="PROMO NAME">
        <input type="number" id="adm-pv" placeholder="Value">
        <button class="btn-p" onclick="admPromo()">CREATE PROMO</button>
    </div>
    <div class="card">
        <button class="btn-p" style="background:var(--blue); color:#000;" onclick="loadArchive()">SYNC DATABASE</button>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>ID</th><th>NICK</th><th>CLICKS</th><th>BAL</th></tr></thead>
                <tbody id="db-body"></tbody>
            </table>
        </div>
    </div>
    <button class="btn-p" onclick="closeAdm()" style="background:#333; margin-top:10px;">EXIT</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, orderBy, limit, getDocs, where, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = { apiKey: "AIzaSyDRv2Q060oBb1_1NXuqU4ixLVGy6EEr3To", authDomain: "infinity-clicker-7e01c.firebaseapp.com", projectId: "infinity-clicker-7e01c", storageBucket: "infinity-clicker-7e01c.firebasestorage.app", messagingSenderId: "888672687755", appId: "1:888672687755:web:6dda24bd7e4809c4d5668e" };
    const app = initializeApp(cfg); const auth = getAuth(app); const db = getFirestore(app);

    let s = { credits: 0, maxCredits: 0, shortId: 0, clickPwr: 1, idle: 0, totalClicks: 0, multiplier: 1, nickname: '', theme: 'red', upg: {} };

    window.toast = (m) => { const c = document.getElementById('notify-container'); const d = document.createElement('div'); d.className = 'toast'; d.innerText = m; c.appendChild(d); setTimeout(()=>d.remove(), 2500); };
    const fmt = (n) => { if(Math.abs(n) < 1000) return Math.floor(n); const i = Math.floor(Math.log10(Math.abs(n))/3)-1; return (n/Math.pow(1000, i+1)).toFixed(2) + ["K","M","B","T"][i]; };

    const saveToCloud = async () => {
        if(!auth.currentUser) return;
        document.getElementById('sync-ui').style.display = 'inline';
        await updateDoc(doc(db, "users", auth.currentUser.uid), s);
        setTimeout(() => document.getElementById('sync-ui').style.display = 'none', 1000);
    };

    const sync = () => {
        document.getElementById('big-bal').innerText = fmt(s.credits);
        document.getElementById('h-c').innerText = fmt(s.credits);
        document.getElementById('h-l').innerText = Math.floor(s.maxCredits / 2000) + 1;
        document.getElementById('s-pwr').innerText = "+" + fmt(s.clickPwr);
        document.getElementById('s-idle').innerText = fmt(s.idle) + "/s";
        document.getElementById('s-mult').innerText = "x" + (s.multiplier || 1).toFixed(1);
        document.getElementById('p-id').innerText = s.shortId;
        document.getElementById('p-clicks').innerText = s.totalClicks || 0;
        
        const sl = document.getElementById('shop-list'); sl.innerHTML = '';
        [
            {id:'bp', n:'+1 Power', p:100, pw:1, r:'boost'},
            {id:'bm', n:'x2 Multiplier', p:15000, m:2, r:'boost'},
            {id:'s1', n:'Common Slave', p:150, i:5, r:'common'},
            {id:'s2', n:'Rare Droid', p:1500, i:50, r:'rare'},
            {id:'s3', n:'Epic Factory', p:12000, i:450, r:'epic'},
            {id:'s4', n:'Mythic Matrix', p:80000, i:3000, r:'mythic'},
            {id:'s5', n:'Legendary Lord', p:500000, i:15000, r:'legendary'}
        ].forEach(it => {
            const count = s.upg[it.id] || 0;
            const pr = Math.floor(it.p * Math.pow(1.65, count));
            sl.innerHTML += `<div class="card ${it.r} ${it.r==='boost'?'boost':''}">
                <b>${it.n} [${count}]</b><br>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <small>${it.i?'+'+it.i+'/s':it.pw?'+1 Pwr':'x2 Mult'}</small>
                    <button class="btn-p" style="width:auto; padding:5px 12px;" onclick="buy('${it.id}',${pr},${it.i||0},${it.pw||0},${it.m||0})">${fmt(pr)}</button>
                </div>
            </div>`;
        });
    };

    window.buy = (id, p, i, pw, m) => {
        if(s.credits >= p) {
            s.credits -= p; s.upg[id] = (s.upg[id] || 0) + 1;
            s.idle += i; s.clickPwr += pw; if(m) s.multiplier *= m;
            sync(); saveToCloud(); toast("UPGRADE APPLIED");
        }
    };

    // CLICK HANDLER WITH ANIMATION
    document.getElementById('tap-btn').onclick = (e) => {
        const gain = s.clickPwr * (s.multiplier || 1);
        s.credits += gain; s.totalClicks++;
        if(s.credits > s.maxCredits) s.maxCredits = s.credits;
        sync();

        // Create Float Text
        const ft = document.createElement('div');
        ft.className = 'float-text';
        ft.innerText = `+${fmt(gain)}`;
        // Position it near the click or in center of zone
        const rect = e.target.getBoundingClientRect();
        ft.style.left = (e.clientX - 20) + 'px';
        ft.style.top = (e.clientY - 20) + 'px';
        document.body.appendChild(ft);
        setTimeout(() => ft.remove(), 800);
    };

    window.doAuth = async (m) => {
        const e = document.getElementById('in-e').value; const p = document.getElementById('in-p').value;
        try {
            if(m==='login') await signInWithEmailAndPassword(auth, e, p);
            else {
                const r = await createUserWithEmailAndPassword(auth, e, p);
                s.shortId = Math.floor(10000 + Math.random()*89999);
                await setDoc(doc(db, "users", r.user.uid), s);
            }
        } catch(ex) { toast(ex.message); }
    };

    onAuthStateChanged(auth, async (u) => {
        if(u) {
            document.getElementById('auth-scr').style.display = 'none';
            onSnapshot(doc(db, "users", u.uid), (snap) => {
                if(snap.exists()){
                    const cloud = snap.data();
                    if(Math.abs(s.credits - cloud.credits) > 100) {
                        s.credits = cloud.credits; s.maxCredits = cloud.maxCredits;
                        s.multiplier = cloud.multiplier || 1; s.clickPwr = cloud.clickPwr || 1;
                        s.idle = cloud.idle || 0; s.upg = cloud.upg || {};
                    }
                    s.shortId = cloud.shortId; s.nickname = cloud.nickname;
                    s.theme = cloud.theme || 'red'; setTheme(s.theme); sync();
                }
            });
            setInterval(saveToCloud, 5000);
        }
    });

    window.setTheme = (t) => { document.getElementById('body').className = 'theme-'+t; s.theme = t; };
    window.changeNick = () => { 
        const n = document.getElementById('new-nick').value;
        if(n.length > 2) { s.nickname = n; sync(); saveToCloud(); toast("SAVED"); }
    };

    window.loadTop = async () => {
        const q = query(collection(db, "users"), orderBy("maxCredits", "desc"), limit(10));
        const sn = await getDocs(q); const l = document.getElementById('top-list'); l.innerHTML = '';
        sn.forEach((d, i) => l.innerHTML += `<div class="card">#${i+1} ${d.data().nickname || d.data().shortId} - <b>${fmt(d.data().maxCredits)}</b></div>`);
    };

    window.loadArchive = async () => {
        const sn = await getDocs(collection(db, "users")); const b = document.getElementById('db-body'); b.innerHTML = '';
        sn.forEach(d => { const u = d.data(); b.innerHTML += `<tr><td>${u.shortId}</td><td>${u.nickname||'---'}</td><td>${u.totalClicks||0}</td><td>${fmt(u.credits)}</td></tr>`; });
    };

    window.admAction = async () => {
        const tid = Number(document.getElementById('adm-target').value);
        const amt = Number(document.getElementById('adm-amt').value);
        const q = query(collection(db, "users"), where("shortId", "==", tid));
        const sn = await getDocs(q);
        if(!sn.empty) {
            await updateDoc(doc(db, "users", sn.docs[0].id), { credits: (sn.docs[0].data().credits || 0) + amt });
            toast("DONE"); loadArchive();
        }
    };

    window.admPromo = async () => {
        await setDoc(doc(db, "promocodes", document.getElementById('adm-pn').value.toUpperCase()), { value: Number(document.getElementById('adm-pv').value), usedBy: [] });
        toast("PROMO CREATED");
    };

    window.usePromo = async () => {
        const ref = doc(db, "promocodes", document.getElementById('promo-in').value.toUpperCase());
        const sn = await getDoc(ref);
        if(sn.exists() && !sn.data().usedBy.includes(auth.currentUser.uid)) {
            s.credits += sn.data().value;
            await updateDoc(ref, { usedBy: arrayUnion(auth.currentUser.uid) });
            saveToCloud(); sync(); toast("REWARDED");
        }
    };

    setInterval(() => { if(s.idle > 0) { s.credits += (s.idle/10); sync(); } }, 100);

    const go = (id) => {
        document.querySelectorAll('.screen').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('sc-'+id).classList.add('active');
        document.getElementById('n-'+id).classList.add('active');
        if(id === 'top') loadTop();
    };

    document.getElementById('n-game').onclick = () => go('game');
    document.getElementById('n-shop').onclick = () => go('shop');
    document.getElementById('n-top').onclick = () => go('top');
    document.getElementById('n-set').onclick = () => go('set');
    window.openAdm = () => { document.getElementById('adm-modal').style.display='flex'; loadArchive(); };
    window.closeAdm = () => document.getElementById('adm-modal').style.display='none';
</script>
</body>
</html>
