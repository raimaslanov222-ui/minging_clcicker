<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minding Clicker ID</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #0f0f1a; color: white; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Экран входа */
        #auth-screen { position: fixed; inset: 0; background: #0f0f1a; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { width: 100%; max-width: 320px; background: #1a1a2e; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #0f0f1a; color: white; outline: none; }
        .auth-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        #login-btn { background: #4ecca3; color: white; }
        #reg-btn { background: transparent; color: #4ecca3; border: 1px solid #4ecca3; margin-top: 10px; }

        /* Игра */
        #game-ui { display: none; flex: 1; }
        .red-hill { height: 20vh; background: linear-gradient(180deg, #ff3333 0%, #800000 100%); border-bottom-left-radius: 50% 15%; border-bottom-right-radius: 50% 15%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #money { font-size: 3rem; margin: 0; font-weight: 900; }
        .game-content { display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 15px; }
        #main-button { width: 160px; height: 160px; border-radius: 50%; background: #ff4d4d; border: 5px solid white; background-image: url('button.png'); background-size: cover; box-shadow: 0 10px 30px rgba(255, 77, 77, 0.5); cursor: pointer; }
        #main-button:active { transform: scale(0.95); }
        .panel { width: 100%; max-width: 400px; background: #1a1a2e; padding: 15px; border-radius: 20px; border: 1px solid #333; }
        .leader-entry { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="margin: 0 0 15px 0">Minding ID</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="auth-btn" id="login-btn">ВОЙТИ</button>
            <button class="auth-btn" id="reg-btn">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="red-hill">
            <div id="money">0</div>
            <div style="font-size:0.8rem; opacity:0.8">Ваш счет</div>
        </div>
        <div class="game-content">
            <div id="main-button"></div>
            <div class="panel">
                <button id="save-btn" style="width:100%; background:#ffcc00; border:none; padding:15px; border-radius:12px; font-weight:bold; cursor:pointer">🏆 СОХРАНИТЬ РЕКОРД</button>
                <button onclick="auth.signOut().then(()=>location.reload())" style="width:100%; background:none; border:none; color:gray; margin-top:15px; cursor:pointer">Выйти</button>
            </div>
            <div class="panel">
                <h3 style="text-align:center; margin:0 0 10px 0; color:#ffcc00">📊 МИРОВОЙ ТОП-5</h3>
                <div id="leader-list">Загрузка...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Твои настройки из скриншотов
        const firebaseConfig = {
            apiKey: "AIzaSyA6v-Qacyh1dDl7J8-XsQY6NxcGcNzBt9o",
            authDomain: "mindingclicker.firebaseapp.com",
            projectId: "mindingclicker",
            storageBucket: "mindingclicker.firebasestorage.app",
            messagingSenderId: "484824275063",
            appId: "1:484824275063:web:b98565344eea2760a34005"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, money = 0;

        // Вход и регистрация
        document.getElementById('reg-btn').onclick = () => createUserWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert(e.message));
        document.getElementById('login-btn').onclick = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert(e.message));

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
            }
        });

        // Клик
        document.getElementById('main-button').onclick = () => {
            money++;
            document.getElementById('money').innerText = money;
        };

        // Сохранение рекорда по уникальному UID игрока
        document.getElementById('save-btn').onclick = async () => {
            if (!user) return;
            // Использование user.uid вместо имени гарантирует ОДНУ строку в топе для одного игрока
            await setDoc(doc(db, "leaders", user.uid), {
                name: user.email.split('@')[0], 
                score: money
            });
            alert("Твой результат обновлен!");
        };

        // Загрузка топа в реальном времени
        onSnapshot(query(collection(db, "leaders"), orderBy("score", "desc"), limit(5)), (snap) => {
            const list = document.getElementById('leader-list');
            list.innerHTML = "";
            snap.forEach(d => {
                list.innerHTML += `<div class="leader-entry"><span>${d.data().name}</span><b>${d.data().score} 💰</b></div>`;
            });
        });
    </script>
</body>
</html>
