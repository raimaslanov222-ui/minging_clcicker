<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minding Clicker Online</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #0f0f1a; color: white; min-height: 100vh; display: flex; flex-direction: column; }
        .red-hill { height: 25vh; background: linear-gradient(180deg, #ff3333 0%, #800000 100%); border-bottom-left-radius: 50% 15%; border-bottom-right-radius: 50% 15%; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 5px 25px rgba(255, 0, 0, 0.5); }
        #money { font-size: 3.5rem; margin: 0; font-weight: 900; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .info { font-size: 0.8rem; opacity: 0.8; margin-top: 5px; }
        .game-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 15px; margin-top: -20px; }
        #main-button { width: 200px; height: 200px; border-radius: 50%; background: #ff4d4d; border: 6px solid white; background-image: url('button.png'); background-size: cover; background-position: center; box-shadow: 0 10px 30px rgba(255, 77, 77, 0.5); cursor: pointer; transition: transform 0.05s; }
        #main-button:active { transform: scale(0.92); }
        .panel { width: 100%; max-width: 400px; background: #1a1a2e; padding: 15px; border-radius: 20px; border: 1px solid #333; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .upgrade-btn { background: #252545; border: 1px solid #ff3333; color: white; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 0.75rem; text-align: center; }
        .leaderboard h3 { margin: 0 0 10px 0; text-align: center; color: #ffcc00; font-size: 1rem; }
        .leader-entry { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .leader-entry b { color: #4ecca3; }
        #save-btn { width: 100%; margin-top: 10px; background: #ffcc00; color: black; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="red-hill">
        <div id="money">0</div>
        <div class="info">Клик: +<span id="power">1</span> | Авто: +<span id="auto">0</span>/с</div>
    </div>

    <div class="game-content">
        <div id="main-button"></div>
        <div class="panel">
            <div class="shop-grid">
                <div class="upgrade-btn" id="btn-click">💪 СИЛА (+1)<br><span id="c-price">10</span> 💰</div>
                <div class="upgrade-btn" id="btn-auto">🤖 АВТО (+1)<br><span id="a-price">50</span> 💰</div>
            </div>
            <button id="save-btn">🏆 ОПУБЛИКОВАТЬ РЕКОРД</button>
        </div>
        <div class="panel">
            <div class="leaderboard">
                <h3>📊 МИРОВОЙ ТОП-5</h3>
                <div id="leader-list">Загрузка рекордов...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6v-Qacyh1dDl7J8-XsQY6NxcGcNzBtX0",
            authDomain: "mindingclicker.firebaseapp.com",
            projectId: "mindingclicker",
            storageBucket: "mindingclicker.firebasestorage.app",
            messagingSenderId: "484824275063",
            appId: "1:484824275063:web:b98565344eea2760a34005"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const leadersCol = collection(db, "leaders");

        // ПЕРЕМЕННЫЕ ИГРЫ
        let money = parseFloat(localStorage.getItem('m_money')) || 0;
        let power = parseInt(localStorage.getItem('m_power')) || 1;
        let auto = parseInt(localStorage.getItem('m_auto')) || 0;
        let priceClick = parseInt(localStorage.getItem('m_p_c')) || 10;
        let priceAuto = parseInt(localStorage.getItem('m_p_a')) || 50;

        function updateUI() {
            document.getElementById('money').innerText = Math.floor(money);
            document.getElementById('power').innerText = power;
            document.getElementById('auto').innerText = auto;
            document.getElementById('c-price').innerText = priceClick;
            document.getElementById('a-price').innerText = priceAuto;
        }

        // КЛИК
        document.getElementById('main-button').addEventListener('click', () => {
            money += power;
            updateUI();
        });

        // МАГАЗИН
        document.getElementById('btn-click').addEventListener('click', () => {
            if (money >= priceClick) {
                money -= priceClick; power++; priceClick = Math.round(priceClick * 1.6);
                updateUI(); save();
            }
        });

        document.getElementById('btn-auto').addEventListener('click', () => {
            if (money >= priceAuto) {
                money -= priceAuto; auto++; priceAuto = Math.round(priceAuto * 1.7);
                updateUI(); save();
            }
        });

        // СОХРАНЕНИЕ ЛОКАЛЬНО
        function save() {
            localStorage.setItem('m_money', money);
            localStorage.setItem('m_power', power);
            localStorage.setItem('m_auto', auto);
            localStorage.setItem('m_p_c', priceClick);
            localStorage.setItem('m_p_a', priceAuto);
        }

        // ПУБЛИКАЦИЯ В FIREBASE
        document.getElementById('save-btn').addEventListener('click', async () => {
            let name = prompt("Введите ваше имя:");
            if (name) {
                try {
                    await addDoc(leadersCol, { name: name, score: Math.floor(money), date: Date.now() });
                    alert("Рекорд сохранен в облако!");
                } catch (e) {
                    alert("Ошибка базы! Проверь Rules в Firebase");
                    console.error(e);
                }
            }
        });

        // ОБНОВЛЕНИЕ РЕКОРДОВ (REALTIME)
        const q = query(leadersCol, orderBy("score", "desc"), limit(5));
        onSnapshot(q, (snapshot) => {
            const listEl = document.getElementById('leader-list');
            listEl.innerHTML = "";
            if (snapshot.empty) { listEl.innerHTML = "Пока нет рекордов"; }
            snapshot.forEach(doc => {
                const d = doc.data();
                listEl.innerHTML += `<div class="leader-entry"><span>${d.name}</span><b>${d.score} 💰</b></div>`;
            });
        });

        // АВТОКЛИКЕР
        setInterval(() => {
            money += auto;
            updateUI();
            if(auto > 0) save();
        }, 1000);

        updateUI();
    </script>
</body>
</html>
