<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Clicker Ultra Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- 1. БАЗОВЫЕ СТИЛИ (Линии 14-60) --- */
        :root {
            --primary: #ff1a1a;
            --secondary: #4ecca3;
            --bg: #0f0f1a;
            --panel: #1a1a2e;
            --gold: #ffcc00;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            outline: none;
        }

        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Roboto', sans-serif; 
            background: var(--bg); 
            color: white; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* --- 2. АНИМАЦИИ (Линии 61-90) --- */
        @keyframes clickPop {
            0% { transform: scale(1); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 26, 26, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(255, 26, 26, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 26, 26, 0); }
        }

        /* --- 3. ИНТЕРФЕЙС АВТОРИЗАЦИИ (Линии 91-120) --- */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #1a1a2e 0%, #05050a 100%);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-box {
            width: 90%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .auth-box h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ff1a1a, #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- 4. ШАПКА ИГРЫ (Линии 121-160) --- */
        #game-ui { display: none; flex-direction: column; height: 100%; }

        .header { 
            background: linear-gradient(180deg, var(--primary) 0%, #800000 100%); 
            padding: 40px 20px 25px 20px; 
            text-align: center; 
            border-bottom-left-radius: 40px; 
            border-bottom-right-radius: 40px; 
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #money { 
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem; 
            margin: 0; 
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .user-badge {
            display: inline-block;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--secondary);
            font-weight: bold;
        }

        /* --- 5. КНОПКИ УПРАВЛЕНИЯ (Линии 161-190) --- */
        .icon-btn { 
            position: absolute; 
            top: 20px; 
            background: rgba(255,255,255,0.2); 
            border: none; 
            border-radius: 15px; 
            width: 45px; 
            height: 45px; 
            color: white; 
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .icon-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.4); }
        #top-btn { left: 20px; }
        #set-btn { right: 20px; }

        /* --- 6. ИГРОВАЯ ЗОНА (Линии 191-230) --- */
        .click-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative;
        }

        #main-button { 
            width: 200px; 
            height: 200px; 
            border-radius: 50%; 
            background: url('button.png') center/cover, radial-gradient(#ff1a1a, #330000); 
            border: 8px solid white; 
            cursor: pointer;
            animation: pulse 2s infinite;
            z-index: 10;
        }

        .floating-text {
            position: absolute;
            color: var(--secondary);
            font-weight: 900;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 20;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            width: 90%;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            font-size: 0.8rem;
        }

        /* --- 7. МАГАЗИН (Линии 231-280) --- */
        .shop { 
            background: var(--panel); 
            padding: 20px; 
            border-top-left-radius: 40px; 
            border-top-right-radius: 40px; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }

        .item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: rgba(255,255,255,0.03); 
            margin-bottom: 10px; 
            padding: 12px 20px; 
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .item-info b { font-size: 1rem; display: block; }
        .item-info span { color: #888; font-size: 0.8rem; }

        .buy-btn { 
            background: var(--gold); 
            color: black; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 12px; 
            font-weight: 900; 
            box-shadow: 0 4px 0 #b89600;
        }
        .buy-btn:active { transform: translateY(2px); box-shadow: none; }

        /* --- 8. МОДАЛЬНЫЕ ОКНА (Линии 281-320) --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 4000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            width: 90%; max-width: 350px; background: var(--panel);
            padding: 25px; border-radius: 30px; border: 2px solid #333;
        }

        .input-style {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: #05050a; color: white; margin: 10px 0; text-align: center;
            font-weight: bold;
        }

        /* --- 9. СПИСОК ЛИДЕРОВ (Линии 321-350) --- */
        .leader-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: rgba(255,255,255,0.05);
            margin-bottom: 8px; border-radius: 15px;
        }
        .leader-rank { color: var(--gold); font-weight: 900; margin-right: 10px; }

    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1>INFINITY<br>CLICKER</h1>
            <input type="email" id="email" class="input-style" placeholder="Электронная почта">
            <input type="password" id="pass" class="input-style" placeholder="Пароль">
            <button class="buy-btn" id="login-btn" style="width:100%; padding:15px; margin-top:10px">ВОЙТИ В ИГРУ</button>
            <p id="reg-btn" style="color:var(--secondary); font-size:0.8rem; margin-top:15px; cursor:pointer">Нет аккаунта? Создать</p>
        </div>
    </div>

    <div id="game-ui">
        <div class="header">
            <button id="top-btn" class="icon-btn">🏆</button>
            <button id="set-btn" class="icon-btn">⚙️</button>
            <div id="money">0</div>
            <div id="user-info" class="user-badge">ЗАГРУЗКА...</div>
        </div>

        <div class="click-area" id="click-zone">
            <div id="main-button"></div>
            <div class="stats-grid">
                <div class="stat-card">Клик: <b id="st-p" style="color:var(--secondary)">+1</b></div>
                <div class="stat-card">Множитель: <b id="st-m" style="color:var(--gold)">x1</b></div>
                <div class="stat-card" style="grid-column: span 2;">Авто-доход: <b id="st-b" style="color:#ff4d4d">0</b> /сек</div>
            </div>
        </div>

        <div class="shop">
            <div class="item">
                <div class="item-info"><b>Сила удара</b><span id="c1">Цена: 10</span></div>
                <button class="buy-btn" id="buy1">КУПИТЬ</button>
            </div>
            <div class="item">
                <div class="item-info"><b>Множитель X2</b><span id="c2">Цена: 100</span></div>
                <button class="buy-btn" id="buy2">КУПИТЬ</button>
            </div>
            <div class="item">
                <div class="item-info"><b>Бот-майнер</b><span id="c3">Цена: 500</span></div>
                <button class="buy-btn" id="buy3">КУПИТЬ</button>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal">
        <div id="modal-box" class="modal-content">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, orderBy, limit, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA6v-Qacyh1dDl7J8-XsQY6NxcGcNzBt9o",
            authDomain: "mindingclicker.firebaseapp.com",
            projectId: "mindingclicker",
            storageBucket: "mindingclicker.firebasestorage.app",
            messagingSenderId: "484824275063",
            appId: "1:484824275063:web:b98565344eea2760a34e72"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "raimaslanov222@gmail.com";

        // Переменные состояния
        let user = null, money = 0, power = 1, mult = 1, bot = 0, myId = 0, myName = "";
        let cost1 = 10, cost2 = 100, cost3 = 500;

        // Форматирование чисел
        function nForm(n) {
            if (n >= 1e15) return n.toExponential(2);
            if (n >= 1e12) return (n / 1e12).toFixed(2) + "T";
            if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
            if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
            if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
            return Math.floor(n);
        }

        // --- ЛОГИКА АВТОРИЗАЦИИ ---
        document.getElementById('login-btn').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(() => alert("Ошибка! Проверьте данные."));
        };

        document.getElementById('reg-btn').onclick = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(p.length < 6) return alert("Пароль должен быть от 6 символов!");
            try {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await runTransaction(db, async (t) => {
                    const c = await t.get(doc(db, "system", "users_count"));
                    let nid = c.exists() ? c.data().val + 1 : 1;
                    t.set(doc(db, "system", "users_count"), { val: nid });
                    t.set(doc(db, "leaders", res.user.uid), { 
                        name: e.split('@')[0], score: 0, power: 1, mult: 1, bot: 0, 
                        cost1: 10, cost2: 100, cost3: 500, gameId: nid 
                    });
                });
                alert("Аккаунт успешно создан!");
            } catch(err) { alert("Ошибка при регистрации!"); }
        };

        // --- ОСНОВНОЙ ЦИКЛ ИГРЫ ---
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                const s = await getDoc(doc(db, "leaders", user.uid));
                if (s.exists()) {
                    const d = s.data();
                    money = d.score || 0; power = d.power || 1; mult = d.mult || 1;
                    bot = d.bot || 0; cost1 = d.cost1 || 10; cost2 = d.cost2 || 100;
                    cost3 = d.cost3 || 500; myName = d.name || "Игрок"; myId = d.gameId || 0;
                }
                updateUI();
            }
        });

        // Клик с анимацией
        document.getElementById('main-button').onclick = (e) => {
            const add = power * mult;
            money += add;
            updateUI();
            
            // Создаем вылетающий текст
            const txt = document.createElement('div');
            txt.className = 'floating-text';
            txt.innerText = `+${nForm(add)}`;
            txt.style.left = `${e.clientX}px`;
            txt.style.top = `${e.clientY - 50}px`;
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 800);
        };

        // Авто-доход
        setInterval(() => { if(bot > 0) { money += (bot / 10); updateUI(); } }, 100);

        function updateUI() {
            document.getElementById('money').innerText = nForm(money);
            document.getElementById('user-info').innerText = `${myName.toUpperCase()} | ID: #${myId}`;
            document.getElementById('st-p').innerText = `+${nForm(power)}`;
            document.getElementById('st-m').innerText = `x${mult}`;
            document.getElementById('st-b').innerText = nForm(bot);
            document.getElementById('c1').innerText = `Цена: ${nForm(cost1)}`; 
            document.getElementById('c2').innerText = `Цена: ${nForm(cost2)}`; 
            document.getElementById('c3').innerText = `Цена: ${nForm(cost3)}`;
        }

        // Сохранение
        async function save() { if(user) await setDoc(doc(db,"leaders",user.uid),{name:myName,score:money,power:power,mult:mult,bot:bot,cost1:cost1,cost2:cost2,cost3:cost3,gameId:myId},{merge:true}); }
        setInterval(save, 10000);

        // Покупки
        document.getElementById('buy1').onclick = () => { if(money>=cost1){ money-=cost1; power++; cost1*=4; updateUI(); save(); } };
        document.getElementById('buy2').onclick = () => { if(money>=cost2){ money-=cost2; mult*=2; cost2*=10; updateUI(); save(); } };
        document.getElementById('buy3').onclick = () => { if(money>=cost3){ money-=cost3; bot+=(5*mult); cost3*=5; updateUI(); save(); } };

        // --- МОДАЛЬНЫЕ ОКНА (ЛОГИКА) ---
        const overlay = document.getElementById('modal-overlay');
        const mBox = document.getElementById('modal-box');

        window.closeM = () => overlay.style.display = 'none';

        // Кнопка настройки
        document.getElementById('set-btn').onclick = () => {
            overlay.style.display = 'flex';
            let adminBtn = user.email === ADMIN_EMAIL ? `<button class="buy-btn" onclick="openAdmin()" style="width:100%; margin-top:10px">👑 АДМИН-ПАНЕЛЬ</button>` : '';
            mBox.innerHTML = `
                <h2 style="margin:0">НАСТРОЙКИ</h2>
                <input type="text" id="newName" class="input-style" placeholder="Новый ник" value="${myName}">
                <button class="buy-btn" style="width:100%; background:var(--secondary)" onclick="saveNick()">СОХРАНИТЬ</button>
                ${adminBtn}
                <button class="buy-btn" style="width:100%; background:#444; margin-top:10px" onclick="closeM()">ЗАКРЫТЬ</button>
            `;
        };

        window.saveNick = async () => {
            const n = document.getElementById('newName').value.trim();
            if(n.length > 1) { myName = n; updateUI(); await save(); closeM(); }
        };

        // Админка
        window.openAdmin = () => {
            mBox.innerHTML = `
                <h2 style="color:var(--gold)">АДМИН-ПАНЕЛЬ</h2>
                <input type="text" id="aTarget" class="input-style" placeholder="ID или НИК">
                <input type="number" id="aAmount" class="input-style" placeholder="Сумма">
                <button class="buy-btn" style="width:100%; background:var(--secondary)" onclick="admOp('give')">ВЫДАТЬ</button>
                <button class="buy-btn" style="width:100%; background:#ff4d4d; margin-top:5px" onclick="admOp('reset')">ОБНУЛИТЬ</button>
                <button class="buy-btn" style="width:100%; background:#444; margin-top:15px" onclick="closeM()">НАЗАД</button>
            `;
        };

        window.admOp = async (type) => {
            const t = document.getElementById('aTarget').value;
            const v = parseFloat(document.getElementById('aAmount').value) || 0;
            let q = !isNaN(t) ? query(collection(db, "leaders"), where("gameId", "==", parseInt(t))) : query(collection(db, "leaders"), where("name", "==", t));
            const snap = await getDocs(q);
            if(snap.empty) return alert("Игрок не найден!");
            const ref = snap.docs[0].ref;
            const d = snap.docs[0].data();
            if(type === 'give') {
                await setDoc(ref, { score: d.score + v }, { merge: true });
                alert(`Успех! Выдано игроку ${d.name} (ID: #${d.gameId})`);
            } else {
                await setDoc(ref, { score: 0, power: 1, mult: 1, bot: 0 }, { merge: true });
                alert(`Прогресс игрока ${d.name} сброшен!`);
            }
        };

        // Топ лидеров
        document.getElementById('top-btn').onclick = () => {
            overlay.style.display = 'flex';
            mBox.innerHTML = `<h2>🏆 ТОП-10</h2><div id="l-list">Загрузка...</div><button class="buy-btn" style="width:100%; margin-top:15px" onclick="closeM()">ЗАКРЫТЬ</button>`;
            onSnapshot(query(collection(db, "leaders"), orderBy("score", "desc"), limit(10)), (snap) => {
                const l = document.getElementById('l-list');
                if(!l) return;
                l.innerHTML = "";
                let i = 1;
                snap.forEach(d => {
                    const data = d.data();
                    l.innerHTML += `
                        <div class="leader-item">
                            <span><span class="leader-rank">#${i++}</span> ${data.name} <small style="display:block; font-size:10px; color:#666">ID: ${data.gameId}</small></span>
                            <b>${nForm(data.score)}</b>
                        </div>`;
                });
            });
        };

    </script>
</body>
</html>
