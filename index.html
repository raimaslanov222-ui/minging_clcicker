<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beas Voice Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse {
            animation: pulse-animation 1.5s infinite;
        }
        @keyframes pulse-animation {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(139, 92, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
        }
        body {
            background: radial-gradient(circle at center, #1e1b4b 0%, #09090b 100%);
        }
        .listening-glow {
            box-shadow: 0 0 50px rgba(236, 72, 153, 0.4);
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-6 font-sans">

    <div class="max-w-md w-full bg-white/5 backdrop-blur-2xl rounded-[2.5rem] p-10 shadow-2xl border border-white/10 text-center">
        <div class="mb-8">
            <h1 class="text-4xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-pink-500 to-red-500">
                BEAS VOICE
            </h1>
            <div id="connection-status" class="flex items-center justify-center gap-2 mt-2">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span id="status-label" class="text-[10px] text-gray-400 uppercase tracking-widest">Система готова</span>
            </div>
        </div>
        
        <div class="mb-12 relative">
            <button id="mic-button" class="w-32 h-32 bg-gradient-to-tr from-purple-600 to-blue-500 rounded-full flex items-center justify-center mx-auto transition-all duration-500 hover:scale-105 active:scale-90 shadow-xl shadow-purple-500/20">
                <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-white transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </button>
            <p id="status-text" class="mt-8 text-sm font-light text-purple-200/70">Нажмите для активации</p>
        </div>

        <div class="bg-black/40 rounded-3xl p-6 mb-8 min-h-[120px] flex flex-col items-center justify-center border border-white/5">
            <p id="transcript" class="text-xl font-medium text-white/90 leading-snug">...</p>
            <p id="feedback" class="text-xs text-pink-400 mt-2 font-bold tracking-wider uppercase"></p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-left transition-opacity duration-300 hover:bg-white/10">
                <p class="text-[9px] text-purple-400 font-bold uppercase mb-2 italic">Apps</p>
                <div class="text-[11px] text-gray-300 space-y-1">
                    <p>• YouTube</p>
                    <p>• Telegram</p>
                    <p>• TikTok</p>
                </div>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-left transition-opacity duration-300 hover:bg-white/10">
                <p class="text-[9px] text-blue-400 font-bold uppercase mb-2 italic">Social</p>
                <div class="text-[11px] text-gray-300 space-y-1">
                    <p>• WhatsApp</p>
                    <p>• VK / Insta</p>
                    <p>• Google</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const micBtn = document.getElementById('mic-button');
        const statusText = document.getElementById('status-text');
        const transcriptDisplay = document.getElementById('transcript');
        const feedbackDisplay = document.getElementById('feedback');
        const micIcon = document.getElementById('mic-icon');
        const statusDot = document.getElementById('status-dot');

        // Звуковая система ассистента
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playBeep(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'start') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(660, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'stop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(220, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            }
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            statusText.innerText = "Beas не поддерживается";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = true;
            recognition.interimResults = true;

            let isListening = false;

            const apps = {
                'youtube': { 
                    keywords: ['ютуб', 'youtube', 'ютубчик', 'ютюб'], 
                    link: 'intent://www.youtube.com/#Intent;scheme=http;package=com.google.android.youtube;end', 
                    web: 'https://www.youtube.com' 
                },
                'telegram': { 
                    keywords: ['телеграм', 'телегу', 'telegram', 'тг'], 
                    link: 'tg://resolve', 
                    web: 'https://t.me' 
                },
                'vk': { 
                    keywords: ['вк', 'вконтакте', 'vk'], 
                    link: 'vk://vk.com', 
                    web: 'https://vk.com' 
                },
                'whatsapp': { 
                    keywords: ['ватсап', 'вацап', 'whatsapp'], 
                    link: 'whatsapp://', 
                    web: 'https://web.whatsapp.com' 
                },
                'instagram': { 
                    keywords: ['инстаграм', 'инсту', 'instagram'], 
                    link: 'instagram://', 
                    web: 'https://instagram.com' 
                },
                'tiktok': { 
                    keywords: ['тикток', 'тик ток', 'tiktok'], 
                    link: 'snssdk1180://', 
                    web: 'https://www.tiktok.com' 
                },
                'google': {
                    keywords: ['гугл', 'поиск', 'google'],
                    link: 'intent://google.com/#Intent;scheme=http;package=com.google.android.googlequicksearchbox;end',
                    web: 'https://google.com'
                }
            };

            micBtn.onclick = () => {
                if (!isListening) {
                    audioCtx.resume().then(() => {
                        playBeep('start');
                        recognition.start();
                    });
                } else {
                    playBeep('stop');
                    recognition.stop();
                }
            };

            recognition.onstart = () => {
                isListening = true;
                statusText.innerText = "BEAS СЛУШАЕТ...";
                statusText.classList.add('text-pink-400', 'font-bold');
                statusDot.classList.replace('bg-green-500', 'bg-pink-500');
                micBtn.classList.add('pulse', 'listening-glow');
                micBtn.classList.replace('from-purple-600', 'from-pink-600');
                micIcon.classList.add('scale-110');
            };

            recognition.onend = () => {
                isListening = false;
                statusText.innerText = "Нажмите для активации";
                statusText.classList.remove('text-pink-400', 'font-bold');
                statusDot.classList.replace('bg-pink-500', 'bg-green-500');
                micBtn.classList.remove('pulse', 'listening-glow');
                micBtn.classList.replace('from-pink-600', 'from-purple-600');
                micIcon.classList.remove('scale-110');
            };

            recognition.onresult = (event) => {
                let current = event.results[event.results.length - 1];
                let text = current[0].transcript.toLowerCase().trim();
                transcriptDisplay.innerText = text;

                if (current.isFinal) {
                    handleVoiceCommand(text);
                }
            };

            function handleVoiceCommand(cmd) {
                let found = false;

                for (let key in apps) {
                    const app = apps[key];
                    if (app.keywords.some(k => cmd.includes(k))) {
                        openApp(app, key);
                        found = true;
                        break;
                    }
                }

                if (!found) {
                    if (cmd.includes('привет')) {
                        speak("Привет! Я Биас. Что включить?");
                    } else if (cmd.includes('очистить') || cmd.includes('удали')) {
                        transcriptDisplay.innerText = "...";
                    } else {
                        feedbackDisplay.innerText = "???";
                        setTimeout(() => feedbackDisplay.innerText = "", 1500);
                    }
                }
            }

            function openApp(app, name) {
                speak("Включаю " + name);
                feedbackDisplay.innerText = "OPENING " + name.toUpperCase();

                // Использование Intent ссылки для Android
                window.location.href = app.link;

                // Резервный вариант (веб-версия)
                setTimeout(() => {
                    if (document.hasFocus()) { 
                        window.open(app.web, "_blank");
                    }
                }, 1200);
            }

            function speak(text) {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'ru-RU';
                utter.rate = 1.1;
                window.speechSynthesis.speak(utter);
            }
        }
    </script>
</body>
</html>
