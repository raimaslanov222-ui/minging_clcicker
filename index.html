<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Clicker Pro Max</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --panel: #1a1a2e;
            --accent: #4ecca3;
            --red-grad: linear-gradient(180deg, #ff1a1a 0%, #b30000 100%);
            --gold: #ffcc00;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: white; height: 100vh; display: flex; 
            flex-direction: column; overflow: hidden; 
        }

        /* Анимация вылетающих цифр */
        .click-anim {
            position: absolute; color: white; font-weight: 900; font-size: 1.5rem;
            pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 5000;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) opacity(1); }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* Окна входа и уведомлений */
        #auth-screen, #modal-overlay { 
            position: fixed; inset: 0; background: var(--bg); 
            z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; 
        }
        #modal-overlay { background: rgba(0,0,0,0.85); z-index: 2500; display: none; backdrop-filter: blur(5px); }

        .box { 
            width: 100%; max-width: 320px; background: var(--panel); 
            padding: 25px; border-radius: 24px; border: 1px solid #333; 
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h2, h3 { margin: 0 0 15px 0; letter-spacing: 1px; }
        input { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #444; background: #05050a; color: white; 
            text-align: center; font-size: 1rem; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; 
        }
        .btn:active { transform: scale(0.96); }
        .btn-green { background: var(--accent); color: #000; }
        .btn-yellow { background: var(--gold); color: #000; margin-top: 10px; }
        .btn-red { background: #ff4d4d; color: white; }

        /* Игровой интерфейс */
        #game-ui { display: none; flex-direction: column; height: 100%; }

        .header { 
            background: var(--red-grad); padding: 40px 20px 25px; 
            text-align: center; border-bottom-left-radius: 40px; 
            border-bottom-right-radius: 40px; position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        #money { font-size: 3.5rem; font-weight: 900; margin: 0; text-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        #user-info { font-size: 0.85rem; opacity: 0.9; margin-top: 8px; font-weight: 600; }

        .icon-btn { 
            position: absolute; top: 15px; background: rgba(255,255,255,0.2); 
            border: none; border-radius: 12px; width: 44px; height: 44px; 
            color: white; font-size: 1.2rem; cursor: pointer;
        }
        #open-top-btn { left: 15px; }
        #open-settings-btn { right: 15px; }

        /* Центр */
        .main-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        #main-button { 
            width: 180px; height: 180px; border-radius: 50%; 
            background: radial-gradient(circle, #fff 0%, #ccc 100%); 
            border: 8px solid white; box-shadow: 0 0 50px rgba(255,25,25,0.4);
            transition: transform 0.05s; cursor: pointer; position: relative;
        }
        #main-button::after {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            background: url('button.png') center/cover;
        }
        #main-button:active { transform: scale(0.9); }

        .stats-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            margin-top: 20px; width: 80%; text-align: center; 
        }
        .stat-card { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; font-size: 0.8rem; }
        .stat-card b { display: block; font-size: 1rem; color: var(--accent); }

        /* Магазин */
        .shop-container { padding: 15px; background: #121221; border-radius: 30px 30px 0 0; }
        .shop-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #1e1e35; padding: 12px 15px; border-radius: 16px; 
            margin-bottom: 10px; border: 1px solid #2d2d4d;
        }
        .item-text b { font-size: 1rem; color: #eee; }
        .item-text span { font-size: 0.8rem; color: #888; display: block; }
        
        .buy-btn { 
            background: var(--gold); border: none; padding: 10px 16px; 
            border-radius: 10px; font-weight: 800; cursor: pointer; min-width: 90px;
        }
        .buy-btn:disabled { background: #444; color: #777; }

        /* Лидеры */
        #leader-list { max-height: 300px; overflow-y: auto; margin-top: 10px; }
        .leader-row { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: #0b0b18; margin-bottom: 6px; 
            border-radius: 12px; border-left: 4px solid var(--accent);
        }
        .leader-info { text-align: left; }
        .leader-info div { font-size: 0.7rem; color: #666; }

    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box">
            <h2 style="color: var(--accent)">INFINITY CLICKER</h2>
            <p style="font-size: 0.8rem; color: #888">Вход в систему управления балансом</p>
            <input type="email" id="email" placeholder="Email адрес">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn btn-green" id="login-btn">ВОЙТИ В ИГРУ</button>
            <button class="btn" style="background:transparent; color: #aaa; font-size: 0.8rem" id="reg-btn">Нет аккаунта? Регистрация</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="header">
            <button id="open-top-btn" class="icon-btn">🏆</button>
            <button id="open-settings-btn" class="icon-btn">⚙️</button>
            <div id="money">0</div>
            <div id="user-info">ID: #000 | ЗАГРУЗКА...</div>
        </div>
        
        <div class="main-area" id="click-zone">
            <div id="main-button"></div>
            <div class="stats-grid">
                <div class="stat-card">КЛИК <b id="st-p">+1</b></div>
                <div class="stat-card">МНОЖИТЕЛЬ <b id="st-m">x1</b></div>
                <div class="stat-card" style="grid-column: span 2">АВТО-ДОХОД <b id="st-b">0 /сек</b></div>
            </div>
        </div>

        <div class="shop-container">
            <div class="shop-item">
                <div class="item-text"><b>Сила клика</b><span id="c1-desc">Цена: 10</span></div>
                <button class="buy-btn" id="buy1">КУПИТЬ</button>
            </div>
            <div class="shop-item">
                <div class="item-text"><b>Множитель</b><span id="c2-desc">Цена: 100</span></div>
                <button class="buy-btn" id="buy2">КУПИТЬ</button>
            </div>
            <div class="shop-item">
                <div class="item-text"><b>Авто-бот</b><span id="c3-desc">Цена: 500</span></div>
                <button class="buy-btn" id="buy3">КУПИТЬ</button>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="settings-box" class="box" style="display:none">
            <h3>ПРОФИЛЬ</h3>
            <input type="text" id="new-name-input" placeholder="Введите новый ник">
            <button class="btn btn-green" id="save-name-btn">ОБНОВИТЬ ИМЯ</button>
            <button class="btn btn-yellow" id="admin-panel-btn" style="display:none">👑 ПАНЕЛЬ РАЗРАБОТЧИКА</button>
            <button class="btn btn-red" style="margin-top:20px" id="logout-btn">ВЫЙТИ ИЗ АККАУНТА</button>
            <button class="btn" style="background:#333; color:white; margin-top:10px" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>

        <div id="admin-box" class="box" style="display:none; border: 2px solid var(--gold)">
            <h3 style="color:var(--gold)">DEVELOPER PANEL</h3>
            <input type="text" id="admin-target" placeholder="ID или НИК игрока">
            <input type="number" id="admin-amount" placeholder="Количество монет">
            <button class="btn btn-green" id="give-money-btn">НАЧИСЛИТЬ БАЛАНС</button>
            <button class="btn btn-red" style="margin-top:8px" id="reset-player-btn">СБРОСИТЬ ПРОГРЕСС</button>
            <button class="btn" style="margin-top:15px; background:#444; color:white" onclick="openSettings()">НАЗАД</button>
        </div>

        <div id="top-box" class="box" style="display:none; border-color: var(--gold)">
            <h3 style="color:var(--gold)">ГЛОБАЛЬНЫЙ ТОП</h3>
            <div id="leader-list"></div>
            <button class="btn" style="background:#333; color:white; margin-top:15px" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, orderBy, limit, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyA6v-Qacyh1dDl7J8-XsQY6NxcGcNzBt9o",
            authDomain: "mindingclicker.firebaseapp.com",
            projectId: "mindingclicker",
            storageBucket: "mindingclicker.firebasestorage.app",
            messagingSenderId: "484824275063",
            appId: "1:484824275063:web:b98565344eea2760a34e72"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "raimaslanov222@gmail.com";

        // STATE
        let uData = { money: 0, power: 1, mult: 1, bot: 0, id: 0, name: "", costs: [10, 100, 500] };
        let isSaving = false;

        // UI HELPERS
        const nForm = (n) => {
            if (n >= 1e15) return n.toExponential(2);
            const s = ["", "K", "M", "B", "T", "Q"];
            const e = Math.floor(Math.log10(n) / 3);
            return e > 0 ? (n / Math.pow(10, e * 3)).toFixed(2) + s[e] : Math.floor(n);
        };

        const updateUI = () => {
            document.getElementById('money').innerText = nForm(uData.money);
            document.getElementById('user-info').innerText = `${uData.name.toUpperCase()} | ID: #${uData.id}`;
            document.getElementById('st-p').innerText = `+${nForm(uData.power)}`;
            document.getElementById('st-m').innerText = `x${uData.mult}`;
            document.getElementById('st-b').innerText = `${nForm(uData.bot)} /сек`;
            
            document.getElementById('c1-desc').innerText = `Цена: ${nForm(uData.costs[0])}`;
            document.getElementById('c2-desc').innerText = `Цена: ${nForm(uData.costs[1])}`;
            document.getElementById('c3-desc').innerText = `Цена: ${nForm(uData.costs[2])}`;

            document.getElementById('buy1').disabled = uData.money < uData.costs[0];
            document.getElementById('buy2').disabled = uData.money < uData.costs[1];
            document.getElementById('buy3').disabled = uData.money < uData.costs[2];
        };

        // CORE LOGIC
        const createFloatingText = (e) => {
            const txt = document.createElement('div');
            txt.className = 'click-anim';
            txt.innerText = `+${nForm(uData.power * uData.mult)}`;
            txt.style.left = (e.clientX || e.touches[0].clientX) + 'px';
            txt.style.top = (e.clientY || e.touches[0].clientY) + 'px';
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 800);
        };

        document.getElementById('main-button').addEventListener('pointerdown', (e) => {
            uData.money += (uData.power * uData.mult);
            createFloatingText(e);
            updateUI();
        });

        setInterval(() => {
            if(uData.bot > 0) {
                uData.money += (uData.bot / 10);
                updateUI();
            }
        }, 100);

        // SHOP
        const processBuy = (idx, effect) => {
            if(uData.money >= uData.costs[idx]) {
                uData.money -= uData.costs[idx];
                effect();
                uData.costs[idx] = Math.ceil(uData.costs[idx] * (idx === 1 ? 10 : 3.5));
                updateUI();
                saveData();
            }
        };

        document.getElementById('buy1').onclick = () => processBuy(0, () => uData.power++);
        document.getElementById('buy2').onclick = () => processBuy(1, () => uData.mult *= 2);
        document.getElementById('buy3').onclick = () => processBuy(2, () => uData.bot += (5 * uData.mult));

        // AUTH & FIREBASE
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                if(user.email === ADMIN_EMAIL) document.getElementById('admin-panel-btn').style.display = 'block';

                const docRef = doc(db, "leaders", user.uid);
                const snap = await getDoc(docRef);

                if (snap.exists()) {
                    const d = snap.data();
                    uData = {
                        money: d.score || 0, power: d.power || 1, mult: d.mult || 1, bot: d.bot || 0,
                        id: d.gameId || 0, name: d.name || "Player",
                        costs: [d.cost1 || 10, d.cost2 || 100, d.cost3 || 500]
                    };
                    if(uData.id === 0) await syncID(user.uid);
                }
                updateUI();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('game-ui').style.display = 'none';
            }
        });

        async function syncID(uid) {
            await runTransaction(db, async (t) => {
                const cDoc = await t.get(doc(db, "system", "users_count"));
                const nextId = cDoc.exists() ? cDoc.data().val + 1 : 1;
                t.set(doc(db, "system", "users_count"), { val: nextId });
                t.update(doc(db, "leaders", uid), { gameId: nextId });
                uData.id = nextId;
            });
        }

        async function saveData() {
            if(!auth.currentUser || isSaving) return;
            isSaving = true;
            try {
                await setDoc(doc(db, "leaders", auth.currentUser.uid), {
                    score: uData.money, power: uData.power, mult: uData.mult, bot: uData.bot,
                    cost1: uData.costs[0], cost2: uData.costs[1], cost3: uData.costs[2],
                    name: uData.name, gameId: uData.id
                }, { merge: true });
            } finally { isSaving = false; }
        }
        setInterval(saveData, 15000);

        // MODALS
        window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';
        window.openSettings = () => {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('settings-box').style.display = 'block';
            document.getElementById('admin-box').style.display = 'none';
            document.getElementById('top-box').style.display = 'none';
        };
        document.getElementById('open-settings-btn').onclick = openSettings;
        document.getElementById('open-top-btn').onclick = () => {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('top-box').style.display = 'block';
            document.getElementById('settings-box').style.display = 'none';
        };

        // ADMIN ACTIONS
        const adminFunc = async (isReset) => {
            const target = document.getElementById('admin-target').value;
            const amt = parseFloat(document.getElementById('admin-amount').value) || 0;
            const q = !isNaN(target) ? query(collection(db, "leaders"), where("gameId", "==", parseInt(target))) : query(collection(db, "leaders"), where("name", "==", target));
            const snap = await getDocs(q);
            if(snap.empty) return alert("Цель не найдена");
            const ref = snap.docs[0].ref;
            await setDoc(ref, isReset ? { score: 0, power: 1, mult: 1, bot: 0 } : { score: (snap.docs[0].data().score + amt) }, { merge: true });
            alert("Операция выполнена");
        };

        document.getElementById('give-money-btn').onclick = () => adminFunc(false);
        document.getElementById('reset-player-btn').onclick = () => adminFunc(true);
        document.getElementById('admin-panel-btn').onclick = () => {
            document.getElementById('settings-box').style.display = 'none';
            document.getElementById('admin-box').style.display = 'block';
        };

        // TOP SNAPSHOT
        onSnapshot(query(collection(db, "leaders"), orderBy("score", "desc"), limit(10)), (snap) => {
            const list = document.getElementById('leader-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                    <div class="leader-row">
                        <div class="leader-info">
                            <b>${data.name}</b>
                            <div>ID: #${data.gameId || '??'}</div>
                        </div>
                        <b style="color:var(--gold)">${nForm(data.score)}</b>
                    </div>`;
            });
        });

        // UI ACTIONS
        document.getElementById('login-btn').onclick = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert("Ошибка входа"));
        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
        document.getElementById('save-name-btn').onclick = () => {
            const n = document.getElementById('new-name-input').value.trim();
            if(n.length > 2) { uData.name = n; updateUI(); saveData(); closeModal(); }
        };
    </script>
</body>
</html>
