<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minding Clicker Ultra</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Экраны */
        #auth-screen, #modal-overlay { position: fixed; inset: 0; background: #0f0f1a; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #modal-overlay { background: rgba(0,0,0,0.9); z-index: 2000; display: none; }

        .box { width: 100%; max-width: 320px; background: #1a1a2e; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; position: relative; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #05050a; color: white; outline: none; text-align: center; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; transition: 0.1s; }
        .btn-green { background: #4ecca3; color: white; }
        .btn-admin { background: gold; color: black; margin-top: 15px; display: none; }

        /* Основной интерфейс */
        #game-ui { display: none; flex-direction: column; height: 100%; width: 100%; }
        
        .header { 
            background: linear-gradient(180deg, #ff3333 0%, #800000 100%); 
            padding: 40px 20px 20px 20px; 
            text-align: center; 
            border-bottom-left-radius: 30px; 
            border-bottom-right-radius: 30px; 
            position: relative;
            min-height: 160px;
        }

        #money { font-size: 3.5rem; font-weight: 900; margin: 0; line-height: 1; }
        #user-tag { color: #4ecca3; font-weight: bold; margin-top: 10px; font-size: 0.9rem; }

        .icon-btn { 
            position: absolute; 
            top: 15px; 
            background: rgba(255,255,255,0.2); 
            border: none; 
            border-radius: 10px; 
            width: 40px; 
            height: 40px; 
            color: white; 
            font-size: 1.2rem; 
            z-index: 10;
        }
        #open-top-btn { left: 15px; }
        #open-settings-btn { right: 15px; }

        .main-area { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        #main-button { 
            width: 200px; 
            height: 200px; 
            border-radius: 50%; 
            background-image: url('button.png'); 
            background-size: cover; 
            background-position: center;
            border: 6px solid white; 
            box-shadow: 0 0 30px rgba(255,77,77,0.5);
            transition: transform 0.05s;
        }
        #main-button:active { transform: scale(0.92); }

        .shop-panel { 
            background: #1a1a2e; 
            padding: 15px; 
            border-top-left-radius: 25px; 
            border-top-right-radius: 25px; 
            border-top: 1px solid #333;
        }

        .shop-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #252545; 
            padding: 10px 15px; 
            border-radius: 15px; 
            margin-bottom: 8px; 
        }
        .shop-item b { font-size: 0.9rem; }
        .shop-item button { 
            background: #ffcc00; 
            color: black; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 10px; 
            font-weight: bold; 
            min-width: 80px;
        }

        .leader-row { display: flex; justify-content: space-between; padding: 10px; background: #05050a; margin-bottom: 5px; border-radius: 8px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box">
            <h2 style="margin-top:0">Minding Clicker</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn btn-green" id="login-btn">ВОЙТИ</button>
            <button class="btn" style="background:transparent; color:#4ecca3;" id="reg-btn">РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="header">
            <button id="open-top-btn" class="icon-btn">🏆</button>
            <button id="open-settings-btn" class="icon-btn">⚙️</button>
            <div id="money">0</div>
            <div id="user-tag">Загрузка...</div>
        </div>
        
        <div class="main-area">
            <div id="main-button"></div>
        </div>

        <div class="shop-panel">
            <div class="shop-item"><div><b>Сила</b><br><small id="c1">10</small></div><button id="buy1">КУПИТЬ</button></div>
            <div class="shop-item"><div><b>Множ</b><br><small id="c2">100</small></div><button id="buy2">КУПИТЬ</button></div>
            <div class="shop-item"><div><b>Бот</b><br><small id="c3">500</small></div><button id="buy3">КУПИТЬ</button></div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="settings-box" class="box" style="display:none;">
            <h3>⚙️ НАСТРОЙКИ</h3>
            <input type="text" id="new-name-input" maxlength="12" placeholder="Новый ник">
            <button class="btn btn-green" id="save-name-btn">ИЗМЕНИТЬ НИК</button>
            <button class="btn btn-admin" id="admin-panel-btn">👑 АДМИН-ПАНЕЛЬ</button>
            <button class="btn" style="background:#333; color:white; margin-top:10px" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>

        <div id="admin-box" class="box" style="display:none; border-color: gold;">
            <h3 style="color:gold">👑 АДМИНКА</h3>
            <input type="number" id="target-id" placeholder="ID игрока">
            <input type="number" id="add-money-val" placeholder="Сумма">
            <button class="btn btn-green" id="give-money-btn">ВЫДАТЬ</button>
            <button class="btn" style="background:red; color:white;" id="reset-player-btn">ОБНУЛИТЬ</button>
            <button class="btn" onclick="openSettings()">НАЗАД</button>
        </div>

        <div id="top-box" class="box" style="display:none; border-color: gold;">
            <h3 style="color:gold">🏆 ТОП-10</h3>
            <div id="leader-list" style="max-height: 200px; overflow-y: auto;"></div>
            <button class="btn" style="background:#333; color:white; margin-top:10px" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, orderBy, limit, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6v-Qacyh1dDl7J8-XsQY6NxcGcNzBt9o",
            authDomain: "mindingclicker.firebaseapp.com",
            projectId: "mindingclicker",
            storageBucket: "mindingclicker.firebasestorage.app",
            messagingSenderId: "484824275063",
            appId: "1:484824275063:web:b98565344eea2760a34e72"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const ADMIN_EMAIL = "Raimaslanov222@gmail.com";
        setPersistence(auth, browserLocalPersistence);

        let user = null, money = 0, power = 1, mult = 1, bot = 0, myId = 0, myName = "";
        let cost1 = 10, cost2 = 100, cost3 = 500;

        document.getElementById('login-btn').onclick = () => {
            const m = email.value, p = pass.value;
            signInWithEmailAndPassword(auth, m, p).catch(e => alert("Ошибка входа"));
        };

        document.getElementById('reg-btn').onclick = async () => {
            const m = email.value, p = pass.value;
            if(!m || !p) return alert("Заполни поля");
            try {
                const res = await createUserWithEmailAndPassword(auth, m, p);
                await runTransaction(db, async (t) => {
                    const c = await t.get(doc(db, "system", "users_count"));
                    let nid = c.exists() ? c.data().val + 1 : 1;
                    t.set(doc(db, "system", "users_count"), { val: nid });
                    t.set(doc(db, "leaders", res.user.uid), { name: m.split('@')[0], score: 0, power: 1, mult: 1, bot: 0, cost1: 10, cost2: 100, cost3: 500, gameId: nid });
                });
            } catch(e) { alert("Ошибка регистрации"); }
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                if(user.email === ADMIN_EMAIL) document.getElementById('admin-panel-btn').style.display = 'block';
                const s = await getDoc(doc(db, "leaders", user.uid));
                if (s.exists()) {
                    const d = s.data();
                    money = d.score; power = d.power; mult = d.mult; bot = d.bot;
                    cost1 = d.cost1; cost2 = d.cost2; cost3 = d.cost3;
                    myId = d.gameId; myName = d.name;
                }
                updateUI();
            }
        });

        document.getElementById('main-button').onclick = () => { money += (power * mult); updateUI(); };
        setInterval(() => { if(bot > 0) { money += (bot / 10); updateUI(); } }, 100);

        function updateUI() {
            document.getElementById('money').innerText = Math.floor(money);
            document.getElementById('user-tag').innerText = `${myName.toUpperCase()} | ID: #${myId}`;
            document.getElementById('c1').innerText = cost1; document.getElementById('c2').innerText = cost2; document.getElementById('c3').innerText = cost3;
        }

        async function save() { if(user) await setDoc(doc(db,"leaders",user.uid),{name:myName,score:money,power:power,mult:mult,bot:bot,cost1:cost1,cost2:cost2,cost3:cost3,gameId:myId},{merge:true}); }
        setInterval(save, 15000);

        const buy = (n) => {
            if(n==1 && money>=cost1){ money-=cost1; power++; cost1*=4; }
            if(n==2 && money>=cost2){ money-=cost2; mult*=2; cost2*=10; }
            if(n==3 && money>=cost3){ money-=cost3; bot+=(5*mult); cost3*=5; }
            updateUI(); save();
        };
        document.getElementById('buy1').onclick = () => buy(1);
        document.getElementById('buy2').onclick = () => buy(2);
        document.getElementById('buy3').onclick = () => buy(3);

        window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';
        window.openSettings = () => {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('settings-box').style.display = 'block';
            document.getElementById('admin-box').style.display = 'none';
            document.getElementById('top-box').style.display = 'none';
        };
        document.getElementById('open-settings-btn').onclick = openSettings;
        document.getElementById('open-top-btn').onclick = () => {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('top-box').style.display = 'block';
            document.getElementById('settings-box').style.display = 'none';
        };

        document.getElementById('save-name-btn').onclick = async () => {
            const val = document.getElementById('new-name-input').value.trim();
            if(val.length < 2) return alert("Короткое имя");
            myName = val; updateUI(); await save(); closeModal();
        };

        document.getElementById('admin-panel-btn').onclick = () => {
            document.getElementById('settings-box').style.display = 'none';
            document.getElementById('admin-box').style.display = 'block';
        };

        const modifyPlayer = async (type) => {
            const tid = parseInt(document.getElementById('target-id').value);
            const val = parseInt(document.getElementById('add-money-val').value) || 0;
            const q = query(collection(db, "leaders"), where("gameId", "==", tid));
            const snap = await getDocs(q);
            if(snap.empty) return alert("Не найден");
            const pDoc = snap.docs[0];
            if(type === 'give') await setDoc(pDoc.ref, { score: (pDoc.data().score + val) }, { merge: true });
            else await setDoc(pDoc.ref, { score: 0 }, { merge: true });
            alert("Готово");
        };
        document.getElementById('give-money-btn').onclick = () => modifyPlayer('give');
        document.getElementById('reset-player-btn').onclick = () => modifyPlayer('reset');

        onSnapshot(query(collection(db, "leaders"), orderBy("score", "desc"), limit(10)), (snap) => {
            const list = document.getElementById('leader-list');
            list.innerHTML = "";
            snap.forEach(d => {
                list.innerHTML += `<div class="leader-row"><span>#${d.data().gameId} <b>${d.data().name}</b></span><b>${Math.floor(d.data().score)}</b></div>`;
            });
        });
    </script>
</body>
</html>
