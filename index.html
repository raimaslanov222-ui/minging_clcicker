<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InfinityB - Final Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff1a1a; --dark-red: #8b0000; --bg: #050508; --card: #11111b; --yellow: #ffcc00; --green: #00ff88; --blue: #00d4ff; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { background: linear-gradient(180deg, var(--red) 0%, var(--dark-red) 100%); height: 120px; display: flex; justify-content: space-between; align-items: center; padding: 30px 20px 0; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 100; }
        .logo-text { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 900; margin: 0; letter-spacing: 2px; }
        #user-info { font-size: 0.6rem; background: rgba(0,0,0,0.3); padding: 3px 10px; border-radius: 10px; margin-top: 5px; display: inline-block; }

        .game-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #score-display { font-family: 'Orbitron', sans-serif; font-size: 3.2rem; margin: 10px 0; font-weight: 900; }
        
        .click-zone { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #222, #000); border: 6px solid #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.05s; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .click-zone:active { transform: scale(0.9); }
        .click-zone img { width: 80px; filter: invert(1); }

        .shop { padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 12px 18px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .price { color: var(--yellow); font-weight: 900; font-size: 0.9rem; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-box { background: var(--card); width: 100%; max-width: 380px; border-radius: 25px; padding: 25px; border: 1px solid var(--red); text-align: center; }
        
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 10px; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; margin-bottom: 8px; text-transform: uppercase; }
        .btn-green { background: var(--green); color: #000; }
        .btn-yellow { background: var(--yellow); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-gray { background: #333; color: #fff; }

        .pop { position: fixed; pointer-events: none; font-weight: 900; font-family: 'Orbitron'; animation: popUp 0.6s forwards; z-index: 2000; }
        @keyframes popUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
        .icon-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #fff; }
    </style>
</head>
<body>

    <header class="header">
        <button class="icon-btn" onclick="UI.open('modal-top')">🏆</button>
        <div style="text-align: center;">
            <h1 class="logo-text">INFINITY</h1>
            <div id="user-info">ЗАГРУЗКА...</div>
        </div>
        <button class="icon-btn" onclick="UI.open('modal-cfg')">⚙️</button>
    </header>

    <main class="game-main">
        <h1 id="score-display">0</h1>
        <div class="click-zone" id="tap-target">
            <img src="https://img.icons8.com/ios-filled/100/ffffff/touchscreen.png">
        </div>
    </main>

    <footer class="shop">
        <div class="card" onclick="Game.buy('p')">
            <div><b>Neural Power</b><br><small>Сила клика +1</small></div>
            <div class="price" id="c1">10</div>
        </div>
        <div class="card" onclick="Game.buy('m')">
            <div><b>Multiplier</b><br><small>Доход x1.2</small></div>
            <div class="price" id="c2">150</div>
        </div>
    </footer>

    <div class="modal" id="modal-top">
        <div class="modal-box">
            <h2>🏆 ЛИДЕРЫ</h2>
            <div id="top-list" style="text-align: left; margin-bottom: 15px;"></div>
            <button class="btn btn-gray" onclick="UI.close()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div class="modal" id="modal-cfg">
        <div class="modal-box">
            <h2>НАСТРОЙКИ</h2>
            <input type="text" id="name-in" placeholder="Новый ник">
            <button class="btn btn-green" onclick="Game.setName()">ОБНОВИТЬ</button>
            <button id="adm-btn" class="btn btn-yellow" style="display:none" onclick="UI.open('modal-adm')">👑 АДМИНКА</button>
            <button class="btn btn-gray" onclick="UI.close()">НАЗАД</button>
        </div>
    </div>

    <div class="modal" id="modal-adm">
        <div class="modal-box">
            <h2 style="color:var(--yellow)">ADMIN</h2>
            <input type="text" id="a-target" placeholder="Ник или #ID">
            <input type="number" id="a-val" placeholder="Сумма / Минуты">
            <button class="btn btn-green" onclick="Admin.run('give')">ВЫДАТЬ</button>
            <button class="btn btn-red" onclick="Admin.run('ban')">БАН (МИН)</button>
            <button class="btn btn-gray" onclick="UI.open('modal-cfg')">НАЗАД</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, orderBy, limit, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyA6v-Qacyh1dDl7J8-XsQY6NxcGcNzBt9o",
            authDomain: "mindingclicker.firebaseapp.com",
            projectId: "mindingclicker",
            storageBucket: "mindingclicker.firebasestorage.app",
            messagingSenderId: "484824275063",
            appId: "1:484824275063:web:b98565344eea2760a34e72"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const OWNER = "raimaslanov222@gmail.com";

        let p = { score: 0, power: 1, mult: 1, auto: 0, c1: 10, c2: 150, name: "Pilot", id: 0, banUntil: 0 };
        let isReady = false;

        // ГЛОБАЛЬНЫЕ ОБЪЕКТЫ (теперь точно работают)
        window.UI = {
            open: (id) => { 
                document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
                document.getElementById(id).style.display = 'flex';
                if(id === 'modal-top') UI.refreshTop();
            },
            close: () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'),
            refreshTop: async () => {
                const q = query(collection(db, "leaders"), orderBy("score", "desc"), limit(10));
                const s = await getDocs(q);
                let h = "";
                s.forEach((d, i) => {
                    h += `<div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #222">
                        <span>${i+1}. ${d.data().name}</span><b>${Math.floor(d.data().score)}</b>
                    </div>`;
                });
                document.getElementById('top-list').innerHTML = h;
            }
        };

        window.Game = {
            tap: (e) => {
                if(!isReady) return;
                const gain = p.power * p.mult;
                p.score += gain;
                
                const el = document.createElement('div');
                el.className = 'pop'; el.innerText = `+${Math.floor(gain)}`;
                el.style.left = e.clientX + 'px'; el.style.top = e.clientY + 'px';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 600);
                
                document.getElementById('score-display').innerText = Math.floor(p.score).toLocaleString();
            },
            buy: (t) => {
                if(t === 'p' && p.score >= p.c1) { p.score -= p.c1; p.power++; p.c1 *= 1.8; }
                if(t === 'm' && p.score >= p.c2) { p.score -= p.c2; p.mult += 0.2; p.c2 *= 2.5; }
                Game.save(); Game.syncUI();
            },
            setName: async () => {
                const n = document.getElementById('name-in').value;
                if(n.length > 2) { p.name = n; Game.syncUI(); await Game.save(); alert("OK"); }
            },
            syncUI: () => {
                document.getElementById('score-display').innerText = Math.floor(p.score).toLocaleString();
                document.getElementById('user-info').innerText = `${p.name.toUpperCase()} | #${p.id}`;
                document.getElementById('c1').innerText = Math.floor(p.c1);
                document.getElementById('c2').innerText = Math.floor(p.c2);
            },
            save: () => auth.currentUser && updateDoc(doc(db, "leaders", auth.currentUser.uid), p)
        };

        window.Admin = {
            run: async (cmd) => {
                const target = document.getElementById('a-target').value;
                const val = parseFloat(document.getElementById('a-val').value) || 0;
                let q = target.startsWith('#') ? 
                    query(collection(db, "leaders"), where("id", "==", parseInt(target.replace('#','')))) :
                    query(collection(db, "leaders"), where("name", "==", target));
                const s = await getDocs(q);
                if(s.empty) return alert("Не найден");
                const ref = s.docs[0].ref;
                const data = s.docs[0].data();
                if(cmd === 'give') await updateDoc(ref, { score: data.score + val });
                if(cmd === 'ban') await updateDoc(ref, { banUntil: Date.now() + (val * 60000) });
                alert("Готово");
            }
        };

        // Инициализация
        onAuthStateChanged(auth, async (u) => {
            if(u) {
                if(u.email === OWNER) document.getElementById('adm-btn').style.display = 'block';
                const s = await getDoc(doc(db, "leaders", u.uid));
                if(s.exists()) {
                    p = { ...p, ...s.data() };
                    if(p.banUntil > Date.now()) { alert("BAN"); location.reload(); }
                } else {
                    p.id = Math.floor(1000 + Math.random()*8999);
                    p.name = u.email.split('@')[0];
                    await setDoc(doc(db, "leaders", u.uid), p);
                }
                isReady = true;
                Game.syncUI();
                setInterval(Game.save, 15000);
            }
        });

        // Привязка клика через JS (самый надежный способ)
        document.getElementById('tap-target').onclick = (e) => Game.tap(e);
    </script>
</body>
</html>
