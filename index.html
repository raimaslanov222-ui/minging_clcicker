<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Clicker Fix</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; background: #0f0f1a; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Окна */
        #auth-screen, #modal-overlay { position: fixed; inset: 0; background: #0f0f1a; z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #modal-overlay { background: rgba(0,0,0,0.9); z-index: 2000; display: none; }
        .box { width: 100%; max-width: 300px; background: #1a1a2e; padding: 20px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #05050a; color: white; text-align: center; }
        
        .btn { width: 100%; padding: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-green { background: #4ecca3; color: white; }
        .btn-yellow { background: #ffcc00; color: black; font-weight: 900; }

        /* Шапка */
        #game-ui { display: none; flex-direction: column; height: 100%; }
        .header { 
            background: linear-gradient(180deg, #ff1a1a 0%, #b30000 100%); 
            padding: 25px 10px; text-align: center; 
            border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; 
            position: relative; min-height: 140px;
        }
        #money { font-size: 3.2rem; font-weight: 900; margin: 0; line-height: 1; text-shadow: 0 3px 10px rgba(0,0,0,0.4); }
        #user-tag { color: rgba(255,255,255,0.8); font-size: 0.75rem; margin-top: 8px; font-family: sans-serif; }

        /* Кнопки управления */
        .icon-btn { 
            position: absolute; top: 15px; background: rgba(255,255,255,0.2); border: none; 
            border-radius: 10px; width: 38px; height: 38px; color: white; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
        }
        #open-top-btn { left: 15px; top: 15px; }
        #open-settings-btn { right: 15px; top: 15px; }
        #admin-main-btn { left: 15px; top: 60px; background: gold; color: black; display: none; border: 2px solid white; }

        /* Игровая зона */
        .main-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #main-button { 
            width: 160px; height: 160px; border-radius: 50%; 
            background: url('button.png') center/cover; border: 5px solid white; 
            box-shadow: 0 0 30px rgba(255, 25, 25, 0.4); transition: 0.05s;
        }
        #main-button:active { transform: scale(0.9); }
        .stats-info { font-size: 0.8rem; color: #888; margin-top: 10px; text-align: center; font-family: sans-serif; }

        /* Магазин (Компактный) */
        .shop-panel { padding: 10px; background: #161625; border-radius: 25px 25px 0 0; }
        .shop-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #20203a; padding: 8px 15px; border-radius: 12px; margin-bottom: 6px;
        }
        .shop-item b { font-size: 0.85rem; }
        .shop-item small { font-size: 0.7rem; color: #aaa; }
        .shop-item button { background: #ffcc00; color: black; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 0.8rem; }
        
        .leader-row { display: flex; justify-content: space-between; padding: 8px; background: #05050a; margin-bottom: 4px; border-radius: 8px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box">
            <h2 style="margin:0 0 15px 0">INFINITY CLICKER</h2>
            <input type="email" id="email" placeholder="Ваш Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn btn-green" id="login-btn">ВОЙТИ</button>
            <button class="btn" style="background:transparent; color:#4ecca3; font-size: 0.8rem" id="reg-btn">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="header">
            <button id="open-top-btn" class="icon-btn">🏆</button>
            <button id="open-settings-btn" class="icon-btn">⚙️</button>
            <button id="admin-main-btn" class="icon-btn">👑</button>
            
            <div id="money">0</div>
            <div id="user-tag">Загрузка...</div>
        </div>
        
        <div class="main-area">
            <div id="main-button"></div>
            <div class="stats-info">
                Клик: <b id="st-p">+1</b> | Множ: <b id="st-m">x1</b><br>
                <span style="color:#4ecca3">Авто: <b id="st-b">0</b> /сек</span>
            </div>
        </div>

        <div class="shop-panel">
            <div class="shop-item">
                <div><b>Сила клика</b><br><small>Цена: <span id="c1">10</span></small></div>
                <button id="buy1">КУПИТЬ</button>
            </div>
            <div class="shop-item">
                <div><b>Множитель</b><br><small>Цена: <span id="c2">100</span></small></div>
                <button id="buy2">КУПИТЬ</button>
            </div>
            <div class="shop-item">
                <div><b>Авто-бот</b><br><small>Цена: <span id="c3">500</span></small></div>
                <button id="buy3">КУПИТЬ</button>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="settings-box" class="box" style="display:none">
            <h3 style="margin-top:0">ИМЯ ИГРОКА</h3>
            <input type="text" id="new-name-input" maxlength="10" placeholder="Новый ник">
            <button class="btn btn-green" id="save-name-btn">СОХРАНИТЬ</button>
            <button class="btn" style="background:#333; color:white; margin-top:10px" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>

        <div id="admin-box" class="box" style="display:none; border: 2px solid gold">
            <h3 style="color:gold; margin-top:0">👑 АДМИН-ПАНЕЛЬ</h3>
            <p style="font-size:0.7rem; color:#aaa">Введи ID и сумму для начисления</p>
            <input type="number" id="target-id" placeholder="ID игрока">
            <input type="number" id="add-money-val" placeholder="Сколько выдать?">
            <button class="btn btn-yellow" id="give-money-btn">ВЫДАТЬ МОНЕТЫ</button>
            <button class="btn" style="background:red; color:white; margin-top:5px" id="reset-player-btn">ОБНУЛИТЬ АККАУНТ</button>
            <button class="btn" style="margin-top:15px; background:#444; color:white" onclick="closeModal()">ВЫЙТИ</button>
        </div>

        <div id="top-box" class="box" style="display:none; border-color: gold">
            <h3 style="color:gold; margin-top:0">🏆 ТОП-10</h3>
            <div id="leader-list"></div>
            <button class="btn" style="background:#333; color:white; margin-top:10px" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, orderBy, limit, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6v-Qacyh1dDl7J8-XsQY6NxcGcNzBt9o",
            authDomain: "mindingclicker.firebaseapp.com",
            projectId: "mindingclicker",
            storageBucket: "mindingclicker.firebasestorage.app",
            messagingSenderId: "484824275063",
            appId: "1:484824275063:web:b98565344eea2760a34e72"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "raimaslanov222@gmail.com";

        let user = null, money = 0, power = 1, mult = 1, bot = 0, myId = 0, myName = "";
        let cost1 = 10, cost2 = 100, cost3 = 500;

        function nForm(n) {
            if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
            if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
            if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
            return Math.floor(n);
        }

        document.getElementById('login-btn').onclick = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert("Ошибка входа"));
        document.getElementById('reg-btn').onclick = async () => {
            try {
                const res = await createUserWithEmailAndPassword(auth, email.value, pass.value);
                await runTransaction(db, async (t) => {
                    const c = await t.get(doc(db, "system", "users_count"));
                    let nid = c.exists() ? c.data().val + 1 : 1;
                    t.set(doc(db, "system", "users_count"), { val: nid });
                    t.set(doc(db, "leaders", res.user.uid), { name: email.value.split('@')[0], score: 0, power: 1, mult: 1, bot: 0, cost1: 10, cost2: 100, cost3: 500, gameId: nid });
                });
            } catch(e) { alert("Ошибка регистрации"); }
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                
                // Проверка на админа
                if(user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                    document.getElementById('admin-main-btn').style.display = 'flex';
                }

                const s = await getDoc(doc(db, "leaders", user.uid));
                if (s.exists()) {
                    const d = s.data();
                    money = d.score; power = d.power; mult = d.mult; bot = d.bot;
                    cost1 = d.cost1; cost2 = d.cost2; cost3 = d.cost3;
                    myId = d.gameId; myName = d.name;
                }
                updateUI();
            }
        });

        document.getElementById('main-button').onclick = () => { money += (power * mult); updateUI(); };
        setInterval(() => { if(bot > 0) { money += (bot / 10); updateUI(); } }, 100);

        function updateUI() {
            document.getElementById('money').innerText = nForm(money);
            document.getElementById('user-tag').innerText = `${myName.toUpperCase()} | ID: #${myId}`;
            document.getElementById('st-p').innerText = `+${nForm(power)}`;
            document.getElementById('st-m').innerText = `x${mult}`;
            document.getElementById('st-b').innerText = nForm(bot);
            document.getElementById('c1').innerText = nForm(cost1); 
            document.getElementById('c2').innerText = nForm(cost2); 
            document.getElementById('c3').innerText = nForm(cost3);
        }

        async function save() { if(user) await setDoc(doc(db,"leaders",user.uid),{name:myName,score:money,power:power,mult:mult,bot:bot,cost1:cost1,cost2:cost2,cost3:cost3,gameId:myId},{merge:true}); }
        setInterval(save, 10000);

        const buy = (n) => {
            if(n==1 && money>=cost1){ money-=cost1; power++; cost1*=4; }
            if(n==2 && money>=cost2){ money-=cost2; mult*=2; cost2*=10; }
            if(n==3 && money>=cost3){ money-=cost3; bot+=(5*mult); cost3*=5; }
            updateUI(); save();
        };
        document.getElementById('buy1').onclick = () => buy(1);
        document.getElementById('buy2').onclick = () => buy(2);
        document.getElementById('buy3').onclick = () => buy(3);

        window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';
        
        document.getElementById('open-settings-btn').onclick = () => {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('settings-box').style.display = 'block';
            document.getElementById('top-box').style.display = 'none';
            document.getElementById('admin-box').style.display = 'none';
        };

        document.getElementById('admin-main-btn').onclick = () => {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('admin-box').style.display = 'block';
            document.getElementById('settings-box').style.display = 'none';
            document.getElementById('top-box').style.display = 'none';
        };

        document.getElementById('open-top-btn').onclick = () => {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('top-box').style.display = 'block';
            document.getElementById('settings-box').style.display = 'none';
            document.getElementById('admin-box').style.display = 'none';
        };

        document.getElementById('save-name-btn').onclick = async () => {
            const val = document.getElementById('new-name-input').value.trim();
            if(val.length < 2) return alert("Минимум 2 буквы");
            myName = val; updateUI(); await save(); closeModal();
        };

        const adminOp = async (type) => {
            const tid = parseInt(document.getElementById('target-id').value);
            const val = parseInt(document.getElementById('add-money-val').value) || 0;
            const q = query(collection(db, "leaders"), where("gameId", "==", tid));
            const snap = await getDocs(q);
            if(snap.empty) return alert("ID не найден");
            const pDoc = snap.docs[0];
            if(type === 'give') await setDoc(pDoc.ref, { score: (pDoc.data().score + val) }, { merge: true });
            else await setDoc(pDoc.ref, { score: 0 }, { merge: true });
            alert("Готово!");
        };
        document.getElementById('give-money-btn').onclick = () => adminOp('give');
        document.getElementById('reset-player-btn').onclick = () => adminOp('reset');

        onSnapshot(query(collection(db, "leaders"), orderBy("score", "desc"), limit(10)), (snap) => {
            const list = document.getElementById('leader-list');
            list.innerHTML = "";
            snap.forEach(d => {
                list.innerHTML += `<div class="leader-row"><span>#${d.data().gameId} <b>${d.data().name}</b></span><b>${nForm(d.data().score)}</b></div>`;
            });
        });
    </script>
</body>
</html>
