<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Clicker v57: Overlord Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00f2ff; --bg: #050508; --card: #111116; --red: #ff003c; --green: #39ff14; --gold: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Notifications & Floating Text */
        #notif-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 10001; pointer-events: none; }
        .toast { background: rgba(0,0,0,0.95); border-left: 4px solid var(--main); padding: 12px; margin-bottom: 8px; border-radius: 8px; font-family: 'Orbitron'; font-size: 11px; animation: toastIn 0.3s ease-out forwards; }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error { border-color: var(--red); color: var(--red); }
        .toast.admin { border-color: var(--gold); color: var(--gold); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .float-text { position: fixed; pointer-events: none; font-family: 'Orbitron'; font-weight: 900; font-size: 22px; color: #fff; text-shadow: 0 0 10px var(--main); animation: floatUp 0.7s ease-out forwards; z-index: 5000; }
        @keyframes floatUp { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -160px) scale(1.3); opacity: 0; } }

        header { height: 90px; background: #000; border-bottom: 2px solid var(--main); display: flex; flex-direction: column; justify-content: center; padding: 0 20px; }
        .h-row { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 11px; margin-bottom: 8px; }
        .xp-bg { width: 100%; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
        #xp-bar { width: 0%; height: 100%; background: var(--main); transition: 0.3s; box-shadow: 0 0 10px var(--main); }

        .screen { flex: 1; overflow-y: auto; padding: 15px; display: none; flex-direction: column; align-items: center; padding-bottom: 120px; width: 100%; }
        .screen.active { display: flex; }

        #display-bal { font-family: 'Orbitron'; font-size: 2.8rem; font-weight: 900; margin: 15px 0; text-shadow: 0 0 20px var(--main); color: #fff; }
        .main-btn { width: 180px; height: 180px; border-radius: 50%; border: 6px solid var(--main); display: flex; align-items: center; justify-content: center; cursor: pointer; background: radial-gradient(circle, #00f2ff33 0%, #000 80%); transition: 0.05s; }
        .main-btn:active { transform: scale(0.9); }

        .live-stats { margin-top: 15px; width: 100%; max-width: 380px; background: rgba(255,255,255,0.03); border-radius: 15px; padding: 12px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .mini-badge { font-family: 'Orbitron'; font-size: 9px; color: #aaa; background: #111; padding: 5px 10px; border-radius: 20px; border: 1px solid #222; }
        .mini-badge b { color: var(--main); }

        .item-card { width: 100%; background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .item-card b { display: block; font-family: 'Orbitron'; font-size: 13px; }
        .item-card small { color: #666; font-size: 10px; }
        .btn-buy { background: var(--main); color: #000; border: none; border-radius: 8px; padding: 10px 14px; font-family: 'Orbitron'; font-weight: 900; font-size: 10px; cursor: pointer; }

        .top-item { width: 100%; background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; font-size: 13px; }

        nav { height: 75px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; z-index: 9000; }
        .nav-item { color: #444; font-family: 'Orbitron'; font-size: 10px; text-align: center; }
        .nav-item.active { color: var(--main); }

        /* Admin UI */
        #admin-ui { display: none; position: fixed; inset: 0; background: #000; z-index: 20000; padding: 25px; flex-direction: column; overflow-y: auto; }
        .adm-section { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .input-box { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; font-family: 'Orbitron'; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div id="notif-container"></div>

<header>
    <div class="h-row"><span>CREDITS: <b id="h-bal">0</b></span><span>LVL: <b id="h-lvl">1</b></span></div>
    <div class="xp-bg"><div id="xp-bar"></div></div>
</header>

<main id="sc-game" class="screen active">
    <div id="display-bal">0</div>
    <div class="main-btn" id="btn-tap"><span style="font-size:60px;">⚡</span></div>
    <div class="live-stats">
        <div class="mini-badge">TAP: <b id="bad-pwr">+1</b></div>
        <div class="mini-badge">MULT: <b id="bad-mult">1x</b></div>
        <div class="mini-badge">AUTO: <b id="bad-auto">0/s</b></div>
        <div class="mini-badge">ID: <b id="bad-id">0</b></div>
    </div>
</main>

<main id="sc-shop" class="screen">
    <div style="width:100%; max-width:450px;">
        <h3 style="font-family:Orbitron; color:var(--main); font-size:14px;">🔥 POWER UPGRADES</h3>
        <div id="boost-shelf"></div>
        <h3 style="font-family:Orbitron; color:var(--gold); font-size:14px; margin-top:20px;">⚙️ MINING SYSTEMS</h3>
        <div id="slave-shelf"></div>
    </div>
</main>

<main id="sc-top" class="screen">
    <h3 style="font-family:Orbitron; color:var(--main)">LEADERBOARD</h3>
    <div id="top-list" style="width:100%; max-width:450px;"></div>
</main>

<main id="sc-set" class="screen">
    <input type="text" id="nick-field" class="input-box" placeholder="Your Nickname">
    <button class="btn-buy" style="width:100%;" onclick="window.updateNick()">UPDATE PROFILE</button>
    <div style="margin-top:20px; width:100%;">
        <input type="text" id="promo-field" class="input-box" placeholder="ENTER PROMO">
        <button class="btn-buy" style="width:100%; background:var(--green);" onclick="window.claimPromo()">REDEEM CODE</button>
    </div>
    <button id="adm-access" style="display:none; margin-top:50px; border:1px dashed red; color:red; padding:15px; width:100%; background:none; font-family:Orbitron;" onclick="window.openAdmin(true)">🛡️ ROOT ACCESS</button>
</main>

<nav>
    <div class="nav-item active" onclick="window.nav('game', this)">MINE</div>
    <div class="nav-item" onclick="window.nav('shop', this)">SHOP</div>
    <div class="nav-item" onclick="window.nav('top', this)">TOP</div>
    <div class="nav-item" onclick="window.nav('set', this)">SET</div>
</nav>

<div id="admin-ui">
    <h2 style="font-family:Orbitron; color:var(--main); margin-bottom:20px;">OWNER TERMINAL</h2>
    
    <div class="adm-section">
        <p style="font-size:10px; color:var(--main); margin:0 0 10px;">CASH CONTROL (BY NICK OR ID)</p>
        <input type="text" id="adm-target" class="input-box" placeholder="Nickname or ShortID">
        <input type="number" id="adm-val" class="input-box" placeholder="Amount (e.g. 5000 or -5000)">
        <button class="btn-buy" style="width:100%" onclick="window.adminAction()">EXECUTE TRANSACTION</button>
    </div>

    <div class="adm-section">
        <p style="font-size:10px; color:var(--gold); margin:0 0 10px;">PROMO CREATOR</p>
        <input type="text" id="adm-p-name" class="input-box" placeholder="CODE NAME">
        <input type="number" id="adm-p-reward" class="input-box" placeholder="Reward Value">
        <button class="btn-buy" style="width:100%; background:var(--gold)" onclick="window.adminCreatePromo()">GENERATE PROMO</button>
    </div>

    <button class="btn-buy" style="margin-top:auto; background:#222; color:#fff;" onclick="window.openAdmin(false)">EXIT TERMINAL</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, setDoc, getDoc, collection, query, orderBy, limit, getDocs, where, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { apiKey: "AIzaSyDRv2Q060oBb1_1NXuqU4ixLVGy6EEr3To", authDomain: "infinity-clicker-7e01c.firebaseapp.com", projectId: "infinity-clicker-7e01c", storageBucket: "infinity-clicker-7e01c.firebasestorage.app", messagingSenderId: "888672687755", appId: "1:888672687755:web:6dda24bd7e4809c4d5668e" };
    const app = initializeApp(config); const auth = getAuth(app); const db = getFirestore(app);

    const OWNER_ID = 74981;
    let u = { credits: 0, maxCredits: 0, pwr: 1, idle: 0, mult: 1, shortId: 0, nickname: 'Miner', lvl: 1, xp: 0, upg: {} };

    const SHOP_DATA = {
        boosts: [
            {id:'b1', n:'Steel Glove', d:'+1 Tap', b:50, t:'pwr', v:1},
            {id:'b2', n:'Neon Drill', d:'+15 Tap', b:1200, t:'pwr', v:15},
            {id:'b3', n:'Quantum Tool', d:'+250 Tap', b:45000, t:'pwr', v:250},
            {id:'m1', n:'X2 Booster', d:'x2 All Profit', b:250000, t:'mult', v:2}
        ],
        miners: [
            {id:'s1', n:'Scrap Bot', d:'+10/s', b:400, v:10},
            {id:'s2', n:'Mining Rig', d:'+150/s', b:8000, v:150},
            {id:'s3', n:'Server Farm', d:'+2k/s', b:120000, v:2000},
            {id:'s4', n:'Void Core', d:'+50k/s', b:5000000, v:50000}
        ]
    };

    window.notify = (txt, type='') => {
        const c = document.getElementById('notif-container');
        const e = document.createElement('div'); e.className = `toast ${type}`; e.innerText = txt;
        c.appendChild(e); setTimeout(() => { e.style.opacity='0'; setTimeout(()=>e.remove(), 500); }, 3000);
    };

    window.format = n => {
        if(n < 1000) return Math.floor(n);
        const p = ["K","M","B","T","Qa","Qi"]; const i = Math.floor(Math.log10(n)/3);
        return (n/Math.pow(1000,i)).toFixed(2) + p[i-1];
    };

    window.sync = () => {
        document.getElementById('h-bal').innerText = window.format(u.credits);
        document.getElementById('display-bal').innerText = window.format(u.credits);
        document.getElementById('h-lvl').innerText = u.lvl;
        document.getElementById('bad-pwr').innerText = "+" + window.format(u.pwr);
        document.getElementById('bad-mult').innerText = u.mult.toFixed(1) + "x";
        document.getElementById('bad-auto').innerText = window.format(u.idle) + "/s";
        document.getElementById('bad-id').innerText = u.shortId;
        document.getElementById('xp-bar').style.width = Math.min((u.xp/(u.lvl*5000))*100, 100) + "%";
        if(u.shortId === OWNER_ID) document.getElementById('adm-access').style.display = 'block';
        drawShop();
    };

    const drawShop = () => {
        const bs = document.getElementById('boost-shelf'); bs.innerHTML = '';
        SHOP_DATA.boosts.forEach(it => {
            const c = u.upg[it.id]||0; const p = Math.floor(it.b * Math.pow(1.6, c));
            bs.innerHTML += `<div class="item-card"><div><b>${it.n} [${c}]</b><small>${it.d}</small></div>
            <button class="btn-buy" onclick="window.buy('${it.id}',${p},'${it.t}',${it.v})">${window.format(p)}</button></div>`;
        });
        const ss = document.getElementById('slave-shelf'); ss.innerHTML = '';
        SHOP_DATA.miners.forEach(it => {
            const c = u.upg[it.id]||0; const p = Math.floor(it.b * Math.pow(1.7, c));
            ss.innerHTML += `<div class="item-card"><div><b>${it.n} [${c}]</b><small>${it.d}</small></div>
            <button class="btn-buy" onclick="window.buy('${it.id}',${p},'idle',${it.v})">${window.format(p)}</button></div>`;
        });
    };

    window.buy = (id, p, t, v) => {
        if(u.credits >= p) {
            u.credits -= p; u.upg[id] = (u.upg[id]||0)+1;
            if(t==='pwr') u.pwr += v; else if(t==='mult') u.mult *= v; else u.idle += v;
            window.notify("PURCHASED!", "success"); window.sync(); window.save();
        } else window.notify("INSUFFICIENT FUNDS", "error");
    };

    window.handleTap = (e) => {
        const gain = u.pwr * u.mult; u.credits += gain; u.xp += gain/5;
        if(u.credits > u.maxCredits) u.maxCredits = u.credits;
        if(u.xp >= u.lvl * 5000) { u.xp = 0; u.lvl++; window.notify("LEVEL UP!", "success"); }
        
        const fl = document.createElement('div'); fl.className='float-text'; fl.innerText='+'+window.format(gain);
        fl.style.left = (e.clientX || window.innerWidth/2) + 'px';
        fl.style.top = (e.clientY || window.innerHeight/2) + 'px';
        document.body.appendChild(fl); setTimeout(()=>fl.remove(), 700);
        window.sync();
    };
    document.getElementById('btn-tap').onclick = window.handleTap;

    window.nav = (id, el) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('sc-'+id).classList.add('active'); el.classList.add('active');
        if(id === 'top') window.loadTop();
    };

    window.updateNick = () => { u.nickname = document.getElementById('nick-field').value; window.save(); window.notify("PROFILE SAVED!"); };

    // --- ADMIN ENGINE ---
    window.adminAction = async () => {
        const target = document.getElementById('adm-target').value;
        const val = Number(document.getElementById('adm-val').value);
        if(!target) return window.notify("ENTER TARGET!", "error");

        let q;
        if(!isNaN(target)) q = query(collection(db, "users"), where("shortId", "==", Number(target)), limit(1));
        else q = query(collection(db, "users"), where("nickname", "==", target), limit(1));

        const snap = await getDocs(q);
        if(!snap.empty) {
            const docRef = doc(db, "users", snap.docs[0].id);
            await updateDoc(docRef, { credits: (snap.docs[0].data().credits || 0) + val });
            window.notify(`INJECTED ${val} TO ${target}`, "admin");
        } else window.notify("USER NOT FOUND", "error");
    };

    window.adminCreatePromo = async () => {
        const n = document.getElementById('adm-p-name').value.toUpperCase().trim();
        const v = Number(document.getElementById('adm-p-reward').value);
        if(!n || !v) return window.notify("FILL FIELDS", "error");
        await setDoc(doc(db, "promos", n), { val: v, usedBy: [] });
        window.notify(`PROMO ${n} CREATED`, "admin");
    };

    window.claimPromo = async () => {
        const code = document.getElementById('promo-field').value.toUpperCase().trim();
        const ref = doc(db, "promos", code);
        const snap = await getDoc(ref);
        if(snap.exists() && !snap.data().usedBy.includes(auth.currentUser.uid)) {
            u.credits += snap.data().val;
            await updateDoc(ref, { usedBy: arrayUnion(auth.currentUser.uid) });
            window.save(); window.notify("CODE REDEEMED!", "success");
        } else window.notify("INVALID OR USED", "error");
    };

    window.loadTop = async () => {
        const q = query(collection(db, "users"), orderBy("maxCredits", "desc"), limit(15));
        const snap = await getDocs(q);
        const shelf = document.getElementById('top-list'); shelf.innerHTML = '';
        snap.forEach((d, i) => {
            const data = d.data();
            shelf.innerHTML += `<div class="top-item"><span style="color:var(--gold)">#${i+1}</span> <span>${data.nickname}</span> <b style="color:var(--main)">${window.format(data.maxCredits)}</b></div>`;
        });
    };

    window.openAdmin = st => document.getElementById('admin-ui').style.display = st ? 'flex' : 'none';

    onAuthStateChanged(auth, async user => {
        if(user) {
            const ref = doc(db, "users", user.uid);
            const snap = await getDoc(ref);
            if(snap.exists()) u = {...u, ...snap.data()};
            else { u.shortId = Math.floor(10000+Math.random()*80000); await setDoc(ref, u); }
            window.sync(); onSnapshot(ref, d => { if(d.exists()){ u = {...u, ...d.data()}; window.sync(); }});
        }
    });

    window.save = async () => { if(auth.currentUser) await updateDoc(doc(db, "users", auth.currentUser.uid), u); };
    setInterval(() => { if(u.idle > 0) { u.credits += (u.idle * u.mult)/10; window.sync(); } }, 100);
    setInterval(window.save, 15000);
</script>
</body>
</html>
