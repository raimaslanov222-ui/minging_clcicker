<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Clicker Engine V5.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- СЕКЦИЯ 1: ЦВЕТОВАЯ ПАЛИТРА И ПЕРЕМЕННЫЕ (Строки 15-45) --- 
        */
        :root {
            --primary: #ff1a1a;
            --secondary: #4ecca3;
            --accent: #ffcc00;
            --bg-dark: #0a0a12;
            --panel-bg: #161625;
            --glass: rgba(255, 255, 255, 0.05);
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- СЕКЦИЯ 2: ОБЩИЕ СТИЛИ И СБРОС (Строки 46-80) --- 
        */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: var(--bg-dark);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- СЕКЦИЯ 3: АНИМАЦИИ (Строки 81-120) --- 
        */
        @keyframes floatText {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.2); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px rgba(255, 26, 26, 0.2); }
            50% { box-shadow: 0 0 50px rgba(255, 26, 26, 0.5); }
            100% { box-shadow: 0 0 20px rgba(255, 26, 26, 0.2); }
        }

        /* --- СЕКЦИЯ 4: УВЕДОМЛЕНИЯ АДМИНА (Строки 121-150) --- 
        */
        #admin-notify {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 350px;
            background: var(--panel-bg);
            border: 2px solid var(--secondary);
            border-radius: 15px;
            padding: 15px;
            z-index: 10000;
            display: none;
            box-shadow: var(--shadow);
            animation: slideDown 0.4s ease;
            text-align: center;
        }

        #admin-notify h4 { margin: 0 0 5px 0; color: var(--secondary); font-family: 'Montserrat'; }
        #admin-notify p { margin: 0; font-size: 0.85rem; color: #bbb; }

        /* --- СЕКЦИЯ 5: ЭКРАН ВХОДА (Строки 151-200) --- 
        */
        .auth-container {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1c1c3c 0%, #05050a 100%);
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 35px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .auth-card h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .main-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            font-weight: bold;
            text-align: center;
        }

        /* --- СЕКЦИЯ 6: ИГРОВОЙ ИНТЕРФЕЙС GUI (Строки 201-280) --- 
        */
        #game-view { display: none; flex-direction: column; height: 100%; }

        .top-bar {
            background: linear-gradient(180deg, var(--primary) 0%, #a00000 100%);
            padding: 50px 20px 30px 20px;
            text-align: center;
            border-bottom-left-radius: 45px;
            border-bottom-right-radius: 45px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        #balance-display {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.8rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin: 0;
        }

        .player-info {
            background: rgba(0,0,0,0.25);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--secondary);
            display: inline-block;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .btn-circle {
            position: absolute;
            top: 25px;
            width: 46px;
            height: 46px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        #btn-leaderboard { left: 20px; }
        #btn-settings { right: 20px; }

        /* --- СЕКЦИЯ 7: КЛИКЕР ЗОНА (Строки 281-340) --- 
        */
        .click-engine {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #the-button {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            background: url('button.png') center/cover, var(--primary);
            border: 8px solid #ffffff;
            cursor: pointer;
            transition: transform 0.05s ease;
            animation: pulseGlow 3s infinite;
            z-index: 5;
        }

        #the-button:active { transform: scale(0.88); }

        .particle-text {
            position: absolute;
            font-family: 'Montserrat';
            font-weight: 900;
            color: var(--secondary);
            pointer-events: none;
            animation: floatText 0.7s ease-out forwards;
            z-index: 100;
        }

        .dashboard {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            width: 90%;
        }

        .stat-box {
            flex: 1;
            background: var(--glass);
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- СЕКЦИЯ 8: МАГАЗИН И ПАНЕЛИ (Строки 341-400) --- 
        */
        .shop-container {
            background: var(--panel-bg);
            padding: 20px 25px 40px 25px;
            border-top-left-radius: 45px;
            border-top-right-radius: 45px;
        }

        .shop-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            padding: 14px 20px;
            border-radius: 22px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .action-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 22px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 0.85rem;
            box-shadow: 0 4px 0 #b38f00;
        }

        /* --- СЕКЦИЯ 9: МОДАЛЬНЫЕ ОКНА (Строки 401-450) --- 
        */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            z-index: 9500; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(8px); padding: 20px;
        }

        .modal-content {
            width: 100%; max-width: 340px; background: var(--panel-bg);
            border-radius: 35px; padding: 30px; border: 2px solid #222;
            text-align: center; animation: fadeIn 0.3s ease;
        }

        .leader-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px; background: rgba(0,0,0,0.2); margin-bottom: 8px;
            border-radius: 18px; border-left: 4px solid var(--accent);
        }
    </style>
</head>
<body>

    <div id="admin-notify">
        <h4 id="notify-title">СИСТЕМА</h4>
        <p id="notify-msg">Операция выполнена</p>
    </div>

    <section class="auth-container" id="auth-layer">
        <div class="auth-card">
            <h1>INFINITY<br>CLICKER</h1>
            <input type="email" id="inp-email" class="main-input" placeholder="Ваш Email">
            <input type="password" id="inp-pass" class="main-input" placeholder="Пароль">
            <button class="action-btn" id="btn-login" style="width:100%; padding:18px;">ВОЙТИ</button>
            <p id="btn-switch-reg" style="color:var(--secondary); font-size:0.8rem; margin-top:20px; cursor:pointer">Создать новый аккаунт</p>
        </div>
    </section>

    <main id="game-view">
        <header class="top-bar">
            <button id="btn-leaderboard" class="btn-circle">🏆</button>
            <button id="btn-settings" class="btn-circle">⚙️</button>
            <h2 id="balance-display">0</h2>
            <div id="player-tag" class="player-info">ЗАГРУЗКА ДАННЫХ...</div>
        </header>

        <section class="click-engine" id="click-box">
            <div id="the-button"></div>
            <div class="dashboard">
                <div class="stat-box">КЛИК<br><b id="gui-power" style="color:var(--secondary)">+1</b></div>
                <div class="stat-box">БОНУС<br><b id="gui-mult" style="color:var(--accent)">x1</b></div>
                <div class="stat-box">АВТО<br><b id="gui-bot" style="color:var(--primary)">0</b></div>
            </div>
        </section>

        <footer class="shop-container">
            <div class="shop-card">
                <div><b>Урон</b><br><small id="price1">Цена: 10</small></div>
                <button class="action-btn" id="buy-power">КУПИТЬ</button>
            </div>
            <div class="shop-card">
                <div><b>Множитель</b><br><small id="price2">Цена: 100</small></div>
                <button class="action-btn" id="buy-mult">КУПИТЬ</button>
            </div>
            <div class="shop-card">
                <div><b>Майнер</b><br><small id="price3">Цена: 500</small></div>
                <button class="action-btn" id="buy-bot">КУПИТЬ</button>
            </div>
        </footer>
    </main>

    <div id="modal-layer" class="modal-overlay">
        <div id="modal-inner" class="modal-content"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, orderBy, limit, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // КОНФИГ ФАЙРБЕЙЗ
        const firebaseConfig = {
            apiKey: "AIzaSyA6v-Qacyh1dDl7J8-XsQY6NxcGcNzBt9o",
            authDomain: "mindingclicker.firebaseapp.com",
            projectId: "mindingclicker",
            storageBucket: "mindingclicker.firebasestorage.app",
            messagingSenderId: "484824275063",
            appId: "1:484824275063:web:b98565344eea2760a34e72"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const MASTER_ADMIN = "raimaslanov222@gmail.com";

        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        let state = {
            money: 0, power: 1, mult: 1, bot: 0,
            c1: 10, c2: 100, c3: 500,
            id: 0, name: ""
        };

        // ФОРМАТИРОВАНИЕ ЧИСЕЛ
        const fNum = (n) => {
            if (n >= 1e12) return (n / 1e12).toFixed(2) + "T";
            if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
            if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
            if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
            return Math.floor(n);
        };

        // GUI УВЕДОМЛЕНИЯ ДЛЯ АДМИНА
        window.sendNotice = (title, msg, err = false) => {
            const box = document.getElementById('admin-notify');
            document.getElementById('notify-title').innerText = title;
            document.getElementById('notify-msg').innerText = msg;
            box.style.borderColor = err ? "#ff1a1a" : "#4ecca3";
            box.style.display = "block";
            setTimeout(() => { box.style.display = "none"; }, 4500);
        };

        // АВТОРИЗАЦИЯ
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                document.getElementById('auth-layer').style.display = 'none';
                document.getElementById('game-view').style.display = 'flex';
                const docSnap = await getDoc(doc(db, "leaders", u.uid));
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    state = { ...state, money: d.score||0, power: d.power||1, mult: d.mult||1, bot: d.bot||0, c1: d.cost1||10, c2: d.cost2||100, c3: d.cost3||500, name: d.name, id: d.gameId };
                }
                syncUI();
            }
        });

        // ОБНОВЛЕНИЕ ИНТЕРФЕЙСА
        function syncUI() {
            document.getElementById('balance-display').innerText = fNum(state.money);
            document.getElementById('player-tag').innerText = `${state.name.toUpperCase()} | ID: #${state.id}`;
            document.getElementById('gui-power').innerText = `+${fNum(state.power * state.mult)}`;
            document.getElementById('gui-mult').innerText = `x${state.mult}`;
            document.getElementById('gui-bot').innerText = fNum(state.bot);
            document.getElementById('price1').innerText = `Цена: ${fNum(state.c1)}`;
            document.getElementById('price2').innerText = `Цена: ${fNum(state.c2)}`;
            document.getElementById('price3').innerText = `Цена: ${fNum(state.c3)}`;
        }

        // КЛИК И ЭФФЕКТЫ
        document.getElementById('the-button').onclick = (e) => {
            const earn = state.power * state.mult;
            state.money += earn;
            syncUI();

            const p = document.createElement('div');
            p.className = 'particle-text';
            p.innerText = `+${fNum(earn)}`;
            p.style.left = `${e.clientX}px`;
            p.style.top = `${e.clientY - 40}px`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
        };

        // АВТО-КЛИКЕР (10 раз в секунду)
        setInterval(() => { if(state.bot > 0) { state.money += (state.bot / 10); syncUI(); } }, 100);

        // СОХРАНЕНИЕ В ОБЛАКО (раз в 10 сек)
        async function cloudSave() {
            if(!auth.currentUser) return;
            await setDoc(doc(db, "leaders", auth.currentUser.uid), {
                name: state.name, score: state.money, power: state.power, mult: state.mult, bot: state.bot,
                cost1: state.c1, cost2: state.c2, cost3: state.c3, gameId: state.id
            }, { merge: true });
        }
        setInterval(cloudSave, 10000);

        // МАГАЗИН
        document.getElementById('buy-power').onclick = () => { if(state.money >= state.c1){ state.money -= state.c1; state.power++; state.c1 *= 4; syncUI(); cloudSave(); } };
        document.getElementById('buy-mult').onclick = () => { if(state.money >= state.c2){ state.money -= state.c2; state.mult *= 2; state.c2 *= 10; syncUI(); cloudSave(); } };
        document.getElementById('buy-bot').onclick = () => { if(state.money >= state.c3){ state.money -= state.c3; state.bot += (5 * state.mult); state.c3 *= 5; syncUI(); cloudSave(); } };

        // МОДАЛЬНЫЕ ОКНА ЛОГИКА
        const modal = document.getElementById('modal-layer');
        const inner = document.getElementById('modal-inner');
        window.closeModal = () => modal.style.display = 'none';

        // НАСТРОЙКИ И АДМИНКА
        document.getElementById('btn-settings').onclick = () => {
            modal.style.display = 'flex';
            let admUI = auth.currentUser.email === MASTER_ADMIN ? `<button class="action-btn" style="width:100%; margin-top:10px" onclick="window.runAdmin()">👑 ПАНЕЛЬ УПРАВЛЕНИЯ</button>` : '';
            inner.innerHTML = `
                <h3>НАСТРОЙКИ ПРОФИЛЯ</h3>
                <input type="text" id="new-nick" class="main-input" placeholder="Никнейм" value="${state.name}">
                <button class="action-btn" style="width:100%; background:var(--secondary)" onclick="window.saveNick()">ОБНОВИТЬ</button>
                ${admUI}
                <button class="action-btn" style="width:100%; background:#333; margin-top:15px" onclick="window.closeModal()">ЗАКРЫТЬ</button>
            `;
        };

        window.saveNick = async () => {
            const n = document.getElementById('new-nick').value.trim();
            if(n.length > 1) { state.name = n; syncUI(); await cloudSave(); window.closeModal(); }
        };

        // ФУНКЦИИ АДМИНИСТРАТОРА (GUI + LOGIC)
        window.runAdmin = () => {
            inner.innerHTML = `
                <h3 style="color:var(--accent)">АДМИН-ЦЕНТР</h3>
                <input type="text" id="adm-target" class="main-input" placeholder="ID или НИК игрока">
                <input type="number" id="adm-val" class="main-input" placeholder="Количество монет">
                <button class="action-btn" style="width:100%; background:var(--secondary)" onclick="window.admExec('give')">ВЫДАТЬ СРЕДСТВА</button>
                <button class="action-btn" style="width:100%; background:var(--primary); margin-top:8px" onclick="window.admExec('reset')">ОБНУЛИТЬ ИГРОКА</button>
                <button class="action-btn" style="width:100%; background:#222; margin-top:20px" onclick="window.closeModal()">НАЗАД</button>
            `;
        };

        window.admExec = async (mode) => {
            const target = document.getElementById('adm-target').value;
            const amount = parseFloat(document.getElementById('adm-val').value) || 0;
            if(!target) return window.sendNotice("ОШИБКА", "Укажите цель!", true);

            let q = !isNaN(target) ? query(collection(db, "leaders"), where("gameId", "==", parseInt(target))) : query(collection(db, "leaders"), where("name", "==", target));
            const snap = await getDocs(q);
            if(snap.empty) return window.sendNotice("ОШИБКА", "Игрок не найден!", true);

            const userRef = snap.docs[0].ref;
            const userData = snap.docs[0].data();

            if(mode === 'give') {
                await setDoc(userRef, { score: userData.score + amount }, { merge: true });
                window.sendNotice("УСПЕХ!", `Выдано ${fNum(amount)} монет игроку ${userData.name} (ID: #${userData.gameId})`);
            } else {
                await setDoc(userRef, { score: 0, power: 1, mult: 1, bot: 0 }
